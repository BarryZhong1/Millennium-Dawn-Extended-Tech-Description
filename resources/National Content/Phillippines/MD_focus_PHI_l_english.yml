 #Philippine decisions
 ###Strength of MILF vs Philippines
 PHI_milf_decisions_category: "The Moro Conflict"
 PHI_milf_decisions_category_desc: "The Moro Conflict is referenced to as a series of armed conflicts within the Mindanao province. The Moro Conflict began as a result of the Resettlement Policy enforced during the Philippine Commonwealth territory in 1935. It exploded when 11 Muslim military trainees were murdered in Corregidor. The Moro Islamic National Front formed shortly thereafter in 1969 and has since been in open conflict with the government Forces.\n £generic_anarchist_communism_small §RStrength of MILF:§! [?PHI.PHI_strength_of_milf|20]%"

 ##Gommunist Insurgency
 PHI_communist_insurgency_category: "New People's Army Rebellion"
 PHI_communist_insurgency_category_desc: "The New People's Army Rebellion is the world's oldest Communist insurgency. The NPA has been fighting constantly since 1969 against the Filipino national government.\n\nIt is time we put forth effort in crushing this rebellion.\n"

 ##Corruption Decisions
 PHI_corruption_decisions_category: "Corruption"
 PHI_corruption_decisions_category_desc: "Manage the corruption levels in the Philippines. Choose between rooting out corruption or tolerating it for political gains.\n\n£political_advisor §YCorruption Level:§! [?PHI.PHI_corruption_influence|Y0]%"
 PHI_investigate_corruption: "Investigate Corruption"
 PHI_investigate_corruption_desc: "Launch an investigation into government corruption. This may uncover some corruption but won't completely solve the problem."
 PHI_investigate_corruption_tt: "Reduces corruption by 2%"
 PHI_anti_corruption_campaign: "Anti-Corruption Campaign"
 PHI_anti_corruption_campaign_desc: "Launch a comprehensive campaign against corruption in the government."
 PHI_anti_corruption_campaign_tt: "Reduces corruption by 5%, increases stability by 2%"
 PHI_tolerate_corruption: "Tolerate Corruption"
 PHI_tolerate_corruption_desc: "Turn a blind eye to corruption in exchange for political support."
 PHI_tolerate_corruption_tt: "Increases corruption by 3%, increases political power gain by 5%"

 PHI_corruption_investigation: "Corruption Investigation"
 PHI_corruption_investigation_desc: "Launch an investigation into government corruption. This may uncover some corruption but won't completely solve the problem."

 PHI_transparency_laws: "Transparency Laws"
 PHI_transparency_laws_desc: "Pass legislation requiring greater transparency in government contracts and spending."

 PHI_audit_commission: "Audit Commission"
 PHI_audit_commission_desc: "Establish a commission to audit government spending and contracts for corruption."

 PHI_ombudsman_office: "Ombudsman Office"
 PHI_ombudsman_office_desc: "Establish an independent office to investigate and prosecute corruption cases."

 PHI_police_anti_corruption: "Police Anti-Corruption Operations"
 PHI_police_anti_corruption_desc: "Deploy police forces to investigate and combat corruption within government agencies."

 PHI_military_anti_corruption: "Military Anti-Corruption Task Force"
 PHI_military_anti_corruption_desc: "Deploy military forces to combat high-level corruption. This may cause stability issues but will be effective."

 PHI_tolerate_corruption_enhanced: "Tolerate Corruption"
 PHI_tolerate_corruption_enhanced_desc: "Turn a blind eye to corruption in exchange for political support and stability."

 ##Corruption Dynamic Modifier
 PHI_corruption_dynamic_modifier: "Corruption Levels"
 PHI_corruption_dynamic_modifier_tooltip: "The level of corruption affecting the Philippines. Higher corruption provides some economic benefits but weakens the government."

 ##Corruption System
 PHI_address_corruption: "Address Corruption"
 PHI_address_corruption_desc: "Corruption has long been a problem in the Philippines. From local politics to the national government, the rot has spread everywhere. It is time we address this issue and clean up our political system."
 PHI_corruption_investigation: "Corruption Investigation"
 PHI_corruption_investigation_desc: "Launch a full investigation into government corruption. This will uncover the extent of the problem and allow us to take action."
 PHI_political_clans: "Political Clans"
 PHI_political_clans_desc: "The political dynasties of the Philippines have maintained power through corruption and patronage. We can work with them, or against them."
 PHI_jueteng_cracksdown: "Jueteng Crackdown"
 PHI_jueteng_cracksdown_desc: "Jueteng, an illegal numbers game, has been a source of corruption and criminal activity for decades. We must crack down on this underground economy."
 PHI_corruption_ombudsman: "Corruption Ombudsman"
 PHI_corruption_ombudsman_desc: "Establish an independent office to investigate and prosecute corruption cases."
 PHI_transparency_laws: "Transparency Laws"
 PHI_transparency_laws_desc: "Pass legislation requiring greater transparency in government contracts and spending."
 PHI_oligarch_deal: "Deal with Oligarchs"
 PHI_oligarch_deal_desc: "Work with the powerful oligarchic families to maintain stability, even if it means turning a blind eye to some corruption."
 PHI_jueteng_legalize: "Legalize Jueteng"
 PHI_jueteng_legalize_desc: "Instead of fighting the Jueteng industry, we can legalize and regulate it, turning it into a source of government revenue."
 PHI_anti_jueteng_campaign: "Anti-Jueteng Campaign"
 PHI_anti_jueteng_campaign_desc: "Launch a comprehensive campaign to eliminate Jueteng and associated criminal activities."
 PHI_anti_corruption_court: "Anti-Corruption Court"
 PHI_anti_corruption_court_desc: "Establish a specialized court system to handle corruption cases swiftly and fairly."
 PHI_corruption_reformed: "Reform Complete"
 PHI_corruption_reformed_desc: "The corruption reform process is complete. The Philippines now has a cleaner, more transparent government."

