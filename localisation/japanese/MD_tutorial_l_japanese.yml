l_japanese:
 MD_TUTORIAL_OPEN_BUTTON: "§YMillennium Dawn チュートリアル§!を開く"
 MD_TUTORIAL_OPEN_BUTTON_TT: "Millennium Dawn のチュートリアルウィンドウを開きます。"
 tutorial_main_background_window_inner_title: "§CMillennium Dawn チュートリアル§!"
 MD_TUTORIAL_WINDOW_NOTE: "このチュートリアルは、共有GUIとscripted codeで確認できる共通システムのみを要約しています。国別要素や地域固有の仕組みは別途追加されます。"
 MD_TUTORIAL_TAB_OVERVIEW: "概要"
 MD_TUTORIAL_TAB_OVERVIEW_TT: "MDの共通システムと開き方です。"
 MD_TUTORIAL_TAB_ECONOMY: "経済"
 MD_TUTORIAL_TAB_ECONOMY_TT: "債務、国庫、税率、投資、予算画面です。"
 MD_TUTORIAL_TAB_POLITICS: "政治"
 MD_TUTORIAL_TAB_POLITICS_TT: "政党、連立、選挙しきい値、管理操作です。"
 MD_TUTORIAL_TAB_INFLUENCE: "影響力"
 MD_TUTORIAL_TAB_INFLUENCE_TT: "外国影響力、援助、クーデター、搾取、傀儡化です。"
 MD_TUTORIAL_TAB_RESEARCH: "研究"
 MD_TUTORIAL_TAB_RESEARCH_TT: "GDP系条件による研究枠拡張です。"
 MD_TUTORIAL_TAB_MILITARY: "軍事"
 MD_TUTORIAL_TAB_MILITARY_TT: "編制幅と生産のMD差分です。"
 MD_TUTORIAL_TAB_ADVANCED: "発展"
 MD_TUTORIAL_TAB_ADVANCED_TT: "国際システムとエネルギー画面です。"
 MD_TUTORIAL_OVERVIEW_TITLE: "MDの共通システム"
 MD_TUTORIAL_OVERVIEW_LEFT: "§YMDで増える共通要素§!\n- MDには、経済、政党管理、外国影響力、研究枠拡張、独自大隊、国際システムなど、バニラ以外の共通機能があります。\n- これらは共有GUIとscripted GUIで実装されているため、多くの国家で利用します。\n- 国別NF、イベント、地域組織はこの土台の上に追加されます。"
 MD_TUTORIAL_OVERVIEW_RIGHT: "§Y開き方の目安§!\n- チュートリアル: マップ画面のこのボタン、または §YShift+T§!。\n- 経済: 上部バーの §Y国庫§! をクリックします。\n- 政治と影響力: 拡張された Politics 画面と他国の外交画面を使います。\n- 研究: Technology タブの §YResearch Slots§! を開きます。\n- 発展要素: Logistics 横の §YInternational Systems§! ボタンを使います。"
 MD_TUTORIAL_ECONOMY_TITLE: "経済と予算"
 MD_TUTORIAL_ECONOMY_LEFT: "§Y上部バーの管理§!\n- MDの上部バーには §Y債務§!、§Y国庫§!、§Y対外投資§! が追加されます。\n- 債務を左クリックすると借入を行い、通常クリックは国庫 +1B、債務 +1.01B です。\n- Ctrl、Shift、Alt クリックは 10、100、1000 を借りますが、GDP条件と金利20未満が必要です。\n- 債務を右クリックで返済し、Alt+Shift で自動返済を有効化します。"
 MD_TUTORIAL_ECONOMY_RIGHT: "§Y予算画面§!\n- 国庫をクリックすると経済画面が開きます。\n- 予算タブでは §Y人口税率§! と §Y法人税率§! を調整できます。\n- 税率変更には政治力を使い、1段階用と5段階用のscripted costが分かれています。\n- §Y政策金利§! もここで変更し、実行には政治力25超が必要です。\n- 対外投資は右クリックで国庫へ売却し、Shiftクリックで再投資を切り替えます。"
 MD_TUTORIAL_POLITICS_TITLE: "政治と政党"
 MD_TUTORIAL_POLITICS_LEFT: "§Y拡張政治画面§!\n- Politics 画面には与党名、連立アイコン、連立支持率、政党ポジション一覧が追加されます。\n- 各ポジションには §YBoost§! と §YAttack§!、条件付きの §YBan§! と §YAllow§! があります。\n- scripted GUI は連立参加、現在の政権、各種しきい値を確認して有効化します。"
 MD_TUTORIAL_POLITICS_RIGHT: "§Y選挙管理§!\n- §YBan All§! と §YAllow All§! による一括管理もあります。\n- Politics 画面には §YElection Threshold§! の上下ボタンも追加されています。\n- しきい値は 1% 刻みで変更されます。\n- 与党、連立参加政党、しきい値未満の勢力には一部操作が使えません。"
 MD_TUTORIAL_INFLUENCE_TITLE: "外国影響力"
 MD_TUTORIAL_INFLUENCE_LEFT: "§Y影響力画面§!\n- 各国には §Y国内影響力§! と、外国影響国の順位一覧があります。\n- 外交画面から、手動影響、経済援助、軍事援助、政治工作、クーデター、経済搾取、傀儡化を行います。\n- 自動影響力は配列で複数国を追跡し、上限もあります。"
 MD_TUTORIAL_INFLUENCE_RIGHT: "§Y主な条件§!\n- ほとんどの行動は自国相手には表示されません。\n- 軍事援助には再使用待ちのクールダウンがあります。\n- 経済搾取は最上位影響国かつ 50% 超、傀儡化は最上位影響国かつ 80% 超が必要です。\n- 傀儡化には政体一致や平時であることも求められます。\n- 政治工作系は実行前に政治力コストを計算します。"
 MD_TUTORIAL_RESEARCH_TITLE: "研究枠"
 MD_TUTORIAL_RESEARCH_LEFT: "§Y研究枠専用画面§!\n- Technology タブには追加の §YResearch Slots§! ボタンがあります。\n- MDの追加研究枠は、§Y総GDP§! と §Y一人当たりGDP§! の2系統で増やします。\n- 片方は研究所拡張、もう片方は研究設備更新です。"
 MD_TUTORIAL_RESEARCH_RIGHT: "§Y解放条件§!\n- 各ボタンはグローバル配列から次の GDP または一人当たりGDP しきい値を参照します。\n- 実行すると即時ではなく、決定とタイマーを通じて研究枠が増えます。\n- scripted effect で中規模支出と教育費補正の再計算も発生します。\n- 最近拡張した直後は再実行できないよう制限があります。"
 MD_TUTORIAL_MILITARY_TITLE: "編制と生産"
 MD_TUTORIAL_MILITARY_LEFT: "§Yバニラ幅を前提にしない§!\n- MDの陸軍大隊には、車両化歩兵、機械化歩兵、戦車、空中強襲、砲兵など多くの独自種別があります。\n- §YMD_land_units.txt§! の combat_width は 0 から 5 まで幅広く、バニラ固定ではありません。\n- 師団設計は各大隊の幅とカテゴリーを見て組み直す必要があります。"
 MD_TUTORIAL_MILITARY_RIGHT: "§Y生産面の差分§!\n- 生産画面には追加の §YOil§! 資材欄があります。\n- 市場計算GUIには IFV、APC、MBT、ヘリなどのMD独自装備カテゴリがあります。\n- 生産と配備は、バニラの思い込みではなく装備役割と大隊カテゴリを基準に考えるのが安全です。"
 MD_TUTORIAL_ADVANCED_TITLE: "国際システムとエネルギー"
 MD_TUTORIAL_ADVANCED_LEFT: "§YInternational Systems§!\n- Logistics 横のボタンで MD の §YInternational Systems§! 画面を開きます。\n- ここには §YSpace Program§!、§YCounter-Terror§!、§YPMC§!、§YUnited Nations§!、§YCyber Warfare§! のタブがあります。\n- §YCyber Warfare§! は最初の §YEncryption§! と §YDecryption§! 技術が終わるまで解放されません。"
 MD_TUTORIAL_ADVANCED_RIGHT: "§YEnergy Screen§!\n- Construction タブには §YEnergy Screen§! ボタンも追加されています。\n- この画面では発電量、消費量、充足率、主要エネルギー建造物を管理します。\n- 電力制限、追加消費、濃縮施設、バッテリーパーク、燃料購入、原子炉燃料生産もここから扱います。"
