 MD_TUTORIAL_BODY_OVERVIEW_INTRO: "Millennium Dawnへようこそ！ MODをダウンロードしてプレイしていただきありがとうございます。初めての方は、各種メニューを見て回り、機能に慣れることをおすすめします。メニューは通常、各画面上部のボタンから開けます。助けが必要ですか？ Discordコミュニティに参加していただければ、質問や問題について喜んでサポートします。バグはポーズメニューの「Report An Issue」からゲーム内で報告するか、Discordの各チャンネルから報告できます。\n\n重要な情報:\n- ゲーム開始時に燃料がマイナスになっているのは、発電所と人口消費の影響によるものです。詳しくは建設メニュー内の Energy UI を確認してください。\n- Historical focus =/= historical outcomes です。historical focus オプションは、AIが各選択肢やイベントで可能な限り史実に近い選択をするよう促すためのものです。史実どおりの展開を保証するものではありません。"
 MD_TUTORIAL_BODY_ECONOMY_BUDGET: "国の経済の状況は右下の折れ線グラフのボタンから開ける経済パネルで情報を得ることができます。"
 MD_TUTORIAL_BODY_DEBUG: "これはレイアウト確認とスクロール確認のために入れている仮本文です。正式なチュートリアル本文は、構成が固まった後に差し替えます。\n\n【スクロール確認01】この行は本文エリアでスクロールが必要になるだけの高さを確保するための仮テキストです。\n【スクロール確認02】内容は意図的に繰り返しになっています。\n【スクロール確認03】下へ送って、番号付きの行が最後まで見えるか確認してください。\n【スクロール確認04】将来的にはここへ概念説明ベースの本文を入れます。\n【スクロール確認05】高さ調整用の仮文です。\n【スクロール確認06】高さ調整用の仮文です。\n【スクロール確認07】高さ調整用の仮文です。\n【スクロール確認08】高さ調整用の仮文です。\n【スクロール確認09】高さ調整用の仮文です。\n【スクロール確認10】高さ調整用の仮文です。\n【スクロール確認11】高さ調整用の仮文です。\n【スクロール確認12】高さ調整用の仮文です。\n【スクロール確認13】高さ調整用の仮文です。\n【スクロール確認14】高さ調整用の仮文です。\n【スクロール確認15】高さ調整用の仮文です。\n【スクロール確認16】高さ調整用の仮文です。\n【スクロール確認17】高さ調整用の仮文です。\n【スクロール確認18】高さ調整用の仮文です。\n【スクロール確認19】高さ調整用の仮文です。\n【スクロール確認20】高さ調整用の仮文です。\n【スクロール確認21】高さ調整用の仮文です。\n【スクロール確認22】高さ調整用の仮文です。\n【スクロール確認23】高さ調整用の仮文です。\n【スクロール確認24】高さ調整用の仮文です。\n【スクロール確認25】高さ調整用の仮文です。\n【スクロール確認26】高さ調整用の仮文です。\n【スクロール確認27】高さ調整用の仮文です。\n【スクロール確認28】高さ調整用の仮文です。\n【スクロール確認29】高さ調整用の仮文です。\n【スクロール確認30】この行が見えたら本文スクロールは最下部まで到達しています。\n【最下部マーカー】この行が表示されれば本文スクロールは正常です。"
