l_english:
 SAU_succession_category:0 "§HThe Succession Question§!"
 SAU_succession_category_desc:0 "King Fahd lies incapacitated. The Allegiance Council must choose the next §HCrown Prince§!. Each candidate represents a different vision for the kingdom's future."

 SAU_appoint_abdullah_crown_prince:0 "§LAppoint Abdullah§! as Crown Prince"
 SAU_appoint_abdullah_crown_prince_desc:0 "§LAbdullah bin Abdulaziz§! (b. 1924) — §Lde facto regent§! since 1995. The §Greformer§!, beloved by the desert tribes. Cautious modernization, national dialogue, careful relations with the §Lulema§!."

 SAU_appoint_sultan_crown_prince:0 "§LAppoint Sultan§! as Crown Prince"
 SAU_appoint_sultan_crown_prince_desc:0 "§LSultan bin Abdulaziz§! (b. 1928) — Defense Minister since 1962. Senior §Lal-Sudairi§!. The §Gsoldier-prince§! who runs the armed forces and the §LAl-Yamamah§! arms pipeline. The §LPentagon§!'s favorite Saudi."

 SAU_appoint_talal_crown_prince:0 "§LAppoint Talal§! as Crown Prince §M(Alt-Historical)§!"
 SAU_appoint_talal_crown_prince_desc:0 "§LTalal bin Abdulaziz§! (b. 1931) — the §M\"Red Prince\"§!. Once exiled to §LCairo§! for advocating a §Lconstitutional monarchy§!. A §Yshocking§! choice — but one that could open the kingdom to a future no Saud has yet imagined."

 SAU_appoint_bandar_crown_prince:0 "§LAppoint Bandar§! as Crown Prince §M(Alt-Historical)§!"
 SAU_appoint_bandar_crown_prince_desc:0 "§LBandar bin Sultan§! (b. 1949) — §LAmbassador to Washington§! since 1983. The §Gspymaster§!, friend of the §LBush family§!, master of §Hcovert action§!. A §Mgrandson§! of Ibn Saud rather than a son — an unprecedented generational leap."

 SAU_appoint_nayef_crown_prince:0 "§LAppoint Nayef§! as Crown Prince"
 SAU_appoint_nayef_crown_prince_desc:0 "§LNayef bin Abdulaziz§! (b. 1934) — Interior Minister since 1975. Architect of the §LMabahith§!. The §Giron hand§! the §Lulema§! trust and the dissidents fear. Security over reform; control over openness."

 SAU_appoint_salman_crown_prince:0 "§LAppoint Salman§! as Crown Prince"
 SAU_appoint_salman_crown_prince_desc:0 "§LSalman bin Abdulaziz§! (b. 1935) — §LGovernor of Riyadh§! for 48 years. The §Gpatient prince§!. Pragmatic, pious, administratively brilliant. And his son §LMohammed§! — ambitious in ways the kingdom is only beginning to grasp."
