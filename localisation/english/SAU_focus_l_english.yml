 SAU_unif_gcc_council:0 "§HThe Gulf Cooperation Council§!"
 SAU_unif_gcc_council_desc:0 "For two decades the §LGCC§! has been a paper alliance - a forum for monarchs to talk past each other. Riyadh proposes to make it §Hsomething more§!."
 SAU_unif_economic_union:0 "§HEconomic Union§!"
 SAU_unif_economic_union_desc:0 "A unified §Lcustoms zone§!, harmonized regulations, and the foundations of a §Hcommon market§! across the peninsula. The merchants of §LJeddah§! and §LDubai§! have waited a generation."
 SAU_unif_military_union:0 "§HMilitary Union§!"
 SAU_unif_military_union_desc:0 "The §LPeninsula Shield§! has existed on paper since 1984. Riyadh now proposes to give it §Hreal teeth§! - integrated command, shared procurement, and a unified doctrine."
 SAU_unif_political_union:0 "§HPolitical Union§!"
 SAU_unif_political_union_desc:0 "A coordinated foreign policy. A shared diplomatic line. The smaller emirates fear §YSaudi domination§! - but Riyadh insists this is a partnership of §Lequals among monarchs§!."
 SAU_unif_intra_trade:0 "§HIntra-GCC Trade§!"
 SAU_unif_intra_trade_desc:0 "Drop the last tariff barriers between member states. Goods, capital, and labour flow freely from §LMuscat§! to §LKuwait City§!."
 SAU_unif_common_market:0 "§HCommon Market§!"
 SAU_unif_common_market_desc:0 "A single regulatory framework: one set of standards, one customs document, one regional market of §L50 million consumers§!."
 SAU_unif_cross_border:0 "§HCross-Border Transit Systems§!"
 SAU_unif_cross_border_desc:0 "Highways, railways, and pipelines knit the peninsula together. The §LGCC Railway§! - long discussed, never built - finally breaks ground."
 SAU_unif_joint_research:0 "§HJoint Research Initiatives§!"
 SAU_unif_joint_research_desc:0 "A shared §Ltechnology fund§! pools resources for desalination, solar power, and petrochemical R&D. §LKAUST§! becomes the regional hub."
 SAU_unif_shared_currency:0 "§HShared Currency§!"
 SAU_unif_shared_currency_desc:0 "The §Hkhaleeji dinar§! - a single currency for the GCC, pegged not to the dollar but to a basket. The boldest economic step the peninsula has ever taken."
 SAU_unif_joint_defense:0 "§HJoint Defense Agreement§!"
 SAU_unif_joint_defense_desc:0 "An §LArticle 5§!-style mutual defense pact: an attack on one is an attack on all. §LIran§! takes notice."
 SAU_unif_gulf_academy:0 "§HThe Gulf Academy§!"
 SAU_unif_gulf_academy_desc:0 "A unified officer training academy in §LRiyadh§!. Future generals from every GCC state will share a classroom, a doctrine, and a §Hloyalty to the Alliance§!."
 SAU_unif_command_control:0 "§HCommand & Control§!"
 SAU_unif_command_control_desc:0 "A joint command center, integrated air defense, shared intelligence feeds. The Peninsula Shield gains the §Hnervous system§! it has always lacked."
 SAU_unif_joint_ventures:0 "§HGCC Joint Ventures§!"
 SAU_unif_joint_ventures_desc:0 "Joint defense industries, joint procurement, joint maintenance depots. Saudi capital, §LEmirati logistics§!, and §LBahraini shipyards§! become one §Hwar machine§!."
 SAU_unif_robust_alliance:0 "§HA Robust Alliance§!"
 SAU_unif_robust_alliance_desc:0 "No longer a paper organization. The §LPeninsula Shield§! is now a §Hreal army§! - 100,000 troops, modern equipment, unified doctrine."
 SAU_unif_pro_american:0 "§HSolidify Pro-American Alignment§!"
 SAU_unif_pro_american_desc:0 "The §LGCC§! formalizes its security partnership with Washington. Bases, training, weapons, intelligence - all flowing through Riyadh."
 SAU_unif_increase_autonomy:0 "§HIncrease Autonomy§!"
 SAU_unif_increase_autonomy_desc:0 "A more §Hindependent foreign policy§!. The GCC speaks for itself in international forums - not as an American client, but as a §Lregional power§!."
 SAU_unif_new_partners:0 "§HNew Partners§!"
 SAU_unif_new_partners_desc:0 "Beyond Washington: deals with §LBeijing§!, §LMoscow§!, §LDelhi§!, and §LBrussels§!. The peninsula diversifies its patrons."
 SAU_unif_pursue_hegemony:0 "§HPursue Hegemony§!"
 SAU_unif_pursue_hegemony_desc:0 "Riyadh moves from §Hfirst among equals§! to §Yundisputed leader§!. The smaller monarchies grumble - but they comply."
 SAU_unif_exploit_authority:0 "§HExploit Authority§!"
 SAU_unif_exploit_authority_desc:0 "Saudi Arabia uses its hegemony §Yhard-handedly§!. Member states that step out of line face §Heconomic pressure§! - or worse. The Alliance is now a §MSaudi empire§! in all but name."
 SAU_unif_benign_dominance:0 "§HBenign Dominance§!"
 SAU_unif_benign_dominance_desc:0 "Riyadh leads with a §Glighter touch§!: investment, patronage, and respect for the smaller emirates dignity. Hegemony without humiliation."
 SAU_unif_khaleeji_union:0 "§MThe Khaleeji Union§!"
 SAU_unif_khaleeji_union_desc:0 "The §Mfinal step§!: a confederation of the six monarchies, with shared sovereignty in foreign policy, defense, and currency. A §HUnited States of Arabia§! - led from §LRiyadh§!."

 SAU_focus_SAGIA_Initiative_investment:0 "§HEstablish SAGIA§!"
 SAU_focus_SAGIA_Initiative_investment_desc:0 "By royal decree, the §LSaudi Arabian General Investment Authority§! is established as the Kingdom's flagship body for attracting §Gforeign capital§!. Its job: §Hcut through the bureaucracy§!, §Hcourt the world's investors§!, and turn §LRiyadh§! into a magnet for §Hglobal business§!."

 SAU_focus_346:0 "§HOne-Stop Shop§!"
 SAU_focus_346_desc:0 "Foreign companies once spent §Yyears§! navigating overlapping ministries to register a business. SAGIA's §HOne-Stop Shop§! consolidates dozens of licensing steps into a §Gsingle counter§!. Bureaucracy yields, §Ycorruption recedes§!, and investors get answers in §Gdays, not years§!."

 SAU_focus_347:0 "§HOpen Strategic Sectors§!"
 SAU_focus_347_desc:0 "§LTelecommunications§!, §Linsurance§!, §Lmining§! - sectors once held by state-backed monopolies are thrown §Gopen§! to foreign capital. New competitors arrive bringing §Htechnology§!, §Hexpertise§!, and pressure on the old guard to §Ymodernize or die§!."

 SAU_focus_348:0 "§HForeign Investment Law of 2000§!"
 SAU_focus_348_desc:0 "For the first time, foreign nationals may own §G100%§! of a Saudi company in most sectors. The §YApril 2000§! law sweeps away ownership restrictions that have hobbled the Kingdom's economy for decades. §LWall Street§! takes notice; §Lthe City§! takes notice; the world takes notice."

 SAU_focus_349:0 "§HEconomic Cities Drive§!"
 SAU_focus_349_desc:0 "Six new economic cities are planned: §LKing Abdullah Economic City§! on the Red Sea, §LKnowledge Economic City§! in Madinah, §LPrince Abdulaziz bin Mousaed City§! in Hail, and others. Each is a §Hpurpose-built hub§! for industry, services, and trade - §Gengines of growth§! far from the oil fields."

 SAU_focus_350:0 "§HInternational Partnerships§!"
 SAU_focus_350_desc:0 "Joint ventures with §LGeneral Electric§!, §LDow Chemical§!, §LSumitomo§!, and §LMitsubishi§! bring §Hhard technology§! and §Hmanagerial expertise§! into the Kingdom. Saudi engineers learn alongside foreign masters; in time, the §Gapprentices§! will become the §Gmasters§!."

 SAU_focus_351:0 "§HTax Incentive Package§!"
 SAU_focus_351_desc:0 "Corporate tax rates for foreign investors are §Gslashed§! from §Y45%§! to §G20%§!. Personal income remains §Guntaxed§!. SAGIA broadcasts the message worldwide: the Kingdom not only §Gwelcomes§! foreign capital - it §Hcourts§! it."

 SAU_focus_352:0 "§MSaudi Arabia, Open for Business§!"
 SAU_focus_352_desc:0 "A §Mcapstone moment§!. Saudi Arabia ranks among the §Hworld's top investment destinations§!. Foreign capital floods the economic cities, joint ventures flourish, and the Kingdom's economy is §Gbroader§!, §Gdeeper§!, and §Gstronger§! than at any point in its history. §HThe vision has become reality§!."

 SAU_focus_The_Water_Crisis:0 "§HThe Water Crisis§!"
 SAU_focus_The_Water_Crisis_desc:0 "For decades, the Kingdom has §Yignored§! the gathering storm: the aquifers are dying, the §Ldesalination plants§! strain to keep up, and per-capita water use is among the §Yhighest in the world§!. The time for euphemisms is over. The crisis must be §Hnamed§! before it can be §Gsolved§!."

 SAU_saudi_own_companies_water:0 "§HNational Water Company§!"
 SAU_saudi_own_companies_water_desc:0 "Water is too §Hstrategic§! to outsource. The Kingdom invests in §LSaudi-owned§! desalination operators, training a new generation of national engineers and keeping the profits at home. The build-out is §Yslower§! - but the sovereignty is §Gabsolute§!."

 SAU_American_compnay_water:0 "§HForeign Water Operators§!"
 SAU_American_compnay_water_desc:0 "§LVeolia§!, §LMarubeni§!, §LGE Water§! - the world's foremost desalination experts are invited to operate the Kingdom's plants. Capacity comes online §Gquickly§! and the technical knowledge transfers in years, not decades. The cost: §Yforeign hands§! on the strategic faucet."

 SAU_remove_water_crisis_level2_to_1:0 "§HMaster the Crisis§!"
 SAU_remove_water_crisis_level2_to_1_desc:0 "Through national resolve - or foreign expertise - the Kingdom has brought its water situation under §Gcontrol§!. The aquifers are still finite, the desalination bills are still vast, but the spectre of a §Yhydraulic collapse§! has been pushed back. §LSaudi Arabia§! drinks easier."
