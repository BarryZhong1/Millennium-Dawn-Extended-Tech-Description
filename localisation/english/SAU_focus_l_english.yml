 SAU_royal_hub:0 "§HRoyal Court of the House of Saud§!"
 SAU_royal_hub_desc:0 "The Al Saud dynasty has ruled the Arabian heartland for generations. With King Fahd incapacitated by his 1995 stroke, the §Yreal power§! lies with the men jockeying around his sickbed."
 SAU_house_of_saud:0 "§HThe House of Saud§!"
 SAU_house_of_saud_desc:0 "Hundreds of princes, dozens of factions, one throne. The §Lal-Sudairi Seven§!, the §LJiluwi branch§!, the §LThunayyan line§! - all of them watch and wait."
 SAU_fahd_illness:0 "§HKing Fahd's Illness§!"
 SAU_fahd_illness_desc:0 "November 1995. King Fahd suffers a §Ymassive stroke§! that leaves him unable to govern. The Allegiance Council meets in secret. The kingdom now has §Hno effective ruler§!."
 SAU_regent_abdullah:0 "§LCrown Prince§! §HAbdullah Takes the Reins§!"
 SAU_regent_abdullah_desc:0 "Crown Prince Abdullah bin Abdulaziz - long sidelined by the §LSudairi Seven§! - now becomes §Lde facto regent§!. He is 72, pious, austere, and beloved by the Bedouin tribes. He has §Hten years§! to rebuild a kingdom Fahd let drift."
 SAU_regent_internal_unity:0 "§HUnite the Royal House§!"
 SAU_regent_internal_unity_desc:0 "The §LSudairis§! resent his ascent. The §LJiluwi§! and §LThunayyan§! branches watch warily. Abdullah summons the senior princes to §LRiyadh§! - all factions, all generations - and demands a §Hcommon front§!."
 SAU_regent_oil_throne:0 "§HSecure the Oil Throne§!"
 SAU_regent_oil_throne_desc:0 "Saudi Aramco. Saudi Arabia. The two are inseparable. With Brent at §L$25 a barrel§!, the budget is bleeding red. Abdullah orders the petroleum ministry to §Hstabilize production§! and rebuild reserves."
 SAU_regent_diplomatic_repair:0 "§HRepair Foreign Relations§!"
 SAU_regent_diplomatic_repair_desc:0 "Five years of Fahd's twilight have left Riyadh's diplomacy adrift. Relations with §LWashington§! are cool, with §LCairo§! distant, with §LIran§! frozen. Abdullah dispatches envoys in every direction."
 SAU_regent_consensus_council:0 "§HForge a Consensus Government§!"
 SAU_regent_consensus_council_desc:0 "Abdullah convenes a §LCouncil of Ministers§! that includes representatives from every major branch of the family. No more Sudairi monopoly. Decisions will be made by §Hconsensus, not faction§!."
 SAU_regent_riyal_anchor:0 "§HAnchor the Riyal§!"
 SAU_regent_riyal_anchor_desc:0 "The riyal has been pegged to the dollar at §L3.75§! since 1986. Abdullah orders SAMA to defend that peg with §Hevery reserve in the vault§! - the kingdom's credibility depends on it."
 SAU_regent_us_thaw:0 "§HThaw with Washington§!"
 SAU_regent_us_thaw_desc:0 "The §LDhahran§! and §LKhobar§! bombings poisoned the well. Abdullah meets quietly with the US ambassador. He cannot afford an enemy in Washington - not yet. A §Hcareful thaw§! begins."
 SAU_regent_clergy_settlement:0 "§HSettlement with the Ulema§!"
 SAU_regent_clergy_settlement_desc:0 "The Council of Senior Scholars receives Abdullah at §LMecca§!. He pledges to defend the §Lsacred mosques§! and the §LWahhabi§! orthodoxy. They pledge, in return, to bless his §Hquiet reforms§!."
 SAU_regent_succession_pact:0 "§HThe Succession Pact§!"
 SAU_regent_succession_pact_desc:0 "Abdullah, the senior princes, and the Allegiance Council reach a private agreement: when Fahd dies, §Lthere will be no fight§!. The throne passes peacefully. The pact is sealed in §Hblood and witness§!."
 SAU_regent_oil_dividend:0 "§HThe Oil Dividend§!"
 SAU_regent_oil_dividend_desc:0 "Brent climbs back to §L$30§!. Then §L$40§!. The treasury fills again. Abdullah uses the windfall to §Hpay down debt§!, fund schools, and quietly stockpile reserves for what comes next."
 SAU_regent_strategic_partner:0 "§HStrategic Partner Status§!"
 SAU_regent_strategic_partner_desc:0 "Washington reaffirms Saudi Arabia as a §Lmajor non-NATO ally§!. Arms sales resume. Intelligence sharing expands. Abdullah has rebuilt the §Hold America§! axis - but on his own terms."
 SAU_regent_arab_solidarity:0 "§HArab Solidarity Summit§!"
 SAU_regent_arab_solidarity_desc:0 "Abdullah hosts the §LArab League§! in Riyadh. §LMubarak§!, §LAssad§!, §LAbdullah of Jordan§! all attend. He proposes a §Lpan-Arab peace plan§! for Israel/Palestine. The §H2002 Initiative§! is born."
 SAU_death_of_king_fahd:0 "§MThe Death of King Fahd§!"
 SAU_death_of_king_fahd_desc:0 "August 1, 2005. King Fahd bin Abdulaziz dies at the age of §L84§!. Ten years of Abdullah's regency end. The kingdom mourns - and waits. The §Lsuccession pact§! is about to be tested."
 SAU_coronation_abdullah:0 "§HCoronation of King Abdullah§!"
 SAU_coronation_abdullah_desc:0 "August 3, 2005. Abdullah bin Abdulaziz is proclaimed §LKing§! and §LCustodian of the Two Holy Mosques§!. The princes pledge §Hbayah - allegiance§!. The kingdom has its sixth king."
 SAU_king_abdullah_era:0 "§HThe Era of King Abdullah§!"
 SAU_king_abdullah_era_desc:0 "2005. A new reign begins. Abdullah is 81, but vigorous. He has waited a lifetime for this throne. He has §Lten years§! - perhaps fifteen - to remake the kingdom in his §Hreformist image§!."
 SAU_reign_reformist:0 "§LCautious Reform§!"
 SAU_reign_reformist_desc:0 "Abdullah is no liberal, but he is no reactionary either. He believes in §Hgradual modernization§! - schools, universities, women in the workforce - so long as the §Lulema§! are §Mappeased§! and the throne is §Hnever questioned§!."
 SAU_reign_security:0 "§HSecurity & Counter-Terror§!"
 SAU_reign_security_desc:0 "September 11. Khobar Towers. The §LRiyadh compound bombings of 2003§!. Al-Qaeda has declared war on the House of Saud, and Abdullah responds with §Yruthless§! force. The §LMabahith§! are unleashed."
 SAU_reign_diplomacy:0 "§HActive Diplomacy§!"
 SAU_reign_diplomacy_desc:0 "Abdullah will not let Saudi Arabia drift the way Fahd did. He flies to §LTehran§!, to §LWashington§!, to §LBeijing§!, to §LMoscow§!. The kingdom will speak with one voice - §Lhis voice§! - on every continent."
 SAU_reign_national_dialogue:0 "§HThe National Dialogue§!"
 SAU_reign_national_dialogue_desc:0 "Abdullah convenes the §LKing Abdulaziz Center for National Dialogue§!. Sunnis and Shiites, men and women, clerics and intellectuals - all in one room. Unprecedented. The §Lulema§! grumble; Abdullah ignores them."
 SAU_reign_terror_crackdown:0 "§HCrush Al-Qaeda in the Kingdom§!"
 SAU_reign_terror_crackdown_desc:0 "For three years, the §LMabahith§! and the §LSaudi Special Forces§! hunt Al-Qaeda cell by cell. The §LAl-Yamamah compound§!, the §LRiyadh diplomatic quarter§!, the deserts of §LHail§!. By 2008, the network is §Hbroken§!."
 SAU_reign_regional_balance:0 "§HBalance the Region§!"
 SAU_reign_regional_balance_desc:0 "Iraq is in flames. Iran rises. Syria stirs. Abdullah works the phones - §LMubarak§!, §LAssad§!, §LErdogan§!, §Lthe Hashemites§! - building a §Hquiet Sunni front§! that does not look like one."
 SAU_reign_kaust:0 "§HKAUST: A University Like No Other§!"
 SAU_reign_kaust_desc:0 "The §LKing Abdullah University of Science and Technology§!. §L20 billion dollars§!. Co-educational. Foreign faculty. Religious police §Mforbidden§! to enter the campus. The clerics call it §Hheretical§!. Abdullah opens it anyway."
 SAU_reign_allegiance_council:0 "§HThe Allegiance Council§!"
 SAU_reign_allegiance_council_desc:0 "In 2006, Abdullah codifies royal succession. The §LAllegiance Council§!, made up of §L35 senior princes§!, will choose future kings. No more Sudairi monopoly. No more dying-in-bed politics. A §Hconstitutional§! step - within the limits of monarchy."
 SAU_reign_post_911:0 "§HPost-9/11 Recovery§!"
 SAU_reign_post_911_desc:0 "Fifteen of nineteen hijackers were Saudi. The §LUS Congress§! talks of designating the kingdom a state sponsor of terror. Abdullah works tirelessly - in Washington, in Riyadh, in the §Lpress§! - to §Hrestore§! the relationship. By 2009, it is repaired."
 SAU_reign_arab_peace:0 "§HRevive the Arab Peace Initiative§!"
 SAU_reign_arab_peace_desc:0 "The §L2002 Beirut Initiative§! offered §Lfull Arab recognition§! of Israel for a return to 1967 borders. Israel ignored it. Abdullah relaunches it in 2007 with §Hunanimous§! Arab League backing. Israel ignores it again - but the §Hmoral high ground§! is Saudi."
 SAU_reign_iran_contain:0 "§HContain Tehran§!"
 SAU_reign_iran_contain_desc:0 "Ahmadinejad rises. The Iranian nuclear program accelerates. Abdullah famously tells a US diplomat: §MCut off the head of the snake.§! He builds a §Hquiet anti-Iran coalition§! from §LCairo§! to §LIslamabad§!."
 SAU_death_of_king_abdullah:0 "§MThe Death of King Abdullah§!"
 SAU_death_of_king_abdullah_desc:0 "January 23, 2015. King Abdullah bin Abdulaziz dies at §L90§!. A reign of §Lten years§! ends. The §LAllegiance Council§! convenes within hours. Four princes have §Hcredible claims§! to the throne. The kingdom holds its breath."
 SAU_succession_question:0 "§HThe Succession Question§!"
 SAU_succession_question_desc:0 "King Abdullah is dead. The throne is empty - briefly. The §LAllegiance Council§! must choose, and §Lfour candidates§! stand before them: §LSalman§! the patient Sudairi, §LMuqrin§! the half-Yemeni, §LMohammed bin Nayef§! the spymaster, §LAhmed§! the traditionalist. The kingdom's next century rests on this choice."
 SAU_succ_salman:0 "§LKing§! §HSalman bin Abdulaziz§!"
 SAU_succ_salman_desc:0 "Salman, §L79§!, the last surviving §LSudairi Seven§!. §L48 years§! as Governor of Riyadh. Quiet, deliberate, §Yruthless§! when crossed. The Allegiance Council confirms him within hours. He has a son: §LMohammed§!."
 SAU_salman_sudairi_bloc:0 "§HConsolidate the Sudairi Bloc§!"
 SAU_salman_sudairi_bloc_desc:0 "Salman's full brothers are dead - but their sons remain. The §LSudairi clan§! still controls Defense, Interior, and the National Guard. Salman binds them tighter, with patronage and §Lblood§!."
 SAU_salman_council_authority:0 "§HCommand the Allegiance Council§!"
 SAU_salman_council_authority_desc:0 "Salman moves the §LAllegiance Council§! firmly under royal authority. Vetoes are overruled. Dissenting princes are §Mquietly§! sidelined. The Council exists - but it bends."
 SAU_salman_son_mbs:0 "§HElevate Mohammed bin Salman§!"
 SAU_salman_son_mbs_desc:0 "Within months of taking the throne, Salman names his §L29-year-old§! son §LMohammed§! as Defense Minister and head of the new §LCouncil for Economic Affairs§!. The §Hyounger generation§! is being §Mfast-tracked§!."
 SAU_salman_sideline_rivals:0 "§HSideline Internal Rivals§!"
 SAU_salman_sideline_rivals_desc:0 "Princes who opposed Salman's elevation find their §Lbudgets cut§!, their §Lpositions reorganized§!, their §Lsupporters reassigned§!. Within two years, the Sudairi line stands §Hunchallenged§!."
 SAU_salman_rule_by_decree:0 "§HRule by Royal Decree§!"
 SAU_salman_rule_by_decree_desc:0 "Salman issues §Lroyal decrees§! at an unprecedented pace. Ministries are reorganized. Subsidies are cut. The §LCouncil of Ministers§! becomes a rubber stamp. The §Hold consensus politics§! is dead."
 SAU_salman_promote_mbs:0 "§HMohammed bin Salman: Crown Prince§!"
 SAU_salman_promote_mbs_desc:0 "In June 2017, Salman dismisses §LMohammed bin Nayef§! and elevates his son §LMbS§! to Crown Prince. §LMbS§! detains MbN, freezes his accounts, and seizes his offices. The §Hgenerational shift§! is complete."
 SAU_salman_yemen_war:0 "§HThe Yemen War§!"
 SAU_salman_yemen_war_desc:0 "In March 2015, Salman launches §LOperation Decisive Storm§! against the §LHouthis§! in Yemen. A coalition of nine Arab states. Air strikes from §LJeddah§!, ground operations on the §Lborder§!. The war drags on for §Yyears§! - and §Yyears§!."
 SAU_salman_aramco_ipo:0 "§HThe Aramco IPO§!"
 SAU_salman_aramco_ipo_desc:0 "The kingdom's crown jewel - §LSaudi Aramco§! - is partially privatized. The largest IPO in history. §L25.6 billion dollars§! raised. The proceeds fund the §HPublic Investment Fund§! - MbS' strategic war chest."
 SAU_salman_vision_2030:0 "§HVision 2030§!"
 SAU_salman_vision_2030_desc:0 "A radical plan: §Hwean Saudi Arabia off oil§! by 2030. Tourism. Entertainment. Mining. Tech. The Religious Police lose their teeth. Women drive. Cinemas reopen after §L35 years§!. The kingdom of Salman and §LMbS§! is being §Mreinvented§! in real time."
 SAU_salman_neom:0 "§HNEOM: The Megaproject§!"
 SAU_salman_neom_desc:0 "§L500 billion dollars§!. A futuristic city in the §Lnorthwestern desert§!, larger than §LBelgium§!. Robot servants, flying cars, vertical farms. §LThe Line§!: a 170-kilometer linear city. Critics call it a §Mfantasy§!. MbS calls it §Hthe future§!."
 SAU_salman_purge:0 "§HThe Ritz-Carlton Purge§!"
 SAU_salman_purge_desc:0 "November 2017. §LMbS§! summons §L200 princes, ministers, and businessmen§! to the §LRitz-Carlton Riyadh§! - and arrests them. §L100 billion dollars§! in §Hsettlements§! is extracted. The old elite is §Yhumbled§! forever."
 SAU_succ_muqrin:0 "§LKing§! §HMuqrin bin Abdulaziz§!"
 SAU_succ_muqrin_desc:0 "Muqrin, §L69§!, the youngest son of Ibn Saud. Former §LRSAF pilot§!. Former §LGID intelligence chief§!. Abdullah named him §LDeputy Crown Prince§! in 2014 - but his mother was a §LYemeni concubine§!, and the §LSudairis§! never accepted him as fully §Hroyal§!."
 SAU_muqrin_intel_network:0 "§HCall on the GID Network§!"
 SAU_muqrin_intel_network_desc:0 "Muqrin spent §L7 years§! running the §LGeneral Intelligence Directorate§!. Every senior officer in the kingdom owes him a favor - or fears one. He calls in those debts §Hone by one§!."
 SAU_muqrin_buy_loyalty:0 "§HBuy the Senior Princes§!"
 SAU_muqrin_buy_loyalty_desc:0 "Stipends are doubled. Old debts forgiven. Land grants in the Hejaz. Muqrin understands what every Saudi king has understood: §Lthe family is bought before it is ruled§!. He §Hpays generously§!."
 SAU_muqrin_yemeni_outreach:0 "§HReach Out to the Yemeni Tribes§!"
 SAU_muqrin_yemeni_outreach_desc:0 "Muqrin's mother was Yemeni. He has spent his life living down that fact - now he weaponizes it. Tribal sheikhs from §LSadah§! and §LMarib§! are received in Riyadh. The §LHouthis§! are offered §Lback-channel§! talks."
 SAU_muqrin_old_pilots:0 "§HRally the Air Force Old Guard§!"
 SAU_muqrin_old_pilots_desc:0 "Muqrin was a §LLightning§! pilot in the §L1960s§!. He flew with the men who became today's air marshals. The §LRSAF§! becomes his personal power base - quiet, professional, §Hdevoted§!."
 SAU_muqrin_tribal_pact:0 "§HA New Tribal Pact§!"
 SAU_muqrin_tribal_pact_desc:0 "Muqrin convenes the great desert sheikhs at §LJanadriyah§!. Old oaths are renewed. New stipends are pledged. The §LAjman§!, the §LMutair§!, the §LShammar§!, the §LQahtan§! - all swear §Hbayah§!."
 SAU_muqrin_yemen_truce:0 "§HBroker a Yemen Truce§!"
 SAU_muqrin_yemen_truce_desc:0 "Drawing on his Yemeni heritage, Muqrin opens §Lback-channel§! talks with the §LHouthi§! leadership. A §Lconditional ceasefire§! is reached. The war freezes. The kingdom's southern border §Mquiets§!."
 SAU_muqrin_air_force_loyal:0 "§HThe Air Force Stands With the King§!"
 SAU_muqrin_air_force_loyal_desc:0 "When the Sudairis grumble about Muqrin's legitimacy, the §LRSAF§! commander publicly pledges loyalty. F-15s overfly Riyadh in formation. The message is §Hclear§!: the king has the §Lguns§!."
 SAU_muqrin_consensus_rule:0 "§HConsensus Rule§!"
 SAU_muqrin_consensus_rule_desc:0 "Muqrin governs by §Lpatience and patronage§!. Every major decision passes through the §LCouncil of Senior Princes§! and the §LAllegiance Council§!. The kingdom moves slowly - but it moves §Htogether§!."
 SAU_muqrin_oil_steady:0 "§HSteady Oil Policy§!"
 SAU_muqrin_oil_steady_desc:0 "No price wars. No production cuts that humiliate OPEC. Muqrin keeps the taps open at §Lmoderate volumes§! and lets prices find their level. The treasury fills §Hquietly§!. The shale producers in §LTexas§! grumble but survive."
 SAU_muqrin_yemen_normalize:0 "§HNormalize Yemen§!"
 SAU_muqrin_yemen_normalize_desc:0 "The Yemen ceasefire holds. Aid convoys cross the border. §LSanaa§! and §LRiyadh§! exchange ambassadors for the first time in years. The §Lgreat Arab tragedy§! becomes a §Mquiet§! reconciliation."
 SAU_muqrin_quiet_legacy:0 "§HA Quiet Legacy§!"
 SAU_muqrin_quiet_legacy_desc:0 "Muqrin will be remembered as the §Lking who did not start a war§!. No Vision 2030. No NEOM. No Ritz-Carlton purge. Just a kingdom that §Hsurvived§! - intact, sovereign, and at peace with its neighbors. Some princes call that the highest art of rule."
 SAU_succ_mbn:0 "§LKing§! §HMohammed bin Nayef§!"
 SAU_succ_mbn_desc:0 "MbN, §L55§!. The §LCounter-Terror Prince§!. Head of the §LInterior Ministry§!. Architect of the §Lpost-2003 crackdown§! against Al-Qaeda. Survivor of an Al-Qaeda assassination attempt in 2009. The §LCIA§! and §LMI6§! adore him."
 SAU_mbn_interior_ministry:0 "§HSeize Total Control of Interior§!"
 SAU_mbn_interior_ministry_desc:0 "MbN has run the §LInterior Ministry§! for years - now he §Lmerges§! it with the National Guard, the GID, and the Royal Diwan's security wing. The kingdom's §Hentire security apparatus§! reports to one man."
 SAU_mbn_us_partnership:0 "§HThe American Partnership§!"
 SAU_mbn_us_partnership_desc:0 "MbN flies to Washington within weeks. §LObama§! receives him as a §Lhead of state§!. Intelligence sharing deepens. Drone bases in the §LEmpty Quarter§!. Joint counter-terror operations from §LYemen§! to §LSyria§!."
 SAU_mbn_counter_terror:0 "§HCounter-Terror Prince§!"
 SAU_mbn_counter_terror_desc:0 "MbN survived §Lfour Al-Qaeda assassination attempts§!. He understands the threat better than anyone in the family. Al-Qaeda. ISIS. Iranian proxies. He hunts them all - methodically, §Yruthlessly§!, and with §Hforeign help§!."
 SAU_mbn_mabahith_expansion:0 "§HExpand the Mabahith§!"
 SAU_mbn_mabahith_expansion_desc:0 "The §LGeneral Investigations Directorate§! gets new powers, new prisons, and §Hbiometric§! databases. Every mosque sermon recorded. Every NGO registered. Every §Lphone call§! catalogued."
 SAU_mbn_intel_sharing:0 "§HDeep Intelligence Sharing§!"
 SAU_mbn_intel_sharing_desc:0 "Riyadh and §LLangley§! merge their counter-terror databases. SIGINT from §LFt. Meade§!. HUMINT from the §LMabahith§!. The kingdom becomes the §Lhub§! of Western intelligence in the §LMuslim world§!."
 SAU_mbn_yemen_quiet_war:0 "§HYemen: A Quiet Counter-Terror War§!"
 SAU_mbn_yemen_quiet_war_desc:0 "Instead of Salman's full-scale war, MbN runs Yemen as a §Lcounter-terror operation§!. Drone strikes. Special forces raids. Targeted assassinations. §LAl-Qaeda in the Arabian Peninsula§! is §Hdecimated§!. The Houthis are §Mcontained§!, not invaded."
 SAU_mbn_total_surveillance:0 "§HTotal Surveillance State§!"
 SAU_mbn_total_surveillance_desc:0 "Every Saudi - every §Lresident§!, every §Lpilgrim§! - is in a database. Facial recognition at every airport. Social media monitored §Lin real time§!. The §LStasi§! could not have dreamed of this scale. The kingdom is §Hsafe§!. The kingdom is §Mwatched§!."
 SAU_mbn_intel_state:0 "§HThe Intelligence State§!"
 SAU_mbn_intel_state_desc:0 "Under MbN, the §Lintelligence services§! become the §Hreal§! government. Ministers report to §LMabahith§! supervisors. Provinces are run by intelligence colonels in civilian dress. The §Lroyal court§! and the §Lsecurity state§! become indistinguishable."
 SAU_mbn_us_axis:0 "§HThe Riyadh-Washington Axis§!"
 SAU_mbn_us_axis_desc:0 "Saudi Arabia and the United States become §Lstrategic partners§! in everything but name. Joint command structures. Shared bases. MbN visits the White House more than any other foreign leader. The kingdom is the §Hcornerstone§! of the American Middle East."
 SAU_mbn_iran_containment:0 "§HContain Iran§!"
 SAU_mbn_iran_containment_desc:0 "A §Lmaximum pressure§! campaign. Sanctions. Sabotage. Cyber operations. MbN funds the §LMEK§!. He arms the §LBalochs§!. He runs §Lback-channel§! ops the official Foreign Ministry knows nothing about. Tehran feels the §Mnoose§! tighten."
 SAU_mbn_drone_war:0 "§HThe Drone War§!"
 SAU_mbn_drone_war_desc:0 "From bases in the §LEmpty Quarter§!, Saudi and American drones fly nightly missions over §LYemen§!, §LSomalia§!, §Lthe Sahel§!. Targeted killings. Signals intelligence. §LQasem Soleimani§! is killed in a §LBaghdad§! airport - and Riyadh helps locate him."
 SAU_succ_ahmed:0 "§LKing§! §HAhmed bin Abdulaziz§!"
 SAU_succ_ahmed_desc:0 "Ahmed, §L72§!. Senior §LSudairi§! - full brother of §LSalman§!. Briefly Interior Minister in §L2012§!. Lives in §LLondon§! much of the year. Conservative, traditional, §Lallergic to spectacle§!. Some princes prefer him precisely §Hfor that§!."
 SAU_ahmed_senior_council:0 "§HConvene the Senior Princes§!"
 SAU_ahmed_senior_council_desc:0 "Ahmed governs through the §LCouncil of Senior Princes§! - the §Lold men§! who remember the kingdom of §LFaisal§! and §LKhaled§!. Decisions are made slowly, by consensus, in long evening sessions over coffee and dates."
 SAU_ahmed_clerical_blessing:0 "§HThe Clerical Blessing§!"
 SAU_ahmed_clerical_blessing_desc:0 "The §LCouncil of Senior Scholars§! receives Ahmed warmly. He is the §Lmost orthodox§! of his generation. He pledges to §Hdefend the sacred mosques§! and the Wahhabi orthodoxy. They pledge, in return, to §Hbless§! his rule."
 SAU_ahmed_old_alliances:0 "§HRevive the Old Alliances§!"
 SAU_ahmed_old_alliances_desc:0 "The kingdom's historic friends - §LJordan§!, §LMorocco§!, §LBahrain§!, §LKuwait§! - are courted with the kind of §Lpersonal diplomacy§! that died with Faisal. State visits. Royal weddings. The §HArab order of the 1970s§! quietly returns."
 SAU_ahmed_consensus_decisions:0 "§HRule by Consensus§!"
 SAU_ahmed_consensus_decisions_desc:0 "Every decree passes through the §LSenior Council§!. Every reform must clear the §Lulema and the tribes§!. The kingdom moves §Lslowly§! - but it moves §Htogether, in one piece§!."
 SAU_ahmed_wahhabi_pact:0 "§HRenew the Wahhabi Pact§!"
 SAU_ahmed_wahhabi_pact_desc:0 "The §LAl ash-Sheikh§! - the descendants of §LMuhammad ibn Abd al-Wahhab§! - are restored to their old prominence. Religious courts regain authority. The §LGrand Mufti§! becomes a §Lpolitical§! voice once more. The pact of §L1744§! lives on."
 SAU_ahmed_quiet_diplomacy:0 "§HQuiet Diplomacy§!"
 SAU_ahmed_quiet_diplomacy_desc:0 "No press conferences. No grand summits. Ahmed's envoys travel quietly to §LDamascus§!, to §LTehran§!, to §LCairo§!. Differences are §Lsmoothed§! in private rooms. The kingdom speaks softly - and the region §Hlistens§!."
 SAU_ahmed_no_yemen_war:0 "§HAvoid the Yemen War§!"
 SAU_ahmed_no_yemen_war_desc:0 "Ahmed refuses to launch the war Salman would have launched. The §LHouthis§! are an internal Yemeni problem, not a Saudi one. Aid is offered, mediation is provided, but §Hno bombs fall§!. The southern border stays §Mquiet§!."
 SAU_ahmed_council_rule:0 "§HCouncil Rule§!"
 SAU_ahmed_council_rule_desc:0 "The §LAllegiance Council§! gains real power under Ahmed. The §LCouncil of Senior Princes§! gains more. The §LMajlis al-Shura§! gains its first §Helected§! members. A kingdom that is still a kingdom - but a §Lconsultative§! one."
 SAU_ahmed_old_kingdom:0 "§HThe Old Kingdom§!"
 SAU_ahmed_old_kingdom_desc:0 "No Vision 2030. No NEOM. No Ritz-Carlton purge. No war in Yemen. Just the §Lold kingdom§! of the §L1970s§! and §L80s§!, run by the old §Lprinces§! the old way - quietly, conservatively, with §Hdignity§!."
 SAU_ahmed_quiet_pact:0 "§HA Quiet Pact with Iran§!"
 SAU_ahmed_quiet_pact_desc:0 "Through quiet §LOmani§! mediation, Ahmed reaches an §Lunderstanding§! with §LTehran§!. No nuclear war. No proxy wars. No public statements. Just two empires §Hagreeing§! to leave each other alone for a while."
 SAU_ahmed_traditional_balance:0 "§HTraditional Regional Balance§!"
 SAU_ahmed_traditional_balance_desc:0 "The kingdom returns to the foreign policy of King §LFaisal§!: §LSunni-Shia balance§!, §LArab solidarity§!, §Lprudent friendship§! with the West. No grand crusades. No regional wars. Just the §Hold balance§!, slowly restored."
 SAU_modern_kingdom:0 "§HThe Modern Kingdom§!"
 SAU_modern_kingdom_desc:0 "Whatever path the §LHouse of Saud§! chose, the kingdom has §Hsurvived its succession crisis§!. The throne is secure. The oil flows. The pilgrims come. The §Lcrown of King Abdulaziz§! still rests on the head of his sons - or grandsons - and the world still must reckon with §LRiyadh§!."
