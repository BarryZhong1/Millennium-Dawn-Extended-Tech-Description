l_english:
 CHI_NKO_bilateral_cooperation: "Sino-Korean Bilateral Cooperation"
 CHI_NKO_bilateral_cooperation_desc: "The Treaty of Friendship, Cooperation and Mutual Assistance between China and North Korea, signed in 1961, remains the cornerstone of bilateral relations. Reaffirming this commitment opens the door to deeper cooperation across economic, military, and political domains."
 CHI_NKO_border_trade_zones: "Border Trade Zones"
 CHI_NKO_border_trade_zones_desc: "The Dandong-Sinuiju corridor handles over 80% of trade between China and North Korea. Formalizing border trade zones streamlines customs and increases the volume of goods crossing the Yalu River."
 CHI_NKO_rason_sez: "Rason Special Economic Zone"
 CHI_NKO_rason_sez_desc: "The Rason Special Economic Zone in northeastern North Korea was established to attract foreign investment. Chinese capital flows into the zone to develop light industry, logistics, and port facilities."
 CHI_NKO_dandong_trade_hub: "Dandong Trade Hub"
 CHI_NKO_dandong_trade_hub_desc: "Dandong, the largest Chinese city on the North Korean border, serves as the primary commercial gateway. Investment in trade infrastructure strengthens its role as the central node for bilateral commerce."
 CHI_NKO_mineral_extraction: "Mineral Extraction Agreements"
 CHI_NKO_mineral_extraction_desc: "North Korea possesses significant deposits of rare earth minerals, coal, iron, and magnesite. Chinese mining companies secure extraction rights in exchange for revenue and technical assistance."
 CHI_NKO_fisheries_agreement: "Fisheries Agreement"
 CHI_NKO_fisheries_agreement_desc: "Formal agreements governing fishing rights in the Yellow Sea benefit both nations. North Korea receives licensing fees while China gains access to productive fishing grounds."
 CHI_NKO_yuan_settlement: "Yuan-Based Trade Settlement"
 CHI_NKO_yuan_settlement_desc: "Transitioning bilateral trade to yuan-denominated settlement reduces North Korea's dependence on the US dollar and integrates its economy more closely with China's financial system."
 CHI_NKO_labor_export: "North Korean Labor Export"
 CHI_NKO_labor_export_desc: "Tens of thousands of North Korean workers are employed in Chinese factories, restaurants, and construction sites, primarily in the Dandong area. Their wages provide a vital source of foreign currency for Pyongyang."
 CHI_NKO_yalu_river_bridge: "New Yalu River Bridge"
 CHI_NKO_yalu_river_bridge_desc: "The New Yalu River Bridge connecting Dandong to Sinuiju provides a modern crossing for freight and passenger traffic. Its opening transforms cross-border logistics capacity."
 CHI_NKO_rail_modernization: "Rail Link Modernization"
 CHI_NKO_rail_modernization_desc: "The aging rail links between China and North Korea require modernization. Upgrading the Dandong-Sinuiju and Tumen-Namyang railway corridors increases cargo capacity and reduces transit times."
 CHI_NKO_energy_cooperation: "Energy Cooperation"
 CHI_NKO_energy_cooperation_desc: "China supplies the majority of North Korea's crude oil through a pipeline from Dandong. Expanding energy cooperation includes electricity exports and fuel supply agreements that keep the North Korean economy running."
 CHI_NKO_telecom_network: "Telecommunications Network"
 CHI_NKO_telecom_network_desc: "Chinese telecommunications firms assist in building North Korea's mobile and fiber optic infrastructure. The Koryolink network and cross-border data cables modernize communications within the country."
 CHI_NKO_power_grid_link: "Cross-Border Power Grid"
 CHI_NKO_power_grid_link_desc: "Linking the Chinese and North Korean power grids through cross-border transmission lines stabilizes electricity supply. The Supung Dam on the Yalu River has long served as shared infrastructure."
 CHI_NKO_paektu_tourism: "Mt. Paektu Tourism Zone"
 CHI_NKO_paektu_tourism_desc: "Mt. Paektu, known as Changbaishan in China, is sacred to both nations. Developing a joint tourism zone attracts visitors from both sides of the border and generates revenue for the local economy."
 CHI_NKO_defense_consultations: "Defense Consultations"
 CHI_NKO_defense_consultations_desc: "Regular high-level military consultations between the PLA and KPA strengthen mutual understanding of security threats and coordinate defense planning in Northeast Asia."
 CHI_NKO_military_exchanges: "Military Personnel Exchanges"
 CHI_NKO_military_exchanges_desc: "Officer training programs and military academy exchanges build personal relationships between Chinese and North Korean military leadership. Shared doctrine development improves interoperability."
 CHI_NKO_joint_naval_patrols: "Joint Naval Patrols"
 CHI_NKO_joint_naval_patrols_desc: "Coordinated naval patrols in the Yellow Sea address shared maritime security concerns, including anti-smuggling operations, fisheries enforcement, and deterrence of foreign naval activity."
 CHI_NKO_air_defense_umbrella: "Integrated Air Defense"
 CHI_NKO_air_defense_umbrella_desc: "Chinese radar coverage and air defense systems extend a protective umbrella over the Sino-Korean border region. Sharing early warning data enhances North Korea's ability to detect and respond to aerial threats."
 CHI_NKO_arms_transfers: "Defense Equipment Transfers"
 CHI_NKO_arms_transfers_desc: "China provides military equipment including vehicles, small arms, ammunition, and components to modernize the Korean People's Army. These transfers maintain North Korea's conventional deterrence capability."
 CHI_NKO_buffer_state_doctrine: "Buffer State Doctrine"
 CHI_NKO_buffer_state_doctrine_desc: "China's strategic interest in maintaining North Korea as a buffer against US forces in South Korea and Japan is formalized into joint defense planning. Both nations commit to mutual defense cooperation."
 CHI_NKO_party_to_party_dialogue: "Party-to-Party Dialogue"
 CHI_NKO_party_to_party_dialogue_desc: "The Chinese Communist Party and the Workers' Party of Korea maintain regular inter-party dialogue. These exchanges reinforce ideological solidarity and coordinate positions on international issues."
 CHI_NKO_cultural_exchanges: "Cultural Exchange Programs"
 CHI_NKO_cultural_exchanges_desc: "Student exchanges, artistic delegations, and friendship visits between China and North Korea foster mutual understanding and strengthen the people-to-people ties underpinning the bilateral relationship."
 CHI_NKO_un_coordination: "UN Voting Coordination"
 CHI_NKO_un_coordination_desc: "China leverages its permanent seat on the UN Security Council to shield North Korea from the harshest international sanctions. Coordinated diplomatic positions provide Pyongyang with crucial political cover."
 CHI_NKO_sanctions_circumvention: "Sanctions Circumvention"
 CHI_NKO_sanctions_circumvention_desc: "Through ship-to-ship transfers, front companies, and informal trade channels, North Korea circumvents international sanctions with tacit Chinese cooperation. This shadow economy provides essential revenue but carries diplomatic risk."
 CHI_NKO_strategic_partnership: "Strategic Partnership Declaration"
 CHI_NKO_strategic_partnership_desc: "A formal declaration of strategic partnership elevates the bilateral relationship to its highest level. Both nations commit to comprehensive cooperation and mutual support in pursuit of shared interests."
 CHI_NKO_border_trade_idea: "Dandong-Sinuiju Border Trade"
 CHI_NKO_yuan_trade_idea: "Yuan-Denominated Trade"
 CHI_NKO_cheap_labor_idea: "North Korean Labor Force"
 CHI_NKO_energy_supply_idea: "Chinese Energy Supply"
 CHI_NKO_telecom_idea: "Telecommunications Modernization"
 CHI_NKO_air_defense_support_idea: "Chinese Air Defense Umbrella"
 CHI_NKO_defense_cooperation_idea: "Sino-Korean Defense Cooperation"
 CHI_NKO_strategic_partners_idea: "Sino-Korean Strategic Partnership"
