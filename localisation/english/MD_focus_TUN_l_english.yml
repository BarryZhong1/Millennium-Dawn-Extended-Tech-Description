l_english:
 TUN_extend_term_limits: "Extend Term Limits"
 TUN_extend_term_limits_desc: "Rather than eliminating term limits entirely, a more modest extension would allow Ben Ali to remain in office while preserving some constitutional constraints. This approach might be more palatable domestically and internationally while still ensuring continued rule."

 TUN_president_for_life: "President for Life"
 TUN_president_for_life_desc: "With constitutional constraints removed, Ben Ali's position is unassailable. The presidency has become a life tenure in all but name. The machinery of state exists to perpetuate his rule, and no mechanism remains to challenge his authority through legal means."

 TUN_immunity_clause: "Presidential Immunity Clause"
 TUN_immunity_clause_desc: "Constitutional provisions granting the president absolute immunity from prosecution, both during and after his tenure, will protect Ben Ali and his family from any future legal accountability. This guarantee ensures the regime's inner circle need never fear the consequences of their actions."

 TUN_managed_transition: "Managed Transition Planning"
 TUN_managed_transition_desc: "Even with extended term limits, planning for eventual succession is prudent. A managed transition to a chosen successor could preserve the regime's essential character while providing for orderly change when the time comes."

 TUN_managing_dissent: "Managing Dissent"
 TUN_managing_dissent_desc: "Despite the regime's comprehensive controls, discontent occasionally erupts into open protest. The security apparatus must be prepared to contain and suppress these outbreaks before they can spread, using a combination of force, co-optation, and limited concessions."

 TUN_gafsa_revolt_2008: "Gafsa Mining Basin Revolt"
 TUN_gafsa_revolt_2008_desc: "In early 2008, protests erupted in the phosphate mining region around Gafsa following rigged hiring at the state mining company. Unemployed youth, supported by local UGTT activists, mounted the most serious challenge to the regime in years. The response will set a precedent."

 TUN_crush_gafsa: "Crush the Gafsa Revolt"
 TUN_crush_gafsa_desc: "The Gafsa protests must be suppressed with overwhelming force. Mass arrests, military deployment, and harsh sentences for organizers will demonstrate that dissent carries unacceptable costs. The region will be pacified, and the message will echo across Tunisia."

 TUN_concessions_gafsa: "Gafsa Concessions"
 TUN_concessions_gafsa_desc: "Rather than relying solely on repression, targeted concessions to the Gafsa region might defuse tensions without encouraging further protests. Jobs programs, infrastructure investment, and co-optation of local leaders could restore calm while addressing some legitimate grievances."

 TUN_student_movements: "Student Movements"
 TUN_student_movements_desc: "Universities have always been hotbeds of political activism, and Tunisian campuses are no exception. Student movements, often aligned with leftist or Islamist ideologies, require constant surveillance and occasional intervention to prevent them from becoming platforms for organized opposition."

 TUN_infiltrate_campuses: "Campus Infiltration"
 TUN_infiltrate_campuses_desc: "Security services maintain networks of informers among students and faculty, monitoring political activity and identifying potential troublemakers. This surveillance ensures that student activism can be contained before it poses a genuine threat to the regime."

 TUN_western_legitimacy: "Western Legitimacy"
 TUN_western_legitimacy_desc: "The regime has cultivated a favorable image in Western capitals, presenting Tunisia as a stable, moderate, and economically successful partner. This international legitimacy provides political cover for domestic repression and ensures continued support from key allies."

 TUN_best_friend_of_west: "The West's Best Friend"
 TUN_best_friend_of_west_desc: "Tunisia positions itself as the West's most reliable Arab partner: secular, stable, cooperative on terrorism, and open to business. This reputation shields the regime from criticism of its human rights record and ensures continued diplomatic and economic support."

 TUN_imf_world_bank_darling: "IMF and World Bank Darling"
 TUN_imf_world_bank_darling_desc: "Tunisia has been praised by international financial institutions as a model of economic reform and development in the Arab world. This endorsement attracts investment, provides access to financing, and legitimizes the regime's economic policies despite their uneven benefits."

 TUN_mediterranean_partnership: "Mediterranean Partnership"
 TUN_mediterranean_partnership_desc: "Tunisia's active participation in Euro-Mediterranean partnership frameworks cements its status as a privileged partner of the European Union. This relationship provides economic benefits, diplomatic protection, and a veneer of international respectability."

 TUN_interior_neglect: "Interior Neglect"
 TUN_interior_neglect_desc: "The regime's development model has concentrated investment and opportunity along the coast, leaving the interior governorates impoverished and resentful. This geographic inequality is politically sustainable as long as the interior remains atomized and controlled, but it stores up grievances for the future."

 TUN_ignore_interior: "Continue Ignoring the Interior"
 TUN_ignore_interior_desc: "The interior generates little economic value and even less political threat. Continuing to concentrate resources on the productive coastal regions maximizes growth and enriches the regime's cronies, even if it deepens regional inequality."

 TUN_token_development: "Token Interior Development"
 TUN_token_development_desc: "Some investment in the interior might defuse the worst grievances without fundamentally changing the development model. Showcase projects, job programs, and infrastructure could provide political cover while the coastal economy remains the priority."

 TUN_end_of_ben_ali: "The End of Ben Ali"
 TUN_end_of_ben_ali_desc: "The unthinkable has happened. Ben Ali has fled, the RCD has collapsed, and Tunisia stands at a crossroads. The revolution has swept away the old order, but what will replace it remains to be determined. Multiple political forces now compete to shape Tunisia's future."

 TUN_ennahda_path: "Ennahda Path"
 TUN_ennahda_path_desc: "Ennahda, the Islamist party suppressed for decades under Ben Ali, has emerged from the revolution as a major political force. Drawing on organizational discipline, a motivated base, and the appeal of Islamic identity, Ennahda seeks to guide Tunisia toward a society shaped by Islamic values."

 TUN_ghannouchi_leadership: "Ghannouchi's Leadership"
 TUN_ghannouchi_leadership_desc: "Rached Ghannouchi, the intellectual leader of Ennahda who spent over two decades in exile, has returned to lead his movement in the new Tunisia. His vision for Islamic democracy and his tactical choices will shape whether Ennahda succeeds or fails."

 TUN_moderate_islamism: "Moderate Islamist Course"
 TUN_moderate_islamism_desc: "Ghannouchi advocates a moderate, democratic Islamism that accepts pluralism, works within constitutional frameworks, and seeks gradual change through persuasion rather than coercion. This approach aims to reassure secular Tunisians and Western partners while advancing Islamic values."

 TUN_islamist_hardline: "Hardline Islamist Course"
 TUN_islamist_hardline_desc: "Some within Ennahda reject Ghannouchi's moderation, demanding rapid implementation of Islamic law and a more confrontational stance toward secularism. This hardline approach would pursue a more ambitious transformation of Tunisian society regardless of opposition."

 TUN_separate_dawa_politics: "Separate Dawa from Politics"
 TUN_separate_dawa_politics_desc: "Ennahda formally separates its political activities from religious preaching, rebranding itself as a party of Muslim democrats rather than political Islam. This strategic evolution aims to normalize Ennahda within Tunisia's democratic framework and reassure skeptics."

 TUN_sharia_constitution: "Sharia in the Constitution"
 TUN_sharia_constitution_desc: "The constitution should explicitly establish sharia as the source of legislation, embedding Islamic law at the foundation of the state. This would fulfill the aspirations of those who see the revolution as an opportunity for Islamic renewal."

 TUN_muslim_democrat_model: "Muslim Democrat Model"
 TUN_muslim_democrat_model_desc: "Ennahda completes its evolution into a Muslim democratic party comparable to Christian democratic parties in Europe. Islamic values inform its positions, but it operates fully within democratic rules and accepts the legitimacy of secular opponents."

 TUN_islamist_republic: "Islamist Republic"
 TUN_islamist_republic_desc: "Tunisia transforms into an Islamist republic where religious law shapes public policy and Islamic values permeate state and society. This represents a fundamental break from Bourguiba's secular legacy and the fulfillment of decades of Islamist aspiration."

 TUN_align_qatar_turkey: "Align with Qatar and Turkey"
 TUN_align_qatar_turkey_desc: "Ennahda's natural allies are the states that have supported Islamist movements across the region: Qatar with its financial resources and media influence, and Turkey with its model of Islamic democracy. Alignment with these powers provides external support for Tunisia's Islamist course."

 TUN_brotherhood_solidarity: "Muslim Brotherhood Solidarity"
 TUN_brotherhood_solidarity_desc: "Ennahda maintains fraternal ties with Muslim Brotherhood movements across the Arab world, from Egypt to Morocco. This network of solidarity provides ideological support, tactical advice, and a sense of shared purpose in the project of Islamic political revival."

 TUN_nidaa_tounes_path: "Nidaa Tounes Path"
 TUN_nidaa_tounes_path_desc: "Nidaa Tounes represents the coalition of forces opposed to Islamist governance: secular intellectuals, former RCD members, leftists, and those who fear the erosion of Tunisia's progressive traditions. Under Essebsi's leadership, this diverse coalition seeks to preserve Bourguiba's legacy."

 TUN_essebsi_leadership: "Essebsi's Leadership"
 TUN_essebsi_leadership_desc: "Beji Caid Essebsi, the octogenarian veteran of Tunisian politics who served under both Bourguiba and briefly under Ben Ali, has emerged as the standard-bearer of secular forces. His experience, gravitas, and claim to Bourguiba's legacy make him a formidable political figure."

 TUN_rehabilitate_rcd_cadres: "Rehabilitate RCD Cadres"
 TUN_rehabilitate_rcd_cadres_desc: "The former officials and functionaries of Ben Ali's RCD possess administrative experience that the new Tunisia desperately needs. Rehabilitating these cadres would strengthen governance capacity but risks betraying the revolution's demand for a clean break with the past."

 TUN_big_tent_coalition: "Big Tent Coalition"
 TUN_big_tent_coalition_desc: "Nidaa Tounes can succeed only as a broad coalition uniting all those who oppose Islamist governance, from leftists to liberals to former regime figures. Maintaining this diverse coalition requires careful management and a focus on shared opposition rather than positive program."

 TUN_old_guard_restoration: "Old Guard Restoration"
 TUN_old_guard_restoration_desc: "With former RCD cadres rehabilitated and in positions of influence, the distinction between the new Tunisia and the old regime becomes increasingly blurred. The old guard's experience comes at the cost of continuity with the authoritarian past."

 TUN_consensus_politics: "Consensus Politics"
 TUN_consensus_politics_desc: "Rather than seeking to exclude Ennahda entirely, Nidaa Tounes pursues a consensus approach that brings the Islamists into governing coalitions under secular leadership. This grand bargain sacrifices ideological purity for political stability."

 TUN_anti_islamist_stance: "Anti-Islamist Stance"
 TUN_anti_islamist_stance_desc: "The secular coalition's defining purpose is opposition to political Islam. This anti-Islamist stance unites disparate forces and provides clear political differentiation, though it risks reducing politics to a single axis of conflict."

 TUN_france_alignment: "France Alignment"
 TUN_france_alignment_desc: "France, the former colonial power, has deep interests in Tunisian stability and strong preferences for secular governance. Close alignment with Paris provides political support, economic assistance, and a counterweight to Islamist influence."

 TUN_eu_partnership: "EU Partnership Priority"
 TUN_eu_partnership_desc: "The European Union represents Tunisia's most important economic and political partner. Prioritizing EU relations through trade agreements, political dialogue, and regulatory alignment anchors Tunisia in the Western institutional framework."

 TUN_pdl_path: "Free Destourian Party Path"
 TUN_pdl_path_desc: "The Free Destourian Party, led by the fiery Abir Moussi, makes no apologies for the Ben Ali era. Moussi argues that Tunisia was more stable, secure, and prosperous under authoritarian rule, and that democratic chaos has only brought corruption, terrorism, and economic decline."

 TUN_abir_moussi_leadership: "Abir Moussi's Leadership"
 TUN_abir_moussi_leadership_desc: "Abir Moussi, a former RCD official and outspoken defender of the old regime, has built a political movement around nostalgia for authoritarian stability and hatred of political Islam. Her confrontational style and unapologetic positions have attracted a significant following."

 TUN_bourguiba_legacy: "Claim Bourguiba's Legacy"
 TUN_bourguiba_legacy_desc: "The PDL positions itself as the true heir to Habib Bourguiba's modernizing, secularist project. By claiming this legacy, Moussi seeks to distinguish her movement from Ben Ali's corruption while defending authoritarian methods as necessary for progress."

 TUN_ban_islamist_parties: "Ban Islamist Parties"
 TUN_ban_islamist_parties_desc: "Political Islam is fundamentally incompatible with Tunisian values and must be prohibited. Banning Ennahda and other Islamist parties would eliminate the threat they pose to Tunisia's secular character, though it would also end democratic competition."

 TUN_secular_authoritarianism: "Secular Authoritarianism"
 TUN_secular_authoritarianism_desc: "Tunisia's experiment with democracy has failed. A return to authoritarian governance, this time explicitly committed to secular values and modernization, offers the only path to stability and progress. Democracy was tried and found wanting."

 TUN_uae_saudi_backing: "UAE and Saudi Backing"
 TUN_uae_saudi_backing_desc: "The United Arab Emirates and Saudi Arabia share the PDL's hostility to political Islam and have supported secular authoritarian forces across the Arab world. Their backing provides financial resources and political legitimacy for Tunisia's anti-Islamist course."

 TUN_new_destourian_republic: "New Destourian Republic"
 TUN_new_destourian_republic_desc: "Tunisia is reconstituted as a Destourian republic in the mold of Bourguiba's original vision: modernizing, secular, and unapologetically authoritarian. The democratic experiment is ended, and a new strong state emerges from the chaos of the transition years."

 TUN_saied_path: "Kais Saied Path"
 TUN_saied_path_desc: "Kais Saied, the constitutional law professor who swept to power on a wave of anti-establishment sentiment, pursues a revolutionary restructuring of Tunisian governance. His vision of direct democracy through local councils threatens the entire political class."

 TUN_anti_system_populism: "Anti-System Populism"
 TUN_anti_system_populism_desc: "Saied's appeal rests on total rejection of the political establishment. All parties, all politicians, all the institutions of the transition period are corrupt and must be swept away. Only direct connection between the president and the people can realize the revolution's true promise."

 TUN_invoke_article_80: "Invoke Article 80"
 TUN_invoke_article_80_desc: "Article 80 of the 2014 constitution grants the president exceptional powers in cases of imminent danger to the state. Saied interprets this provision expansively, using it to justify suspension of normal constitutional governance and concentration of all power in his hands."

 TUN_anti_corruption_campaign: "Anti-Corruption Campaign"
 TUN_anti_corruption_campaign_desc: "Corruption has poisoned Tunisia's democratic transition, enriching politicians while ordinary citizens suffered. Saied launches a sweeping campaign against corruption, targeting political opponents and demonstrating that the old ways of doing business are over."

 TUN_freeze_parliament: "Freeze Parliament"
 TUN_freeze_parliament_desc: "The parliament, that nest of corruption and dysfunction, is suspended. Members' immunity is lifted, and the institution that symbolized the failures of Tunisia's democratic transition is neutralized. Saied rules by decree while a new system is constructed."

 TUN_prosecute_ennahda: "Prosecute Ennahda"
 TUN_prosecute_ennahda_desc: "Ennahda and its leaders are targeted for prosecution on charges ranging from corruption to terrorism. Rached Ghannouchi and other senior figures face arrest as Saied moves to eliminate the Islamist movement that he views as the source of Tunisia's problems."

 TUN_new_constitution_2022: "2022 Constitution"
 TUN_new_constitution_2022_desc: "Saied presents a new constitution to replace the 2014 charter, drafted by a committee he appointed without broad consultation. This document creates a hyper-presidential system with minimal checks on executive power, fundamentally restructuring Tunisian governance."

 TUN_hyper_presidential_system: "Hyper-Presidential System"
 TUN_hyper_presidential_system_desc: "The new constitution concentrates all meaningful power in the presidency. The parliament is reduced to a rubber stamp, the judiciary is subordinated to executive control, and no institution can effectively check presidential authority. Tunisia becomes a presidential autocracy."

 TUN_arrest_opposition: "Arrest Opposition Leaders"
 TUN_arrest_opposition_desc: "Opposition figures who challenge Saied's rule are arrested on various charges. Politicians, journalists, activists, and critics find themselves facing prosecution and imprisonment. The space for legitimate opposition shrinks to nothing."

 TUN_rule_by_decree: "Rule by Decree"
 TUN_rule_by_decree_desc: "With parliament dissolved and the constitution rewritten, Saied governs entirely by presidential decree. Laws, policies, and appointments flow from the palace without legislative deliberation or judicial review. Tunisia is ruled by one man's will."

 TUN_saied_republic: "Saied's Republic"
 TUN_saied_republic_desc: "Tunisia has been transformed into a presidential republic centered entirely on Kais Saied. The democratic institutions built after the revolution have been dismantled, replaced by a system of personal rule justified by direct popular legitimacy. The Saied era has arrived."

 TUN_leftist_path: "Leftist Path"
 TUN_leftist_path_desc: "The Tunisian left, drawing on traditions of labor activism and socialist thought, seeks to redirect the revolution toward economic justice. With the UGTT as its institutional base, the left advocates for workers' rights, public ownership, and redistribution."

 TUN_ugtt_power: "UGTT Political Power"
 TUN_ugtt_power_desc: "The Union Générale Tunisienne du Travail, Tunisia's powerful labor federation, moves from mediating crises to exercising direct political power. Its organizational capacity and mass membership provide the foundation for a labor-led government."

 TUN_social_democratic_model: "Social Democratic Model"
 TUN_social_democratic_model_desc: "Tunisia pursues a social democratic path combining market economics with strong labor protections, public services, and redistribution. This European-influenced model seeks to balance growth with equity and preserve democratic institutions."

 TUN_revolutionary_socialism: "Revolutionary Socialism"
 TUN_revolutionary_socialism_desc: "More radical voices within the labor movement demand fundamental transformation of Tunisia's economic system. Revolutionary socialism calls for nationalization, workers' control, and breaking with the capitalist framework that perpetuates inequality."

 TUN_worker_cooperatives: "Worker Cooperative Sector"
 TUN_worker_cooperatives_desc: "Tunisia promotes worker-owned cooperatives as an alternative to both capitalist enterprise and state ownership. This cooperative sector provides dignified employment, distributes ownership broadly, and demonstrates that economic democracy is possible."

 TUN_nationalization_program: "Nationalization Program"
 TUN_nationalization_program_desc: "Key sectors of the economy are brought under public ownership, ending private extraction of profit from essential services and resources. Nationalization extends state control over the commanding heights of the economy in the name of the people."

 TUN_welfare_state: "Tunisian Welfare State"
 TUN_welfare_state_desc: "Tunisia builds a comprehensive welfare state providing universal healthcare, education, housing support, and social protection. This system ensures that all Tunisians share in national prosperity and are protected from the vicissitudes of the market."

 TUN_workers_republic: "Workers' Republic"
 TUN_workers_republic_desc: "Tunisia is proclaimed a workers' republic where labor, not capital, holds sovereign power. The UGTT and associated organizations dominate political life, and the economy is restructured around workers' control and socialist principles."

 TUN_democratic_resistance_path: "Democratic Resistance Path"
 TUN_democratic_resistance_path_desc: "For those who believe in the 2014 constitution and the democratic transition, Saied's power grab is a coup that must be resisted. The democratic opposition seeks to restore constitutional governance through mobilization, strikes, and international pressure."

 TUN_salvation_front: "National Salvation Front"
 TUN_salvation_front_desc: "Disparate opposition forces unite in a National Salvation Front dedicated to restoring democracy. Ennahda, secular parties, civil society organizations, and independent figures set aside their differences to confront the common threat of authoritarian restoration."

 TUN_street_resistance: "Street Resistance"
 TUN_street_resistance_desc: "The opposition takes to the streets in sustained protest against Saied's rule. Demonstrations, marches, and civil disobedience challenge the regime's legitimacy and demonstrate that the Tunisian people did not consent to the destruction of their democracy."

 TUN_general_strike: "General Strike"
 TUN_general_strike_desc: "The UGTT, despite its divisions, calls a general strike against Saied's authoritarian rule. Workers across the country walk off the job, bringing the economy to a halt and demonstrating the power of organized labor to resist tyranny."

 TUN_international_pressure: "International Pressure Campaign"
 TUN_international_pressure_desc: "The democratic opposition appeals to international partners to pressure Saied through diplomatic isolation, aid conditionality, and support for civil society. Tunisia's friends abroad are called upon to defend the democracy they once celebrated."

 TUN_second_revolution: "Second Revolution"
 TUN_second_revolution_desc: "The combination of street protests, labor action, and international pressure reaches a tipping point. As in 2011, the people's mobilization proves stronger than the security apparatus. A second revolution sweeps away Saied's authoritarian project."

 TUN_restore_2014_constitution: "Restore 2014 Constitution"
 TUN_restore_2014_constitution_desc: "The 2014 constitution, product of years of negotiation and compromise, is restored as the fundamental law of the land. Saied's 2022 constitution is annulled, and Tunisia returns to the balanced, democratic framework that emerged from the national dialogue."

 TUN_democracy_secured: "Democracy Secured"
 TUN_democracy_secured_desc: "Tunisia's democratic order has survived its greatest test. The institutions of the 2014 constitution are restored and strengthened, safeguards against future power grabs are established, and the country resumes its path as the Arab world's democratic pioneer."

 TUN_carthage_revival_path: "Carthage Revival Path"
 TUN_carthage_revival_path_desc: "A movement emerges to reimagine Tunisia's identity around its ancient Carthaginian heritage rather than Arab or Islamic civilization. This neo-Punic revival seeks to recover the glory of Carthage and assert a unique Mediterranean identity."

 TUN_rediscover_punic_heritage: "Rediscover Punic Heritage"
 TUN_rediscover_punic_heritage_desc: "Historians, archaeologists, and cultural figures lead a movement to recover Tunisia's Carthaginian past. The Punic civilization that once rivaled Rome is presented as Tunisia's true heritage, obscured by centuries of Arab and French colonization."

 TUN_reject_arab_identity: "Reject Arab Identity"
 TUN_reject_arab_identity_desc: "The Arab conquest brought a foreign civilization that suppressed Tunisia's authentic identity. Rejecting Arab identity means embracing the indigenous Berber and Punic heritage that preceded Islam and creating a post-Arab Tunisian nation."

 TUN_reject_french_influence: "Reject French Influence"
 TUN_reject_french_influence_desc: "French colonialism imposed another layer of foreign culture over Tunisia's authentic identity. The Francophone elite who perpetuate French influence are as much colonizers as the Arabs, and their cultural hegemony must be ended."

 TUN_punic_language_revival: "Punic Language Revival"
 TUN_punic_language_revival_desc: "Scholars work to reconstruct the Punic language from ancient inscriptions, creating a modern neo-Punic that can replace Arabic and French as Tunisia's national language. This linguistic revolution would complete the cultural transformation."

 TUN_rebuild_carthage: "Rebuild Ancient Carthage"
 TUN_rebuild_carthage_desc: "The ruins of Carthage outside Tunis will be transformed into a monument to neo-Punic identity. Reconstruction of ancient temples, the commercial harbor, and civic buildings will create a physical manifestation of the revived civilization."

 TUN_tanit_cult_revival: "Revival of Tanit Worship"
 TUN_tanit_cult_revival_desc: "The goddess Tanit, chief deity of Carthage, is revived as a symbol of Tunisian identity and, for some, as an actual object of worship. Neo-pagan movements embrace pre-Islamic spirituality as part of the broader cultural revolution."

 TUN_mediterranean_navy: "Mediterranean Naval Power"
 TUN_mediterranean_navy_desc: "Carthage was above all a naval power, and the new Republic of Carthage must reclaim mastery of the Mediterranean. A powerful navy will project Carthaginian influence across the sea as it did in ancient times."

 TUN_new_republic_of_carthage: "New Republic of Carthage"
 TUN_new_republic_of_carthage_desc: "Tunisia is formally reconstituted as the Republic of Carthage, claiming continuity with the ancient civilization that ruled the western Mediterranean. New national symbols, currency, and institutions reflect this transformed identity."

 TUN_commercial_empire: "Commercial Empire"
 TUN_commercial_empire_desc: "Ancient Carthage built its power on commerce, and the new Carthage will do the same. Tunisia positions itself as a trading hub connecting Europe, Africa, and the Middle East, recreating the commercial networks of its Phoenician ancestors."

 TUN_sacred_band: "Sacred Band"
 TUN_sacred_band_desc: "The Sacred Band, elite infantry of ancient Carthage, is revived as a prestigious military unit. This force embodies Carthaginian military tradition and serves as the spearhead of the republic's armed forces."

 TUN_claim_sicily: "Claim Sicily"
 TUN_claim_sicily_desc: "Western Sicily was Carthaginian territory for centuries before Rome's aggression. The new Carthage asserts historical claims to this ancient possession, challenging Italian sovereignty over lands that rightfully belong to the Punic sphere."

 TUN_claim_sardinia: "Claim Sardinia"
 TUN_claim_sardinia_desc: "Sardinia was a Carthaginian possession for centuries, and its Nuragic civilization shared connections with Punic culture. The Republic of Carthage asserts claims to this island as part of its Mediterranean heritage."

 TUN_claim_western_libya: "Claim Western Libya"
 TUN_claim_western_libya_desc: "The Tripolitanian coast was integral to Carthaginian territory, and its cities were Punic foundations. The chaos in Libya provides an opportunity to restore Carthaginian sovereignty over these historically Punic lands."

 TUN_claim_iberian_coast: "Claim Iberian Coast"
 TUN_claim_iberian_coast_desc: "Carthaginian Spain, from Cartagena to the Balearics, was the base for Hannibal's campaigns against Rome. The new Carthage asserts historical claims to these Mediterranean shores as part of the Punic world."

 TUN_new_punic_wars: "New Punic Wars"
 TUN_new_punic_wars_desc: "The ancient rivalry between Carthage and Rome must be settled at last. The new Carthage prepares for conflict to recover its stolen territories and avenge the destruction wrought by Rome two millennia ago."

 TUN_hannibals_march: "Hannibal's March"
 TUN_hannibals_march_desc: "Hannibal Barca's crossing of the Alps remains the most audacious military campaign in history. The new Carthage prepares to emulate this feat, striking at the heart of the enemy as Hannibal did at Cannae."

 TUN_delenda_est_roma: "Delenda Est Roma"
 TUN_delenda_est_roma_desc: "Cato the Elder ended every speech with 'Carthago delenda est' — Carthage must be destroyed. Now the roles are reversed. Rome must be destroyed, and the ancient injustice finally avenged. Delenda est Roma!"

 TUN_ifriqiya_caliphate_path: "Caliphate of Ifriqiya Path"
 TUN_ifriqiya_caliphate_path_desc: "Radical Islamists seek to establish a new caliphate in the territory of medieval Ifriqiya, encompassing Tunisia and neighboring regions. Drawing on the legacy of the Aghlabid and Fatimid dynasties, they pursue an extremist vision of Islamic governance."

 TUN_declare_ifriqiya: "Declare Ifriqiya"
 TUN_declare_ifriqiya_desc: "The modern nation-state is a Western imposition incompatible with Islamic principles. Tunisia is abolished in favor of Ifriqiya, the Islamic province that governed this region for centuries under the caliphate. The restoration of Islamic order begins."

 TUN_establish_sharia_law: "Establish Sharia Law"
 TUN_establish_sharia_law_desc: "The divine law revealed to the Prophet must govern every aspect of society. Secular legal codes are abolished and replaced with comprehensive implementation of sharia, including hudud punishments and Islamic family law."

 TUN_abolish_personal_status_code: "Abolish Personal Status Code"
 TUN_abolish_personal_status_code_desc: "Bourguiba's Personal Status Code, which granted Tunisian women rights unprecedented in the Arab world, is an un-Islamic deviation that must be eliminated. Women's status will conform to traditional Islamic jurisprudence."

 TUN_aghlabid_model: "Aghlabid Model"
 TUN_aghlabid_model_desc: "The Aghlabid emirate that ruled Ifriqiya from 800 to 909 CE provides a model for Sunni Islamic governance. Orthodox Maliki jurisprudence, architectural magnificence, and jihad against the infidel characterized this golden age that can be restored."

 TUN_fatimid_model: "Fatimid Model"
 TUN_fatimid_model_desc: "The Fatimid Caliphate, which began in Ifriqiya before conquering Egypt, offers an alternative model drawing on Ismaili Shia traditions. The Fatimids built Mahdia and spread their revolutionary interpretation of Islam across North Africa."

 TUN_sunni_orthodoxy: "Sunni Orthodoxy"
 TUN_sunni_orthodoxy_desc: "Ifriqiya follows the Sunni path, adhering to Maliki jurisprudence traditional to North Africa. Sunni orthodoxy provides the religious framework for the new Islamic state, rejecting both Western secularism and Shia deviation."

 TUN_ismaili_revival: "Ismaili Revival"
 TUN_ismaili_revival_desc: "The Ismaili tradition that animated the Fatimid revolution is revived in the new Ifriqiya. This esoteric interpretation of Islam, with its hidden imams and hierarchical knowledge, offers a distinctive alternative to mainstream Sunni practice."

 TUN_rebuild_great_mosque_kairouan: "Rebuild the Great Mosque of Kairouan"
 TUN_rebuild_great_mosque_kairouan_desc: "The Great Mosque of Kairouan, one of the holiest sites in Islam and a masterpiece of Islamic architecture, will be restored and expanded as the spiritual center of the revived caliphate. Kairouan resumes its role as the religious capital of North Africa."

 TUN_islamic_scholars_network: "Islamic Scholars Network"
 TUN_islamic_scholars_network_desc: "A network of Islamic scholars provides religious legitimacy and guidance for the caliphate. These ulema interpret sharia, train imams, and ensure that all aspects of governance conform to Islamic principles."

 TUN_declare_caliphate: "Declare the Caliphate"
 TUN_declare_caliphate_desc: "The time has come to restore the caliphate, the unified leadership of the Muslim ummah that was abolished when Atatürk destroyed the Ottoman caliphate in 1924. Ifriqiya proclaims a new caliphate to lead the Muslim world."

 TUN_claim_libya: "Claim Libya"
 TUN_claim_libya_desc: "Tripolitania and Cyrenaica were part of Ifriqiya under Islamic rule and must be reunited with the caliphate. The chaos of post-Gaddafi Libya provides an opportunity to extend Islamic governance eastward."

 TUN_claim_algeria: "Claim Algeria"
 TUN_claim_algeria_desc: "Eastern Algeria was integral to Ifriqiya, and the entire Maghreb should fall under the caliphate's authority. The jihadist networks already operating in Algeria can be mobilized for expansion westward."

 TUN_claim_morocco: "Claim Morocco"
 TUN_claim_morocco_desc: "The Moroccan monarchy's claim to religious legitimacy is fraudulent, and its territory belongs under the true caliphate. Morocco must be brought into the Ifriqiya caliphate's embrace."

 TUN_claim_egypt: "Claim Egypt"
 TUN_claim_egypt_desc: "Egypt was the seat of the Fatimid Caliphate after it left Ifriqiya, and Cairo remains the largest city in the Arab world. The caliphate's ultimate destiny is to rule from Cairo as the Fatimids did."

 TUN_jihadist_army: "Jihadist Army"
 TUN_jihadist_army_desc: "The caliphate builds a jihadist army dedicated to expanding Islamic rule through force of arms. Motivated by religious zeal and seeking martyrdom, these fighters will carry the banner of Islam to new conquests."

 TUN_foreign_mujahideen: "Foreign Mujahideen"
 TUN_foreign_mujahideen_desc: "Muslims from around the world are called to join the jihad in Ifriqiya. These foreign fighters bring diverse skills and absolute commitment to the cause, swelling the ranks of the caliphate's armies."

 TUN_islamic_economy: "Islamic Economy"
 TUN_islamic_economy_desc: "The economy is restructured according to Islamic principles. Riba (usury) is prohibited, Islamic finance replaces conventional banking, and economic activity is regulated to ensure conformity with sharia."

 TUN_zakat_system: "Zakat Collection System"
 TUN_zakat_system_desc: "Zakat, the obligatory Islamic alms tax, becomes the foundation of the caliphate's revenue system. This religiously mandated redistribution funds both the state and charitable works, replacing secular taxation."

 TUN_unite_north_africa: "Unite North Africa"
 TUN_unite_north_africa_desc: "The caliphate achieves its immediate territorial ambitions, bringing all of North Africa under its rule. From the Atlantic to the Egyptian border, the Maghreb is united under Islamic governance for the first time since the medieval caliphates."

 TUN_march_on_cairo: "March on Cairo"
 TUN_march_on_cairo_desc: "Following in the footsteps of the Fatimids, the Ifriqiya caliphate marches east to claim Egypt. Cairo, the city the Fatimids built, will become the seat of a renewed caliphate stretching from Morocco to the Nile."

 TUN_husainid_path: "Husainid Dynasty Path"
 TUN_husainid_path_desc: "The Husainid dynasty ruled Tunisia as beys for over 250 years until the monarchy was abolished by Bourguiba in 1957. Now, voices call for the restoration of this ancient house and the establishment of a Tunisian kingdom."

 TUN_find_husainid_heir: "Find a Husainid Heir"
 TUN_find_husainid_heir_desc: "Descendants of the Husainid dynasty survive in exile, scattered after 1957. Monarchist sympathizers search for a suitable heir who could be restored to the beylical throne and provide the continuity and legitimacy Tunisia needs."

 TUN_rehabilitate_monarchy: "Rehabilitate the Monarchy"
 TUN_rehabilitate_monarchy_desc: "Before restoration can proceed, the monarchy's reputation must be rehabilitated. The narrative that the beys were corrupt and collaborationist is challenged, and a new appreciation for monarchical tradition is cultivated."

 TUN_constitutional_monarchy: "Constitutional Monarchy"
 TUN_constitutional_monarchy_desc: "The restored monarchy will operate within constitutional constraints, with the bey serving as a unifying symbol above politics while elected institutions exercise governing authority. This European model balances tradition with democracy."

 TUN_absolute_monarchy: "Absolute Monarchy"
 TUN_absolute_monarchy_desc: "The restored bey will rule with full authority as his ancestors did, unconstrained by parliamentary pretensions. Only absolute monarchy can provide the strong leadership Tunisia needs after decades of republican dysfunction."

 TUN_royal_court: "Establish Royal Court"
 TUN_royal_court_desc: "A royal court is established to support the restored monarchy, with chamberlains, advisors, and ceremonial officials recreating the pageantry of the beylical era. The court becomes the center of political and social life."

 TUN_bardo_palace_restoration: "Bardo Palace Restoration"
 TUN_bardo_palace_restoration_desc: "The Bardo Palace, traditional seat of the beys now housing the parliament and national museum, is restored as a royal residence. This historic complex becomes once again the home of Tunisia's ruling dynasty."

 TUN_royal_guard: "Royal Guard"
 TUN_royal_guard_desc: "A Royal Guard is established to protect the monarch and serve as an elite military force loyal to the crown. Resplendent in traditional uniforms, the guard embodies the restored monarchy's dignity and power."

 TUN_kingdom_of_tunisia: "Kingdom of Tunisia"
 TUN_kingdom_of_tunisia_desc: "Tunisia is formally reconstituted as a kingdom under the Husainid dynasty. The bey takes his throne in restored splendor, and Tunisia joins the community of Arab monarchies as a stable, traditional state."

 TUN_parliamentary_monarchy: "Parliamentary Monarchy"
 TUN_parliamentary_monarchy_desc: "The Kingdom of Tunisia adopts a parliamentary system where the bey reigns but does not rule. Like the constitutional monarchies of Europe, executive power rests with elected ministers while the crown provides continuity and ceremonial dignity."

 TUN_royal_prerogative: "Royal Prerogative"
 TUN_royal_prerogative_desc: "The bey exercises full royal prerogative, appointing ministers, commanding the military, and directing policy without parliamentary interference. This absolute monarchy reflects traditional Islamic concepts of rulership."

 TUN_gulf_monarchy_ties: "Gulf Monarchy Ties"
 TUN_gulf_monarchy_ties_desc: "The restored Tunisian monarchy cultivates ties with the Gulf monarchies, particularly Saudi Arabia and the UAE. These wealthy kingdoms provide financial support and political backing for their fellow Arab monarch."

 TUN_moroccan_example: "Moroccan Example"
 TUN_moroccan_example_desc: "Morocco provides the most successful model of Arab monarchy, combining traditional legitimacy with modernization. Tunisia studies the Moroccan example and cultivates close ties with the Alaouite kingdom."

 TUN_beylical_tradition: "Beylical Tradition"
 TUN_beylical_tradition_desc: "The kingdom embraces its beylical heritage, reviving traditions, ceremonies, and symbols from the Husainid era. This distinctive Tunisian monarchical culture differentiates the kingdom from both republics and other Arab monarchies."

 TUN_claim_beylik_of_constantine: "Claim Beylik of Constantine"
 TUN_claim_beylik_of_constantine_desc: "The Beylik of Constantine in eastern Algeria was historically connected to Tunisia, and the borders drawn by French colonialism artificially separated related populations. The kingdom asserts historical claims to this territory."

 TUN_claim_tripolitania: "Claim Tripolitania"
 TUN_claim_tripolitania_desc: "Tripolitania in western Libya has deep historical ties to Tunisia, and the chaos following Gaddafi's fall has left it ungoverned. The kingdom asserts claims to this territory as a natural extension of Tunisian sovereignty."

 TUN_restore_regency_of_tunis: "Restore the Regency of Tunis"
 TUN_restore_regency_of_tunis_desc: "The Regency of Tunis, the historical state ruled by the beys before French colonization, is reconstituted in its full territorial extent. Tunisia expands to encompass all lands that rightfully belong under the beylical crown."
 TUN_focus_tree: "Tunisia Focus Tree"

 TUN_tunisian_military: "Tunisian Armed Forces"
 TUN_tunisian_military_desc: "The Tunisian Armed Forces have historically maintained a professional, apolitical stance, serving as guardians of the state rather than instruments of regime power. As Tunisia faces evolving security challenges from regional instability and terrorism, the military must be reformed and modernized to meet these threats while preserving its institutional integrity."

 TUN_military_doctrine: "Military Doctrine Review"
 TUN_military_doctrine_desc: "Tunisia's military doctrine must be reassessed to address the primary threats facing the nation. The choice between focusing on counterterrorism operations against jihadist cells or preparing for conventional defense against regional instability will shape the structure and capabilities of the armed forces for years to come."

 TUN_counterterrorism_focus: "Counterterrorism Focus"
 TUN_counterterrorism_focus_desc: "The primary threat to Tunisia comes not from conventional armies but from jihadist cells operating in the mountains along the Algerian border and inspired by chaos in Libya. The military must be restructured around light infantry, special operations forces, and intelligence-driven operations to hunt down and eliminate terrorist networks."

 TUN_conventional_defense: "Conventional Defense Posture"
 TUN_conventional_defense_desc: "While terrorism poses an immediate threat, Tunisia cannot ignore the potential for conventional conflict arising from the instability of its neighbors. A balanced force structure with armored units, artillery, and air defense capabilities will ensure Tunisia can defend its sovereignty against any threat."

 TUN_chaambi_operations: "Mount Chaambi Operations"
 TUN_chaambi_operations_desc: "The forested slopes of Mount Chaambi near the Algerian border have become a haven for jihadist militants affiliated with al-Qaeda in the Islamic Maghreb. Sustained military operations are required to clear these strongholds and deny terrorists sanctuary on Tunisian soil."

 TUN_border_defense_doctrine: "Border Defense Doctrine"
 TUN_border_defense_doctrine_desc: "Tunisia's borders with Libya and Algeria present distinct security challenges. A comprehensive border defense doctrine will establish the principles and force structures needed to monitor, control, and when necessary seal these frontiers against infiltration by militants, smugglers, and weapons traffickers."

 TUN_national_defense_strategy: "National Defense Strategy"
 TUN_national_defense_strategy_desc: "Drawing on lessons learned from counterterrorism operations and border security challenges, Tunisia will formulate a comprehensive national defense strategy that integrates all elements of military power to protect the nation against the full spectrum of threats it faces."

 TUN_foreign_military_assistance: "Foreign Military Assistance"
 TUN_foreign_military_assistance_desc: "Tunisia's modest defense budget limits its ability to modernize unilaterally. Foreign military assistance programs offer access to training, equipment, and intelligence sharing that can dramatically enhance the capabilities of the armed forces while building strategic partnerships."

 TUN_mnna_status: "Major Non-NATO Ally Status"
 TUN_mnna_status_desc: "Designation as a Major Non-NATO Ally of the United States would grant Tunisia privileged access to American military equipment, priority delivery of defense materiel, and enhanced security cooperation. This status recognizes Tunisia's importance as a partner in regional stability and counterterrorism."

 TUN_european_defense_ties: "European Defense Ties"
 TUN_european_defense_ties_desc: "European nations, particularly France and Italy, have historical ties to Tunisia and strategic interests in North African stability. Defense cooperation agreements with European partners can provide training, equipment, and intelligence support while strengthening Tunisia's position within the Mediterranean security architecture."

 TUN_nato_partnership: "NATO Partnership"
 TUN_nato_partnership_desc: "While full NATO membership remains out of reach, Tunisia can deepen its relationship with the alliance through the Mediterranean Dialogue and Partnership for Peace programs. Enhanced NATO partnership provides access to training exercises, interoperability standards, and the collective expertise of the world's most capable military alliance."

 TUN_army_modernization: "Army Modernization"
 TUN_army_modernization_desc: "The Tunisian Army forms the backbone of the nation's defense but relies heavily on aging equipment inherited from decades past. A comprehensive modernization program will replace obsolete systems, enhance capabilities, and ensure Tunisian ground forces can meet the challenges of 21st century warfare."

 TUN_infantry_equipment: "Infantry Equipment Upgrade"
 TUN_infantry_equipment_desc: "The infantryman remains the most important element of Tunisia's ground forces, particularly in counterinsurgency operations in difficult terrain. Modern personal equipment, communications systems, body armor, and small arms will enhance the effectiveness and survivability of Tunisian soldiers."

 TUN_armor_procurement: "Armor Procurement"
 TUN_armor_procurement_desc: "Tunisia's armored forces rely on a mixed fleet of aging tanks and armored vehicles of varying origins and capabilities. A coherent armor procurement strategy will address maintenance challenges, enhance firepower, and ensure Tunisian armored units can operate effectively in combined arms operations."

 TUN_m60_upgrade: "M60 Patton Upgrade Program"
 TUN_m60_upgrade_desc: "Rather than replacing Tunisia's fleet of American M60 Patton tanks entirely, a comprehensive upgrade program can extend their service life and enhance their capabilities at a fraction of the cost of new acquisitions. Improved fire control, reactive armor, and engine upgrades will keep these venerable tanks relevant."

 TUN_new_mbt: "New Main Battle Tank Acquisition"
 TUN_new_mbt_desc: "Tunisia's aging tank fleet has reached the limits of cost-effective modernization. The acquisition of a new main battle tank platform, whether American M1 Abrams, German Leopard 2, or another modern design, would transform the armored corps and provide capabilities matching any regional competitor."

 TUN_air_force: "Tunisian Air Force"
 TUN_air_force_desc: "The Tunisian Air Force provides essential capabilities for national defense, border surveillance, and support to ground operations. Despite its modest size, the air arm must be maintained and modernized to project power, provide close air support, and deny adversaries freedom of action in Tunisian skies."

 TUN_fighter_modernization: "Fighter Modernization"
 TUN_fighter_modernization_desc: "Tunisia's fighter fleet centers on aging F-5 Tigers that have served faithfully for decades but are approaching obsolescence. The future of Tunisian air combat capability depends on either extending the life of existing platforms or acquiring modern replacements."

 TUN_f5_upgrade: "F-5 Life Extension Program"
 TUN_f5_upgrade_desc: "The F-5 Tiger remains a capable light fighter when properly maintained and upgraded. Avionics modernization, structural refurbishment, and weapons integration can extend the service life of Tunisia's F-5 fleet for another decade at modest cost."

 TUN_f16_acquisition: "F-16 Fighting Falcon Acquisition"
 TUN_f16_acquisition_desc: "The acquisition of F-16 Fighting Falcons would represent a generational leap in Tunisian air combat capability. These fourth-generation multirole fighters would provide air superiority, precision strike, and beyond-visual-range engagement capabilities far exceeding current platforms."

 TUN_helicopter_fleet: "Helicopter Fleet Expansion"
 TUN_helicopter_fleet_desc: "Rotary-wing aircraft are essential for counterterrorism operations, providing rapid mobility, fire support, and reconnaissance in terrain where fixed-wing aircraft cannot operate effectively. Expanding and modernizing Tunisia's helicopter fleet will enhance operational flexibility across all mission sets."

 TUN_uav_program: "Unmanned Aerial Vehicle Program"
 TUN_uav_program_desc: "Unmanned aerial vehicles have revolutionized modern warfare, providing persistent surveillance, reconnaissance, and increasingly, precision strike capabilities. Tunisia must develop indigenous UAV capabilities or acquire foreign systems to maintain situational awareness across its vast borders and interior regions."

 TUN_navy: "Tunisian Navy"
 TUN_navy_desc: "Tunisia's extensive Mediterranean coastline and exclusive economic zone require a capable naval force to protect sovereignty, combat smuggling and illegal migration, and ensure freedom of navigation. The navy must be equipped and trained to meet these diverse maritime challenges."

 TUN_coast_guard: "Coast Guard Enhancement"
 TUN_coast_guard_enhancement_desc: "Tunisia's coast guard serves as the front line against maritime threats including smuggling, illegal fishing, and irregular migration. Enhanced patrol capabilities, surveillance systems, and rapid response units will strengthen maritime security and support European partners in managing Mediterranean migration flows."

 TUN_patrol_boats: "Patrol Boat Acquisition"
 TUN_patrol_boats_desc: "Fast patrol boats form the backbone of Tunisia's coastal security operations. New acquisitions will replace aging vessels, extend patrol ranges, and provide the speed and armament necessary to intercept smugglers and migrants before they can reach European waters."

 TUN_naval_combatants: "Naval Combatant Modernization"
 TUN_naval_combatants_desc: "While patrol craft handle most routine operations, Tunisia requires larger combatants to project power, protect offshore resources, and represent the nation's sovereignty at sea. Modern frigates or corvettes with anti-ship and air defense capabilities would transform the navy's capacity."

 TUN_bizerte_naval_base: "Bizerte Naval Base Expansion"
 TUN_bizerte_naval_base_desc: "The naval base at Bizerte, strategically positioned at the junction of the western and eastern Mediterranean, has served as Tunisia's primary naval facility since independence. Expansion and modernization of port facilities, maintenance capabilities, and infrastructure will support a more capable fleet."

 TUN_border_security: "Border Security"
 TUN_border_security_desc: "Tunisia's land borders with Libya and Algeria present critical security vulnerabilities. The chaos in Libya has allowed weapons, militants, and contraband to flow across the frontier, while the mountainous Algerian border provides sanctuary for terrorist groups. Enhanced border security is essential for national stability."

 TUN_libyan_border_wall: "Libyan Border Barrier"
 TUN_libyan_border_wall_desc: "The collapse of the Libyan state has transformed the eastern border into a conduit for weapons, fighters, and instability. Construction of a fortified barrier system combining sand berms, trenches, electronic surveillance, and patrol routes will help stem the flow of threats from the east."

 TUN_algerian_cooperation: "Algerian Border Cooperation"
 TUN_algerian_cooperation_desc: "The mountainous border with Algeria cannot be sealed by barriers alone. Cooperation with Algerian security forces through joint patrols, intelligence sharing, and coordinated operations against terrorist groups operating in the border region will address threats that neither nation can defeat alone."

 TUN_integrated_border_defense: "Integrated Border Defense System"
 TUN_integrated_border_defense_desc: "Combining physical barriers, electronic surveillance, rapid response forces, and international cooperation into an integrated border defense system will provide comprehensive security for Tunisia's frontiers while optimizing the use of limited resources."

 TUN_economy_root: "Tunisian Economy"
 TUN_economy_root_desc: "Tunisia's economy stands at a crossroads. The coastal development model that generated growth under the old regime left the interior impoverished and resentful. New economic strategies must balance the need for continued growth with demands for regional equity and social justice."

 TUN_coastal_economic_model: "Coastal Economic Model"
 TUN_coastal_economic_model_desc: "Tunisia's economic development has historically concentrated along the Mediterranean coast, where tourism, manufacturing, and services flourish in proximity to European markets. Doubling down on this coastal model offers the fastest path to growth, even if it perpetuates regional inequalities."

 TUN_tourism_investment: "Tourism Investment"
 TUN_tourism_investment_desc: "Tourism has long been a pillar of Tunisia's economy, drawing millions of European visitors annually to Mediterranean beaches and historical sites. Strategic investment in tourism infrastructure can restore and expand this vital sector despite the setbacks of terrorism and political instability."

 TUN_hammamet_riviera: "Hammamet Riviera Development"
 TUN_hammamet_riviera_desc: "The beaches of Hammamet and the Cap Bon peninsula represent Tunisia's premier tourist destination. Luxury resort development, marina construction, and entertainment facilities will position this region to compete with Mediterranean rivals for high-value tourism."

 TUN_djerba_resort: "Djerba Resort Expansion"
 TUN_djerba_resort_desc: "The island of Djerba, with its unique cultural heritage and beautiful beaches, offers distinctive appeal in the Mediterranean tourism market. Resort expansion and improved air connections will transform Djerba into a year-round destination rather than a seasonal attraction."

 TUN_sahara_tourism: "Sahara Desert Tourism"
 TUN_sahara_tourism_desc: "Beyond the beaches, Tunisia's Saharan south offers extraordinary tourism potential. Desert expeditions, Star Wars filming locations, and the unique architecture of Berber villages can attract adventure tourists and diversify Tunisia's offerings beyond the coastal resorts."

 TUN_offshore_manufacturing: "Offshore Manufacturing"
 TUN_offshore_manufacturing_desc: "Tunisia's proximity to Europe, low labor costs, and educated workforce make it an attractive location for offshore manufacturing serving European markets. Expanding this sector through investment incentives and free trade zones can create jobs and generate export revenue."

 TUN_eu_association_agreement: "EU Association Agreement"
 TUN_eu_association_agreement_desc: "Tunisia's Association Agreement with the European Union provides preferential access to the world's largest single market. Deepening this relationship through advanced status negotiations and regulatory alignment will strengthen Tunisia's position as Europe's preferred North African partner."

 TUN_automotive_supply_chain: "Automotive Supply Chain Integration"
 TUN_automotive_supply_chain_desc: "Tunisia has emerged as a significant node in European automotive supply chains, manufacturing components for major producers. Expanding this sector through targeted investment and workforce development can create thousands of skilled jobs and anchor Tunisia in high-value manufacturing networks."

 TUN_textile_industry: "Textile Industry Modernization"
 TUN_textile_industry_desc: "Tunisia's textile industry has long served European fashion houses and retailers but faces intense competition from Asian producers. Modernization, automation, and a focus on higher-value products and fast fashion can maintain competitiveness while preserving employment."

 TUN_phosphate_sector: "Phosphate Sector"
 TUN_phosphate_sector_desc: "Tunisia possesses significant phosphate reserves that have provided export revenue for decades. The state-owned Compagnie des Phosphates de Gafsa and downstream chemical industries represent strategic national assets requiring investment and reform to realize their full potential."

 TUN_cpg_expansion: "CPG Expansion"
 TUN_cpg_expansion_desc: "The Compagnie des Phosphates de Gafsa has struggled with labor unrest, declining production, and aging infrastructure. Strategic expansion of mining operations, investment in new processing facilities, and resolution of social conflicts will revitalize this vital sector."

 TUN_gafsa_mining_modernization: "Gafsa Mining Modernization"
 TUN_gafsa_mining_modernization_desc: "The phosphate mines around Gafsa rely on decades-old equipment and techniques. Comprehensive modernization with new extraction technology, automated processing, and improved worker safety will increase output while reducing costs and environmental impact."

 TUN_gct_chemical_industry: "GCT Chemical Industry"
 TUN_gct_chemical_industry_desc: "The Groupe Chimique Tunisien processes raw phosphates into fertilizers and chemical products with higher value than raw ore exports. Expanding GCT's capacity and product range will capture more value from Tunisia's mineral wealth."

 TUN_fertilizer_exports: "Fertilizer Export Expansion"
 TUN_fertilizer_exports_desc: "Global demand for fertilizers continues to grow as agricultural intensification spreads across the developing world. Expanding Tunisia's fertilizer production and export capacity will tap into this growing market while creating employment in the impoverished interior."

 TUN_energy_sector: "Energy Sector Development"
 TUN_energy_sector_desc: "Tunisia's modest oil and gas reserves have historically met domestic needs with some export capacity, but production has declined while consumption grows. The energy sector requires investment, reform, and diversification to ensure energy security and reduce import dependence."

 TUN_etap_upstream: "ETAP Upstream Development"
 TUN_etap_upstream_desc: "The Entreprise Tunisienne d'Activités Pétrolières oversees Tunisia's hydrocarbon exploration and production. Enhanced upstream investment, new exploration licenses, and improved recovery techniques can reverse production declines and extend the life of Tunisia's oil and gas industry."

 TUN_nawara_gas_field: "Nawara Gas Field Development"
 TUN_nawara_gas_field_desc: "The Nawara gas field in southern Tunisia represents the country's most significant recent hydrocarbon discovery. Full development of this field, including pipeline infrastructure to northern population centers, will reduce import dependence and provide feedstock for petrochemical industries."

 TUN_offshore_exploration: "Offshore Exploration"
 TUN_offshore_exploration_desc: "Tunisia's Mediterranean waters remain underexplored for hydrocarbons. New offshore exploration licenses and partnerships with international oil companies could reveal significant reserves, particularly in the Gulf of Gabès and waters bordering Libya."

 TUN_steg_reform: "STEG Reform"
 TUN_steg_reform_desc: "The Société Tunisienne de l'Électricité et du Gaz, the national electricity and gas utility, faces mounting financial pressures from subsidized prices and aging infrastructure. Reform of STEG's operations, tariffs, and investment plans is essential for energy sector sustainability."

 TUN_energy_subsidy_reform: "Energy Subsidy Reform"
 TUN_energy_subsidy_reform_desc: "Fuel and electricity subsidies consume an enormous share of Tunisia's budget while primarily benefiting the wealthy who consume more energy. Gradual subsidy reform with targeted compensation for the poor can redirect resources to more productive investments while improving economic efficiency."

 TUN_renewable_energy: "Renewable Energy Development"
 TUN_renewable_energy_desc: "Tunisia possesses extraordinary renewable energy potential, with abundant sunshine in the south and strong winds along the coast. Developing these resources can reduce fossil fuel dependence, create new industries, and position Tunisia as a clean energy exporter to Europe."

 TUN_solar_plan: "Tunisian Solar Plan"
 TUN_solar_plan_desc: "A comprehensive solar energy development plan will harness Tunisia's Saharan sunshine through utility-scale photovoltaic installations, concentrated solar power plants, and distributed rooftop generation. This clean, inexhaustible resource can transform Tunisia's energy future."

 TUN_tataouine_solar_farm: "Tataouine Solar Farm"
 TUN_tataouine_solar_farm_desc: "The Tataouine governorate in Tunisia's deep south receives some of the highest solar irradiation in the Mediterranean basin. A major solar installation here could generate massive amounts of clean electricity for domestic use or export to Europe via submarine cable."

 TUN_wind_farms: "Wind Farm Development"
 TUN_wind_farms_desc: "Tunisia's northern coast and the Cap Bon peninsula experience strong, consistent winds suitable for utility-scale wind power generation. Wind farm development can complement solar resources, providing power when the sun isn't shining."

 TUN_bizerte_wind_park: "Bizerte Wind Park"
 TUN_bizerte_wind_park_desc: "The area around Bizerte offers excellent wind resources combined with existing grid infrastructure and port facilities for turbine installation. A major wind park development will demonstrate Tunisia's renewable energy potential and attract further investment."

 TUN_green_hydrogen: "Green Hydrogen Initiative"
 TUN_green_hydrogen_desc: "Tunisia's renewable energy potential exceeds domestic electricity needs, creating an opportunity to produce green hydrogen through electrolysis for export to energy-hungry European markets. This emerging industry could position Tunisia as a key supplier in the clean energy transition."

 TUN_agricultural_sector: "Agricultural Sector Development"
 TUN_agricultural_sector_desc: "Agriculture remains vital to Tunisia's economy and rural employment, though the sector faces challenges from water scarcity, land fragmentation, and competition from imports. Strategic development can enhance productivity, expand exports, and improve rural livelihoods."

 TUN_olive_oil_industry: "Olive Oil Industry"
 TUN_olive_oil_industry_desc: "Tunisia ranks among the world's largest olive oil producers, with millions of olive trees covering the Sahel region. The olive oil industry represents a major export opportunity, particularly for high-quality extra virgin products commanding premium prices in European markets."

 TUN_sfax_olive_expansion: "Sfax Olive Expansion"
 TUN_sfax_olive_expansion_desc: "The region around Sfax contains Tunisia's densest concentration of olive groves. Expansion of cultivation, introduction of improved varieties, and investment in modern pressing facilities will increase production and quality of this traditional export."

 TUN_organic_certification: "Organic Certification Program"
 TUN_organic_certification_desc: "Tunisia's traditional agricultural practices align well with organic certification requirements, and European consumers increasingly demand organic products. A national certification program will help Tunisian farmers access premium organic markets and command higher prices."

 TUN_deglet_nour_dates: "Deglet Nour Date Industry"
 TUN_deglet_nour_dates_desc: "The Deglet Nour date, grown in Tunisia's southern oases, is considered the finest date variety in the world. Expanding production, improving post-harvest handling, and marketing directly to premium markets can increase returns from this traditional crop."

 TUN_tozeur_date_industry: "Tozeur Date Industry Development"
 TUN_tozeur_date_industry_desc: "The oases around Tozeur and Nefta produce the highest quality Deglet Nour dates but face challenges from water scarcity and aging palms. Investment in irrigation efficiency, palm renewal, and processing facilities will sustain this traditional industry."

 TUN_irrigation_modernization: "Irrigation Modernization"
 TUN_irrigation_modernization_desc: "Water scarcity represents Tunisia's greatest agricultural constraint. Modernizing irrigation infrastructure through drip systems, water harvesting, and improved management can stretch limited water resources further while maintaining agricultural production."

 TUN_medjerda_irrigation: "Medjerda Valley Irrigation"
 TUN_medjerda_irrigation_desc: "The Medjerda River valley, Tunisia's only perennial waterway, forms the agricultural heartland of the nation. Improved irrigation infrastructure, dam maintenance, and water management will protect this vital region from drought and ensure continued productivity."

 TUN_interior_development: "Interior Development"
 TUN_interior_development_desc: "Tunisia's impoverished interior governorates have been left behind by coastal development, breeding the resentment that fueled the revolution. Redirecting investment to Sidi Bouzid, Kasserine, and other neglected regions is both an economic imperative and a political necessity."

 TUN_interior_infrastructure: "Interior Infrastructure"
 TUN_interior_infrastructure_desc: "The interior regions lack basic infrastructure that coastal areas take for granted. Roads, electricity, water systems, and telecommunications must be extended and improved to create conditions for economic development and reduce the isolation of interior communities."

 TUN_sidi_bouzid_development: "Sidi Bouzid Development Program"
 TUN_sidi_bouzid_development_desc: "Sidi Bouzid, birthplace of the Tunisian revolution, symbolizes the neglect of the interior under the old regime. A comprehensive development program for this governorate will honor the revolution's promise while demonstrating that democratic Tunisia can deliver for marginalized communities."

 TUN_kasserine_investment: "Kasserine Investment Program"
 TUN_kasserine_investment_desc: "Kasserine governorate, bordering Algeria, suffers from poverty, unemployment, and security challenges from terrorist groups in the mountains. Investment in economic development, job creation, and public services will address the conditions that breed extremism while reducing inequality."

 TUN_youth_employment: "Youth Employment Initiative"
 TUN_youth_employment_initiative_desc: "Tunisia's educated youth face catastrophic unemployment rates that have persisted since the revolution. Targeted programs for youth employment, entrepreneurship support, and skills development are essential to prevent further brain drain and social instability."

 TUN_vocational_training: "Vocational Training Expansion"
 TUN_vocational_training_desc: "Tunisia's education system produces many university graduates but too few workers with practical vocational skills demanded by employers. Expanding vocational training programs aligned with labor market needs will improve employment outcomes and economic productivity."

 TUN_university_expansion: "University System Expansion"
 TUN_university_expansion_desc: "Higher education expansion has been a priority since independence, but quality and relevance have suffered. Strategic investment in universities, research capacity, and linkages with industry will produce graduates who can drive innovation and economic development."

 TUN_financial_sector: "Financial Sector Development"
 TUN_financial_sector_desc: "Tunisia's banking sector remains dominated by state-owned institutions burdened by non-performing loans and limited capacity for risk assessment. Financial sector reform is essential to channel savings into productive investment and support private sector growth."

 TUN_bct_independence: "Central Bank Independence"
 TUN_bct_independence_desc: "The Banque Centrale de Tunisie must be insulated from political pressure to maintain monetary stability and credibility. Strengthening central bank independence through legal reforms and governance improvements will anchor macroeconomic stability."

 TUN_state_bank_reform: "State Bank Reform"
 TUN_state_bank_reform_desc: "Tunisia's state-owned banks, including STB, BNA, and BH, carry heavy burdens of non-performing loans and political lending. Comprehensive reform through recapitalization, governance improvements, and possible privatization will restore the health of these institutions."

 TUN_imf_program: "IMF Program Negotiations"
 TUN_imf_program_desc: "Tunisia's persistent fiscal deficits and growing debt have led to negotiations with the International Monetary Fund for a stabilization program. IMF support can provide financing and credibility, but comes with conditions that may prove politically difficult to implement."

 TUN_imf_austerity: "IMF Austerity Implementation"
 TUN_imf_austerity_desc: "The IMF program requires painful fiscal adjustments including subsidy cuts, public sector wage restraint, and tax increases. Implementing these measures will stabilize public finances but risks social unrest from Tunisians already struggling with economic hardship."

 TUN_reject_imf: "Reject IMF Conditions"
 TUN_reject_imf_desc: "The IMF's conditions are politically unacceptable. Tunisia must find alternative paths to fiscal stability, whether through heterodox policies, alternative financing sources, or simply muddling through without international support. This path carries significant economic risks."

 TUN_debt_restructuring: "Debt Restructuring"
 TUN_debt_restructuring_desc: "Tunisia's debt burden has become unsustainable, consuming an ever-larger share of government revenues for interest payments. Comprehensive debt restructuring negotiations with creditors may be necessary to restore fiscal sustainability and free resources for development."

 TUN_informal_economy: "Informal Economy"
 TUN_informal_economy_desc: "A large share of Tunisia's economic activity takes place outside formal structures, evading taxes and regulations while providing livelihoods for millions. Policy toward the informal economy must balance formalization goals against the reality that many Tunisians depend on informal work."

 TUN_formalization_drive: "Formalization Drive"
 TUN_formalization_drive_desc: "Bringing the informal economy into formal structures would expand the tax base, improve worker protections, and enable economic planning. Incentives for registration combined with enforcement against flagrant violators can gradually formalize economic activity."

 TUN_tolerate_informal: "Tolerate Informal Economy"
 TUN_tolerate_informal_desc: "Aggressive formalization efforts risk destroying livelihoods without creating formal alternatives. A pragmatic approach tolerates informal activity as a necessary safety valve while focusing enforcement only on the most egregious cases of tax evasion and labor exploitation."

 TUN_smuggling_networks: "Smuggling Network Integration"
 TUN_smuggling_networks_desc: "The Libya border smuggling economy provides livelihoods for entire communities in southeastern Tunisia. Rather than attempting to suppress these networks, integrating them into semi-formal structures could capture some revenue while maintaining social stability in marginalized regions."

 TUN_digital_economy: "Digital Economy Development"
 TUN_digital_economy_desc: "Tunisia's educated, multilingual workforce and telecommunications infrastructure position it to participate in the global digital economy. Development of technology sectors, startup ecosystems, and digital services can create high-value employment for young graduates."

 TUN_lac2_tech_hub: "Lac 2 Technology Hub"
 TUN_lac2_tech_hub_desc: "The Lac 2 district near Tunis has emerged as Tunisia's technology hub, hosting startups, multinational tech companies, and innovation centers. Continued development of this ecosystem through infrastructure investment and regulatory support will anchor Tunisia's digital economy."

 TUN_outsourcing_sector: "Outsourcing Sector Expansion"
 TUN_outsourcing_sector_desc: "Tunisia's French-language capabilities and time zone alignment with Europe make it attractive for business process outsourcing. Expanding call centers, back-office operations, and technical support services can create employment while building skills for higher-value work."

 TUN_startup_act: "Startup Act Implementation"
 TUN_startup_act_desc: "Tunisia's 2018 Startup Act created a favorable legal framework for technology entrepreneurs, including tax incentives, simplified incorporation, and a startup visa for foreign talent. Full implementation and promotion of this framework will accelerate startup formation and growth."

 TUN_fintech_regulation: "Fintech Regulatory Framework"
 TUN_fintech_regulation_desc: "Financial technology offers opportunities to expand financial inclusion and create high-value jobs, but requires appropriate regulation to protect consumers and ensure stability. A progressive fintech regulatory framework will enable innovation while managing risks."

 TUN_e_government: "E-Government Initiative"
 TUN_e_government_desc: "Digitizing government services can improve efficiency, reduce corruption, and enhance citizen engagement. An e-government initiative will modernize public administration while creating demand for Tunisian technology services and skills."

 TUN_affairs_relations_root: "Internal Affairs & Foreign Relations"
 TUN_affairs_relations_root_desc: "Tunisia must navigate complex domestic social issues while managing relationships with neighbors, European partners, and global powers. The choices made in internal affairs and foreign policy will shape Tunisia's identity and trajectory for generations."

 TUN_social_affairs: "Social Affairs"
 TUN_social_affairs_desc: "Tunisia has historically been the most progressive Arab country on social issues, particularly women's rights. Preserving and extending this legacy while navigating pressures from conservative forces will define the character of Tunisian society."

 TUN_personal_status_code: "Personal Status Code"
 TUN_personal_status_code_desc: "The 1956 Personal Status Code, enacted by Habib Bourguiba, granted Tunisian women rights unmatched in the Arab world including prohibition of polygamy and rights to divorce. This progressive legacy must be defended and extended in the new democratic era."

 TUN_gender_parity_law: "Gender Parity Law"
 TUN_gender_parity_law_desc: "The 2014 constitution guarantees gender parity in elected assemblies, but implementation remains incomplete. Strengthening electoral laws to ensure genuine gender balance in political representation will make Tunisia a model for women's political participation in the region."

 TUN_inheritance_equality: "Inheritance Equality Reform"
 TUN_inheritance_equality_reform_desc: "Islamic inheritance law, which grants women half the share of male heirs, remains enshrined in Tunisian law despite the country's otherwise progressive personal status code. Reform to establish gender equality in inheritance would be historic but deeply controversial."

 TUN_defend_secular_rights: "Defend Secular Rights"
 TUN_defend_secular_rights_desc: "Freedom of conscience, expression, and lifestyle face threats from conservative religious forces seeking to impose their values on all Tunisians. Defending secular rights through legislation and constitutional protections will preserve Tunisia's pluralistic character."

 TUN_civil_society_support: "Civil Society Support"
 TUN_civil_society_support_desc: "Tunisia's vibrant civil society, including NGOs, professional associations, and advocacy groups, played a crucial role in the revolution and democratic transition. Supporting this sector through legal protections and funding will strengthen democratic accountability."

 TUN_ugtt_relations: "UGTT Relations"
 TUN_ugtt_relations_desc: "The Union Générale Tunisienne du Travail is Tunisia's most powerful civil society organization, representing hundreds of thousands of workers and wielding significant political influence. Managing relations with the UGTT is essential for social stability and economic reform."

 TUN_migration_affairs: "Migration Affairs"
 TUN_migration_affairs_desc: "Tunisia faces migration pressures from multiple directions: young Tunisians seeking opportunities in Europe, sub-Saharan Africans transiting through Tunisia, and the return of Tunisian foreign fighters from Syria. Managing these flows requires careful policy and international cooperation."

 TUN_harraga_crisis: "Harraga Crisis"
 TUN_harraga_crisis_desc: "Thousands of young Tunisians attempt irregular migration to Europe each year, risking their lives in overcrowded boats. These 'harraga' or 'burners' of their identity documents represent both a humanitarian tragedy and a symptom of Tunisia's failure to provide opportunities for its youth."

 TUN_diaspora_remittances: "Diaspora Remittances"
 TUN_diaspora_remittances_desc: "Tunisians living abroad, particularly in France, send billions of dollars home annually in remittances. Policies to facilitate these transfers, engage the diaspora, and encourage productive investment of remittances can maximize benefits from this financial flow."

 TUN_stem_exodus: "STEM Brain Drain Prevention"
 TUN_stem_exodus_desc: "Tunisia invests heavily in educating scientists, engineers, and medical professionals who then emigrate to Europe for better opportunities. Policies to retain STEM talent through improved conditions, research funding, and career opportunities are essential for economic development."

 TUN_subsaharan_transit: "Sub-Saharan Transit Migration"
 TUN_subsaharan_transit_desc: "Tunisia has become a transit point for sub-Saharan African migrants seeking to reach Europe. Managing this flow humanely while preventing exploitation by smugglers requires cooperation with origin countries, European partners, and international organizations."

 TUN_eu_migration_deal: "EU Migration Partnership"
 TUN_eu_migration_deal_desc: "The European Union seeks Tunisia's cooperation in managing migration flows across the Mediterranean. A comprehensive partnership could provide Tunisia with financial support and development assistance in exchange for cooperation on border management and returns of irregular migrants."

 TUN_expulsion_policy: "Migrant Expulsion Policy"
 TUN_expulsion_policy_desc: "Rather than cooperating with European migration management, Tunisia could adopt a hardline approach expelling irregular migrants to the southern border. This policy would be controversial internationally but might satisfy domestic demands for action on migration."

 TUN_environment_affairs: "Environmental Affairs"
 TUN_environment_affairs_desc: "Tunisia faces severe environmental challenges including water scarcity, desertification, and industrial pollution. Addressing these issues is essential for long-term sustainability and public health, though environmental concerns often conflict with economic development priorities."

 TUN_water_crisis: "Water Crisis Response"
 TUN_water_crisis_desc: "Tunisia is among the most water-stressed countries in the world, with per capita renewable water resources far below the scarcity threshold. Climate change will exacerbate this crisis. Urgent action on water management, efficiency, and new supply sources is essential."

 TUN_medjerda_management: "Medjerda River Basin Management"
 TUN_medjerda_management_desc: "The Medjerda River provides the majority of Tunisia's surface water but suffers from siltation, pollution, and competing demands. Comprehensive basin management through dam maintenance, pollution control, and demand management will protect this vital resource."

 TUN_desertification: "Desertification Combat"
 TUN_desertification_desc: "The Sahara continues its northward advance, threatening agricultural land and displacing communities. Combating desertification through tree planting, sustainable land management, and protection of vegetation cover is essential for Tunisia's long-term habitability."

 TUN_green_belt: "Great Green Belt Project"
 TUN_green_belt_desc: "A massive afforestation project creating a green belt across Tunisia's semi-arid regions could slow desertification, sequester carbon, and create employment in marginalized communities. This ambitious undertaking would represent Tunisia's contribution to global climate efforts."

 TUN_gabes_pollution: "Gabès Pollution Remediation"
 TUN_gabes_pollution_desc: "The industrial complex at Gabès, processing phosphates into chemicals, has devastated the local environment through air and water pollution. Remediation efforts and cleaner production methods are urgently needed to protect public health and restore the once-beautiful Gulf of Gabès."

 TUN_maghreb_relations: "Maghreb Relations"
 TUN_maghreb_relations_desc: "Tunisia's immediate neighborhood in the Maghreb presents both opportunities and challenges. Relations with Algeria and Libya, management of the Morocco-Algeria rivalry, and hopes for regional integration will shape Tunisia's position in North Africa."

 TUN_algeria_partnership: "Algeria Partnership"
 TUN_algeria_partnership_desc: "Algeria, Tunisia's giant neighbor to the west, provides natural gas through the TransMed pipeline and represents a crucial security partner against terrorism. Deepening the partnership with Algiers while maintaining Tunisian independence requires careful diplomacy."

 TUN_transmed_pipeline: "TransMed Pipeline"
 TUN_transmed_pipeline_desc: "The TransMed pipeline carries Algerian natural gas across Tunisia to Italy, providing transit fees and supply security for Tunisia. Expanding this infrastructure and potentially adding new pipelines would strengthen Tunisia's role as an energy corridor between Africa and Europe."

 TUN_algerian_security_coop: "Algerian Security Cooperation"
 TUN_algerian_security_coop_desc: "The mountainous border with Algeria harbors terrorist groups that neither country can defeat alone. Enhanced security cooperation through intelligence sharing, joint operations, and coordinated border control will improve security for both nations."

 TUN_libya_policy: "Libya Policy"
 TUN_libya_policy_desc: "The collapse of the Libyan state has profound implications for Tunisia, from refugee flows and weapons smuggling to economic disruption and terrorist infiltration. Tunisia must develop a coherent policy toward its chaotic eastern neighbor while protecting its own stability."

 TUN_libya_border_crisis: "Libya Border Crisis Management"
 TUN_libya_border_crisis_desc: "The Libyan border has become a source of constant security and humanitarian challenges. Managing refugee flows, preventing arms smuggling, and combating terrorist infiltration while maintaining cross-border trade requires significant resources and international support."

 TUN_libya_trade: "Libya Trade Relations"
 TUN_libya_trade_desc: "Despite the chaos, economic ties with Libya remain important for Tunisia, particularly for border communities dependent on cross-border commerce. Maintaining trade relations while managing security risks requires flexible policies and pragmatic engagement with Libyan actors."

 TUN_amu_revival: "Arab Maghreb Union Revival"
 TUN_amu_revival_desc: "The Arab Maghreb Union, founded in 1989, has been paralyzed by the Algeria-Morocco dispute over Western Sahara. Tunisia, as a neutral party, could play a mediating role in reviving regional integration that could unlock enormous economic potential for all Maghreb countries."

 TUN_european_relations: "European Relations"
 TUN_european_relations_desc: "Europe is Tunisia's most important economic and political partner, destination for exports and migrants alike. Managing relations with the EU and key member states, particularly France and Italy, is central to Tunisia's foreign policy and development strategy."

 TUN_france_ties: "France Bilateral Relations"
 TUN_france_ties_desc: "France, the former colonial power, remains Tunisia's most important bilateral partner. Deep economic ties, a large Tunisian diaspora in France, and shared language create an interdependence that Tunisia must manage carefully to maximize benefits while asserting sovereignty."

 TUN_francophone_policy: "Francophone Policy"
 TUN_francophone_policy_desc: "French language and culture remain deeply embedded in Tunisian society, particularly among elites. Tunisia's stance toward Francophonie, French language education, and cultural policy involves sensitive questions of identity, practical opportunity, and post-colonial relations."

 TUN_italy_cooperation: "Italy Cooperation"
 TUN_italy_cooperation_desc: "Italy, the nearest European country just 140 kilometers across the Strait of Sicily, has vital interests in Tunisia's stability. Cooperation with Rome on migration, energy, and trade can benefit both countries while giving Tunisia leverage within the EU."

 TUN_lampedusa_migration: "Lampedusa Migration Coordination"
 TUN_lampedusa_migration_desc: "The Italian island of Lampedusa is the destination for most migrants departing from Tunisia. Coordination with Italian authorities on search and rescue, returns of irregular migrants, and legal migration pathways is essential for managing this sensitive issue."

 TUN_eu_deep_trade: "EU Deep Trade Agreement"
 TUN_eu_deep_trade_desc: "Tunisia seeks a Deep and Comprehensive Free Trade Agreement with the EU that would go beyond goods to include services, investment, and regulatory alignment. Such an agreement could boost growth but requires difficult domestic reforms and may threaten sensitive sectors."

 TUN_eu_candidacy: "EU Membership Aspirations"
 TUN_eu_candidacy_desc: "Though EU membership for a North African country remains far-fetched, Tunisia could seek formal candidate status or advanced partnership that would provide a roadmap for reform and integration. This ambitious goal would transform Tunisia's domestic and foreign policy trajectory."

 TUN_middle_east_relations: "Middle East Relations"
 TUN_middle_east_relations_desc: "Tunisia must navigate the complex politics of the Middle East, where rivalries between Qatar and the UAE, Turkey and Saudi Arabia, shape the options available to small states. Choosing sides in these disputes carries both opportunities and risks."

 TUN_qatar_ties: "Qatar Partnership"
 TUN_qatar_ties_desc: "Qatar has provided financial support to Tunisia since the revolution and maintains close ties with Ennahda and Islamist-leaning governments. A Qatar partnership offers investment and political backing but aligns Tunisia with one side of the Gulf rivalry."

 TUN_qatar_investment: "Qatari Investment"
 TUN_qatar_investment_desc: "Qatar's sovereign wealth fund and private investors could provide significant capital for Tunisian development. Attracting Qatari investment in infrastructure, tourism, and strategic sectors would reduce dependence on Western financing sources."

 TUN_uae_ties: "UAE Partnership"
 TUN_uae_ties_desc: "The UAE opposes Islamist political movements and has supported secular forces across the Arab world. Partnership with Abu Dhabi offers an alternative to Qatar's support but would require Tunisia to distance itself from Islamist parties and align with UAE regional positions."

 TUN_uae_investment: "UAE Investment Attraction"
 TUN_uae_investment_desc: "Emirati investors control significant capital seeking opportunities outside the Gulf. Attracting UAE investment to Tunisia would provide financing for development while strengthening ties with this influential Gulf state."

 TUN_turkey_cooperation: "Turkey Cooperation"
 TUN_turkey_cooperation_desc: "Turkey under President Erdogan has pursued an activist policy in the Arab world, supporting Islamist movements and projecting influence across the Mediterranean. Cooperation with Ankara offers opportunities but risks entanglement in Turkey's regional controversies."

 TUN_turkey_trade: "Turkey Trade Expansion"
 TUN_turkey_trade_desc: "Turkey and Tunisia share Mediterranean geography and complementary economies. Expanded trade relations, investment flows, and economic cooperation can benefit both countries regardless of political alignments."

 TUN_global_relations: "Global Power Relations"
 TUN_global_relations_desc: "Beyond its immediate region, Tunisia must manage relationships with global powers including the United States, China, and international institutions. These relationships offer resources and protection but require careful navigation of great power competition."

 TUN_us_mnna: "US Strategic Partnership"
 TUN_us_mnna_desc: "The United States designated Tunisia as a Major Non-NATO Ally in 2015, recognizing its importance as a democratic partner in a troubled region. Deepening this partnership provides access to military assistance, political support, and economic opportunity."

 TUN_us_military_aid: "US Military Assistance"
 TUN_us_military_aid_desc: "American military assistance programs provide equipment, training, and intelligence support essential for Tunisia's counterterrorism operations. Expanding this assistance will enhance Tunisian military capabilities while strengthening bilateral ties."

 TUN_china_bri: "Belt and Road Engagement"
 TUN_china_bri_desc: "China's Belt and Road Initiative offers infrastructure financing without the political conditions attached to Western assistance. Engaging with BRI could provide resources for development but raises concerns about debt sustainability and geopolitical alignment."

 TUN_china_port_investment: "Chinese Port Investment"
 TUN_china_port_investment_desc: "Chinese investors have expressed interest in Tunisia's port infrastructure, potentially developing new facilities or upgrading existing ports. Such investment could enhance Tunisia's logistics capabilities but raises strategic concerns shared by Western partners."

 TUN_world_bank_loans: "World Bank Development Financing"
 TUN_world_bank_loans_desc: "The World Bank provides concessional financing for development projects along with technical assistance and policy advice. Expanding engagement with the Bank can fund priority projects while supporting reform efforts."

 TUN_african_union: "African Union Engagement"
 TUN_african_union_desc: "Tunisia's African identity is often overlooked in favor of its Arab and Mediterranean affiliations. Greater engagement with the African Union and sub-Saharan African states could open new markets and diversify Tunisia's international relationships."

 TUN_internal_politics_root: "Internal Politics"
 TUN_internal_politics_root_desc: "Tunisia's internal political trajectory remains contested between those who seek to deepen democracy and those who prefer a return to authoritarian stability. The choices made on constitutional design, media freedom, and security policy will shape the nation's future."

 TUN_constitutional_framework: "Constitutional Framework"
 TUN_constitutional_framework_desc: "The balance of power between president, parliament, and government established by the 2014 constitution has proven contentious in practice. Constitutional interpretation and possible revision will shape how Tunisia is governed for decades to come."

 TUN_strengthen_executive: "Strengthen Executive Power"
 TUN_strengthen_executive_desc: "The parliamentary system established in 2014 has produced weak, fragmented governments unable to address Tunisia's challenges. Strengthening executive authority, whether through constitutional revision or political practice, could enable more decisive governance."

 TUN_presidential_powers: "Expand Presidential Powers"
 TUN_presidential_powers_desc: "The president's constitutional powers are limited, but these constraints could be loosened through constitutional revision or creative interpretation. Expanded presidential authority would concentrate power but might enable more effective governance."

 TUN_strengthen_parliament: "Strengthen Parliamentary Democracy"
 TUN_strengthen_parliament_desc: "The parliament represents the democratic heart of Tunisia's political system but has been weakened by fragmentation and executive overreach. Strengthening parliamentary powers and procedures would deepen democratic accountability."

 TUN_parliamentary_oversight: "Parliamentary Oversight"
 TUN_parliamentary_oversight_desc: "Effective parliamentary oversight of the executive is essential for democratic accountability. Enhanced committee powers, investigative authority, and transparency requirements will ensure the parliament can hold government accountable."

 TUN_judicial_independence: "Judicial Independence"
 TUN_judicial_independence_desc: "An independent judiciary is essential for rule of law and constitutional government. Protecting judges from political pressure through institutional safeguards and adequate resources will strengthen Tunisia's democratic foundations."

 TUN_media_landscape: "Media Landscape"
 TUN_media_landscape_desc: "The collapse of Ben Ali's media controls unleashed a chaotic but vibrant media landscape. The balance between press freedom and responsible journalism, and between state and private media, will shape public discourse and democratic accountability."

 TUN_press_freedom: "Press Freedom Protection"
 TUN_press_freedom_desc: "Tunisia's constitution guarantees press freedom, but implementation remains incomplete. Strengthening legal protections, ending prosecutions of journalists, and ensuring access to information will make Tunisia a model for press freedom in the Arab world."

 TUN_independent_media: "Independent Media Support"
 TUN_independent_media_desc: "A diverse, financially sustainable independent media sector is essential for democratic accountability. Supporting independent journalism through legal protections, training programs, and sustainable business models will strengthen Tunisia's information ecosystem."

 TUN_press_control: "Media Regulation"
 TUN_press_control_desc: "The chaos of Tunisia's post-revolutionary media landscape has produced misinformation, polarization, and irresponsible journalism. Regulatory measures to ensure accuracy, prevent hate speech, and promote responsible reporting may be necessary despite press freedom concerns."

 TUN_state_media: "State Media Reform"
 TUN_state_media_desc: "Tunisia's state television and radio remain important despite the proliferation of private outlets. Reforming state media to serve public interest rather than government propaganda would provide a model for quality journalism while maintaining editorial independence."

 TUN_security_apparatus: "Security Apparatus"
 TUN_security_apparatus_desc: "Tunisia's security services, instruments of repression under Ben Ali, must be reformed for democratic governance while maintaining capacity to address genuine security threats. Balancing reform and effectiveness is essential for Tunisia's future."

 TUN_intelligence_reform: "Intelligence Service Reform"
 TUN_intelligence_reform_desc: "The intelligence services were deeply implicated in Ben Ali's repression and require fundamental reform. New legal frameworks, oversight mechanisms, and professional standards will transform these agencies into servants of the democratic state rather than instruments of political control."

 TUN_civilian_oversight: "Civilian Security Oversight"
 TUN_civilian_oversight_desc: "Democratic control of security services requires robust civilian oversight through parliament, independent bodies, and judicial review. Establishing these mechanisms will prevent a return to the abuses of the past while maintaining security effectiveness."

 TUN_internal_security: "Internal Security Capacity"
 TUN_internal_security_desc: "Tunisia faces genuine security threats from terrorism, organized crime, and social unrest. Maintaining effective internal security capacity while respecting human rights requires professional police forces, appropriate legal authorities, and proportionate responses."

 TUN_emergency_powers: "Emergency Powers Framework"
 TUN_emergency_powers_desc: "The invocation of emergency powers has been controversial, with critics arguing they have been used to suppress legitimate dissent. A clear legal framework defining when and how emergency powers can be used will balance security needs with rights protection."

 TUN_transitional_justice: "Transitional Justice"
 TUN_transitional_justice_desc: "Addressing the crimes of the Ben Ali era through transitional justice mechanisms is essential for national reconciliation. However, the approach to truth, accountability, and reparations remains contested between those demanding justice and those preferring to move on."

 TUN_ivd_commission: "Instance Vérité et Dignité"
 TUN_ivd_commission_desc: "The Truth and Dignity Commission was established to document human rights violations from 1955 to 2013 and recommend accountability measures. Supporting or undermining the IVD's work will shape Tunisia's reckoning with its authoritarian past."

 TUN_victims_hearings: "Public Victim Hearings"
 TUN_victims_hearings_desc: "The IVD's public hearings, broadcast on national television, allowed victims to share their stories of torture, imprisonment, and abuse under the dictatorship. Supporting continued hearings and documentation will ensure the historical record is complete."

 TUN_accountability: "Accountability for Past Crimes"
 TUN_accountability_desc: "Many perpetrators of human rights violations under Ben Ali remain unpunished and in positions of influence. Pursuing accountability through prosecutions, lustration, and institutional bans would provide justice but risks destabilizing institutions and alienating powerful interests."

 TUN_economic_reconciliation: "Economic Reconciliation"
 TUN_economic_reconciliation_desc: "An alternative to prosecutorial justice focuses on economic reconciliation, allowing former regime figures to pay fines in exchange for amnesty. This approach prioritizes pragmatic stability and revenue generation over retributive justice."

 TUN_amnesty_law: "Administrative Reconciliation Law"
 TUN_amnesty_law_desc: "A comprehensive amnesty for administrative corruption under the old regime would close the book on the past and encourage former officials to participate in the new order. Critics argue this betrays the revolution's demand for accountability."

 TUN_rcd_regime: "The RCD Regime"
 TUN_rcd_regime_desc: "The Constitutional Democratic Rally has ruled Tunisia since independence, first under Bourguiba, now under Ben Ali. The party apparatus, security services, and controlled media maintain a stable if stifling order. The regime will endure as long as it retains control and popular acquiescence."

 TUN_rcd_party_machine: "RCD Party Machine"
 TUN_rcd_party_machine_desc: "The RCD functions as the political backbone of the regime, extending into every community and workplace. Its cells monitor the population, distribute patronage, and mobilize support for the president. Strengthening this apparatus ensures continued political control."

 TUN_rcd_cells_expansion: "Party Cell Expansion"
 TUN_rcd_cells_expansion_desc: "The RCD maintains cells in every workplace, neighborhood, and institution. Expanding this network ensures no Tunisian can escape the party's reach and that any dissent is detected and reported before it can spread."

 TUN_party_youth_wings: "Party Youth Organization"
 TUN_party_youth_wings_desc: "The RCD's youth wings socialize young Tunisians into the party structure from an early age. Sports clubs, student organizations, and cultural activities all serve to bind youth to the party and identify potential future cadres."

 TUN_managed_elections: "Managed Elections"
 TUN_managed_elections_desc: "Tunisia holds regular elections that provide a veneer of democratic legitimacy while ensuring predetermined outcomes. The management of candidate lists, vote counting, and media coverage ensures the RCD always wins by comfortable margins."

 TUN_controlled_opposition: "Controlled Opposition"
 TUN_controlled_opposition_desc: "A handful of token opposition parties are permitted to exist, providing the appearance of pluralism while posing no genuine threat. These parties are infiltrated by security services and their leaders understand the limits of permissible criticism."

 TUN_2004_election_farce: "2004 Election"
 TUN_2004_election_farce_desc: "The 2004 presidential election will demonstrate the regime's continued dominance. Ben Ali will secure another overwhelming mandate through the familiar machinery of managed voting, ensuring his continued rule for another term."

 TUN_2009_election_landslide: "2009 Election"
 TUN_2009_election_landslide_desc: "The 2009 election cycle approaches with constitutional changes ensuring Ben Ali can run again. Another landslide victory will cement his position as president for life in all but name."

 TUN_trabelsi_clan: "The Trabelsi Clan"
 TUN_trabelsi_clan_desc: "Leila Trabelsi, the president's wife, heads a family that has accumulated enormous economic power through corruption and privilege. The Trabelsi clan's business interests span telecommunications, banking, real estate, and retail, extracting wealth from every sector of the economy."

 TUN_expand_trabelsi_business: "Expand Trabelsi Interests"
 TUN_expand_trabelsi_business_desc: "The Trabelsi clan's appetite for wealth knows no bounds. Expanding their business empire through new concessions, forced partnerships, and outright seizure of profitable enterprises enriches the family while further entrenching corruption at the heart of the regime."

 TUN_limit_family_influence: "Limit Family Influence"
 TUN_limit_family_influence_desc: "The Trabelsi clan's rapacity has become a liability, generating resentment and international embarrassment. Quietly limiting their most egregious excesses could reduce the regime's vulnerability while maintaining the basic structure of power."

 TUN_economic_capture: "Economic Capture"
 TUN_economic_capture_desc: "The Trabelsi clan and their associates have captured key sectors of the economy, extracting rents through monopolies, licenses, and forced partnerships. This economic capture enriches the inner circle while distorting development and stifling legitimate enterprise."

 TUN_dynastic_succession: "Dynastic Succession Planning"
 TUN_dynastic_succession_desc: "Ben Ali cannot rule forever. Planning for succession, whether to a family member or trusted associate, is essential to ensure the regime survives the president's eventual departure. The Trabelsi clan has ambitions of their own."

 TUN_technocratic_reform: "Technocratic Reform"
 TUN_technocratic_reform_desc: "Some within the regime recognize that corruption and dysfunction threaten long-term stability. Technocratic reforms to improve governance, attract investment, and address grievances might extend the regime's lifespan without fundamentally challenging its nature."

 TUN_ben_ali_security_state: "Security State Apparatus"
 TUN_ben_ali_security_state_desc: "The regime's foundation rests on a vast security apparatus that monitors the population, suppresses dissent, and eliminates threats before they can materialize. The Interior Ministry, intelligence services, and political police form an interlocking system of control."

 TUN_securitize_islamism: "Securitize Islamism"
 TUN_securitize_islamism_desc: "Political Islam represents the greatest ideological threat to the secular regime. Framing Islamism as a security threat rather than a political movement justifies comprehensive repression and wins Western support for Tunisia's counterterrorism cooperation."

 TUN_dismantle_ennahda: "Dismantle Ennahda"
 TUN_dismantle_ennahda_desc: "The Ennahda movement, despite decades of repression, maintains underground networks and support. Systematic dismantling through arrests, exile, torture, and intimidation will eliminate this threat and prevent any Islamist political alternative from emerging."

 TUN_prison_network: "Political Prison Network"
 TUN_prison_network_desc: "Tunisia's prisons hold thousands of political prisoners, particularly Islamists subjected to torture and abuse. This brutal system serves both to punish and deter dissent, though it also radicalizes prisoners and their families."

 TUN_intelligence_state: "Intelligence State"
 TUN_intelligence_state_desc: "Multiple intelligence agencies compete to monitor the population and detect threats. This redundancy ensures comprehensive surveillance while preventing any single agency from accumulating too much autonomous power."

 TUN_expand_interior_ministry: "Interior Ministry Expansion"
 TUN_expand_interior_ministry_desc: "The Interior Ministry commands the largest security force and most extensive surveillance network. Expanding its capabilities and resources will strengthen internal control while providing employment for regime loyalists."

 TUN_surveillance_networks: "Surveillance Networks"
 TUN_surveillance_networks_desc: "Beyond formal intelligence agencies, the regime relies on networks of informers penetrating every institution and community. Neighbors inform on neighbors, employees on colleagues, creating a climate of pervasive suspicion that deters collective action."

 TUN_anti_terror_western_cooperation: "Western Counter-Terror Cooperation"
 TUN_anti_terror_western_cooperation_desc: "Tunisia's authoritarian methods are overlooked by Western governments grateful for cooperation against Islamist terrorism. This partnership provides political cover, security assistance, and legitimacy while reinforcing the regime's narrative about the Islamist threat."

 TUN_cia_partnership: "CIA Partnership"
 TUN_cia_partnership_desc: "The CIA values Tunisia as a partner in rendition operations and intelligence sharing on North African jihadists. This partnership provides American cover for the regime while generating intelligence used in the global war on terror."

 TUN_dgse_cooperation: "DGSE Cooperation"
 TUN_dgse_cooperation_desc: "French intelligence maintains close ties with Tunisian services dating to the colonial era. This cooperation provides the regime with technical capabilities and political support from Tunisia's most important European partner."

 TUN_media_control: "Media Control"
 TUN_media_control_desc: "Complete control of information is essential for regime stability. State television promotes the president's cult of personality, newspapers print only approved content, and the internet is monitored and censored to prevent the spread of dissent."

 TUN_press_censorship: "Press Censorship"
 TUN_press_censorship_desc: "Every publication in Tunisia is subject to state censorship, whether through direct control, self-censorship by editors, or legal harassment of those who cross invisible lines. The result is a media landscape devoid of genuine criticism."

 TUN_ammar_404: "Internet Censorship - Ammar 404"
 TUN_ammar_404_desc: "Tunisia was an early pioneer of internet censorship, blocking access to critical websites and monitoring online activity. The mythical censor 'Ammar 404', named for the HTTP error message users see when blocked, has become a symbol of the regime's information control."

 TUN_block_social_media: "Block Social Media"
 TUN_block_social_media_desc: "Social media platforms like Facebook and YouTube enable the spread of information outside state control. Blocking these platforms entirely would prevent their use for organizing dissent, though it would also limit their commercial and educational value."

 TUN_selective_internet_access: "Selective Internet Access"
 TUN_selective_internet_access_desc: "Rather than blocking the internet entirely, sophisticated filtering allows commercial and educational use while targeting political content. This selective approach maintains economic benefits while controlling the most dangerous speech."

 TUN_coopt_civil_society: "Co-opt Civil Society"
 TUN_coopt_civil_society_desc: "Independent civil society organizations are either suppressed, co-opted, or replaced with regime-controlled alternatives. Professional associations, women's groups, and even human rights organizations can be captured and turned into instruments of control."

 TUN_manage_ugtt: "Manage UGTT"
 TUN_manage_ugtt_desc: "The UGTT labor federation is too large and historically significant to simply suppress. Instead, the regime manages it through a combination of co-optation of leadership, selective repression of militants, and limited concessions to worker demands."

 TUN_ben_ali_economic_model: "Ben Ali Economic Model"
 TUN_ben_ali_economic_model_desc: "The regime has delivered economic growth through liberal policies, European integration, and authoritarian stability. This economic performance provides legitimacy, enriches cronies, and gives Western partners reasons to overlook political repression."

 TUN_eu_partnership_agreement: "EU Partnership Agreement"
 TUN_eu_partnership_agreement_desc: "Tunisia's Association Agreement with the EU provides preferential market access and positions the country as Europe's closest North African partner. This relationship brings economic benefits while lending international legitimacy to the regime."

 TUN_free_trade_zones: "Free Trade Zone Expansion"
 TUN_free_trade_zones_desc: "Offshore manufacturing zones have attracted European investment seeking low-cost production near home markets. Expanding these zones creates jobs and export revenue while integrating Tunisia into European supply chains."

 TUN_privatization_program: "Privatization Program"
 TUN_privatization_program_desc: "State enterprises have been privatized under IMF and World Bank guidance, ostensibly to improve efficiency. In practice, privatization has often meant transfer of assets to regime cronies at below-market prices."

 TUN_crony_privatization: "Crony Privatization"
 TUN_crony_privatization_desc: "Privatization provides an opportunity to reward loyalists with valuable state assets. Rigged tenders, insider dealing, and forced partnerships ensure that the regime's allies capture the benefits of reform programs."

 TUN_transparent_privatization: "Transparent Privatization"
 TUN_transparent_privatization_desc: "Conducting privatization through transparent processes with genuine competition would maximize proceeds, attract foreign investment, and improve the credibility of economic reform. However, this would limit opportunities for crony enrichment."

 TUN_tourism_showcase: "Tourism Showcase"
 TUN_tourism_showcase_desc: "Tourism is the regime's great success story, drawing millions of European visitors to Mediterranean beaches and Roman ruins. The industry generates foreign exchange, employment, and an image of Tunisia as a modern, welcoming destination."

 TUN_coastal_development_priority: "Coastal Development Priority"
 TUN_coastal_development_priority_desc: "Economic development has concentrated on the coast, where tourism, manufacturing, and services flourish. This geographic focus generates growth and creates a prosperous constituency for the regime, even as the interior stagnates."

 TUN_constitutional_revision_2002: "Constitutional Revision 2002"
 TUN_constitutional_revision_2002_desc: "The 2002 constitutional referendum removed presidential term limits and expanded executive powers. This revision ensures Ben Ali can remain in office indefinitely while concentrating authority in his hands."

 TUN_remove_term_limits: "Remove Term Limits"
 TUN_remove_term_limits_desc: "The constitutional amendment eliminating presidential term limits allows Ben Ali to rule for life. This change, endorsed by a farcical referendum, transforms Tunisia into a de facto life presidency."
 #Events
 tunisia_politics.1.t: "The Spark in Sidi Bouzid"
 tunisia_politics.1.d: "On December 17, 2010, Mohamed Bouazizi, a 26-year-old street vendor in Sidi Bouzid, set himself on fire in front of the local government building after his cart was confiscated and he was publicly humiliated by a municipal inspector. His desperate act of protest against corruption, unemployment, and police abuse has sent shockwaves through the impoverished interior regions. Crowds have gathered outside the hospital where Bouazizi clings to life. The question now is how the government will respond to this unprecedented act of defiance."
 tunisia_politics.1.a: "Attempt to contain the situation locally"
 tunisia_politics.1.b: "Offer immediate concessions to Sidi Bouzid"
 tunisia_politics.1.c: "Send security forces to restore order"

 tunisia_politics.2.t: "Protests Spread Across Tunisia"
 tunisia_politics.2.d: "What began as local unrest in Sidi Bouzid has now erupted across the country. Kasserine, Thala, and Regueb have seen violent clashes between protesters and security forces, with reports of live ammunition being used against crowds. The protests have reached the capital, Tunis, where thousands have taken to the streets demanding jobs, dignity, and an end to the Ben Ali regime. Labor unions, lawyers, and students have joined the movement, transforming isolated anger into a nationwide uprising. The situation is deteriorating rapidly."
 tunisia_politics.2.a: "Declare a state of emergency"
 tunisia_politics.2.b: "Promise sweeping reforms"
 tunisia_politics.2.c: "Crush the protests by force"

 tunisia_politics.3.t: "State of Emergency Declared"
 tunisia_politics.3.d: "With protests showing no signs of abating and security forces struggling to maintain control, the government has declared a state of emergency. A nationwide curfew is being considered as reports of looting, arson, and running battles between demonstrators and police pour in from across the country. The UGTT labor union has called for a general strike in several governorates, threatening to paralyze the economy entirely. The regime must decide how far it is willing to go to restore order."
 tunisia_politics.3.a: "Impose a nationwide curfew immediately"
 tunisia_politics.3.b: "Limited security measures only"
 tunisia_politics.3.c: "Seek a compromise with the UGTT"

 tunisia_politics.4.t: "The Security Forces at a Crossroads"
 tunisia_politics.4.d: "The Interior Ministry's security apparatus faces an impossible choice. Riot police and special units have been deployed across every major city, but the sheer scale of the protests is overwhelming their capacity. Some officers have already refused orders to fire on civilians. Reports from Kasserine describe scenes of carnage where security forces opened fire on unarmed demonstrators. The international community is watching. Every bullet fired risks turning more Tunisians against the regime."
 tunisia_politics.4.a: "Authorize the use of live ammunition"
 tunisia_politics.4.b: "Order maximum restraint"
 tunisia_politics.4.c: "Allow security forces to stand aside"

 tunisia_politics.5.t: "The Army Refuses to Fire"
 tunisia_politics.5.d: "General Rachid Ammar, Chief of Staff of the Tunisian Armed Forces, has made a fateful decision. When ordered to deploy troops against civilian protesters, he refused, declaring that the army exists to protect the nation, not to massacre its people. Tanks have been positioned in the streets of Tunis, but their guns point outward, shielding demonstrators rather than threatening them. The army's refusal to participate in repression has fundamentally altered the balance of power. Without military backing, the regime's survival is in question."
 tunisia_politics.5.a: "The army declares neutrality"
 tunisia_politics.5.b: "The army supports the regime"
 tunisia_politics.5.c: "The army sides with the protesters"

 tunisia_politics.6.t: "The UGTT Joins the Revolution"
 tunisia_politics.6.d: "The Union Générale Tunisienne du Travail, Tunisia's powerful labor federation with over 500,000 members, has thrown its full weight behind the protest movement. Regional chapters had already been supporting demonstrations independently, but the national leadership has now called for a general strike that will bring the country to a standstill. The UGTT's organizational infrastructure gives the previously spontaneous uprising a coordinated backbone. Factories, schools, and government offices are emptying as workers walk out."
 tunisia_politics.6.a: "Open negotiations with the UGTT"
 tunisia_politics.6.b: "Ignore the union's demands"
 tunisia_politics.6.c: "Arrest the union leadership"

 tunisia_politics.7.t: "Cabinet Reshuffle Under Pressure"
 tunisia_politics.7.d: "In a desperate attempt to appease the public, President Ben Ali has announced a cabinet reshuffle. Several ministers closely associated with the Trabelsi clan and accused of corruption have been dismissed. Ben Ali appeared on national television promising reforms, job creation programs, and an end to censorship. However, many Tunisians view these concessions as too little, too late. The streets remain full of protesters who have moved beyond demanding reform to calling for the complete overthrow of the regime."
 tunisia_politics.7.a: "Sacrifice the most corrupt ministers"
 tunisia_politics.7.b: "Bring in technocrats to signal reform"
 tunisia_politics.7.c: "Stand by the inner circle"

 tunisia_politics.8.t: "The Fall of Ben Ali"
 tunisia_politics.8.d: "It is over. After 23 years in power, President Zine El Abidine Ben Ali has lost control of Tunisia. The army has abandoned him, the police can no longer hold the streets, and millions of Tunisians are demanding his departure. A plane stands ready at Tunis-Carthage Airport. Saudi Arabia has quietly signaled its willingness to receive the ousted president and his family. Ben Ali's final hours in the presidential palace at Carthage are ticking away. The Arab world's first popular revolution of the 21st century is reaching its climax."
 tunisia_politics.8.a: "Ben Ali flees to Saudi Arabia"
 tunisia_politics.8.b: "Attempt to hold on to power"
 tunisia_politics.8.c: "Negotiate an exit with guarantees"

 tunisia_politics.9.t: "Asylum in Jeddah"
 tunisia_politics.9.d: "The plane carrying Zine El Abidine Ben Ali, his wife Leila Trabelsi, and members of their inner circle has landed in Jeddah, Saudi Arabia. King Abdullah has granted the former president asylum on humanitarian grounds, despite growing international calls for his extradition to face trial. Back in Tunisia, the streets have erupted in celebration. Twenty-three years of authoritarian rule have ended in twenty-eight days of revolution. The question now is what comes next for a nation that has never known democratic governance."

 tunisia_politics.9.a: "A new chapter begins"

 tunisia_politics.10.t: "The RCD is Dissolved"
 tunisia_politics.10.d: "The Tunisian judiciary has issued a historic ruling: the Constitutional Democratic Rally, the party that dominated Tunisian politics for over half a century under Bourguiba and Ben Ali, has been formally dissolved. Its assets have been seized by the state, its offices shuttered, and its members barred from political activity. The dissolution of the RCD marks the definitive end of the old regime and opens the door to a genuinely pluralistic political landscape for the first time in Tunisian history."
 tunisia_politics.10.a: "The old order is finished"

 tunisia_elections.1.t: "2004 Presidential Election"
 tunisia_elections.1.d: "Tunisia's presidential election proceeds as expected under the watchful eye of the ruling Constitutional Democratic Rally. President Ben Ali, running for his fourth consecutive term, faces token opposition from candidates who pose no real threat to his grip on power. The electoral machinery of the state ensures a predetermined outcome, with state media providing wall-to-wall coverage of the president's campaign while opposition voices are silenced. International observers have declined to monitor what they describe as a process lacking genuine competition."
 tunisia_elections.1.a: "Ben Ali wins with 94.49% of the vote"
 tunisia_elections.1.b: "Allow a slightly more competitive result"

 tunisia_elections.2.t: "2009 Presidential Election"
 tunisia_elections.2.d: "President Ben Ali seeks yet another mandate in an election that few doubt he will win. Constitutional amendments passed in 2002 removed presidential term limits, paving the way for his continued rule. Three opposition candidates have been permitted to run, lending a veneer of democratic legitimacy to the proceedings. Behind the scenes, the security apparatus ensures that no genuine challenge to the president's authority can emerge. Tunisia's carefully managed political system continues to function as designed."
 tunisia_elections.2.a: "Ben Ali wins with 89.62% of the vote"
 tunisia_elections.2.b: "Engineer a closer but still decisive margin"

 tunisia_elections.10.t: "Constituent Assembly Election — October 2011"
 tunisia_elections.10.d: "Tunisia holds its first free and fair election in the nation's history. Millions of Tunisians queue patiently at polling stations to choose the 217 members of a Constituent Assembly tasked with drafting a new constitution. Over 100 parties and thousands of independent candidates are competing in an explosion of democratic participation. The Islamist party Ennahda, led by Rached Ghannouchi who returned from exile in London, is widely expected to perform strongly, but the secular parties hope that their combined support will provide a counterweight."
 tunisia_elections.10.a: "Ennahda wins a commanding plurality"
 tunisia_elections.10.b: "A secular coalition emerges with the plurality"
 tunisia_elections.10.c: "No clear winner — a fragmented assembly"

 tunisia_elections.20.t: "2014 Parliamentary and Presidential Elections"
 tunisia_elections.20.d: "After three turbulent years of transition, Tunisia heads to the polls for parliamentary and presidential elections under its newly adopted 2014 constitution. Nidaa Tounes, a broad secular coalition led by the 87-year-old Beji Caid Essebsi, has positioned itself as the alternative to Ennahda's Islamist governance. The campaign has been fiercely contested, with debates over identity, economics, and the role of religion in public life dominating the discourse. Tunisians are choosing not just their leaders but the direction of their young democracy."
 tunisia_elections.20.a: "Nidaa Tounes wins — Essebsi becomes president"
 tunisia_elections.20.b: "Ennahda maintains its hold on power"
 tunisia_elections.20.c: "A fragmented result requires a coalition"

 tunisia_elections.30.t: "2019 Presidential Election"
 tunisia_elections.30.d: "Tunisia's political establishment has been upended. Kais Saied, a reclusive constitutional law professor with no party apparatus, no campaign budget, and no political experience, has surged to the front of the presidential race on a wave of popular disgust with the political class. His austere persona, formal Arabic rhetoric, and promises to devolve power to local councils have resonated with young voters and those disillusioned by a decade of broken promises. His opponent in the runoff is media mogul Nabil Karoui, who campaigned from a prison cell on corruption charges."
 tunisia_elections.30.a: "Kais Saied wins in a historic landslide"
 tunisia_elections.30.b: "An establishment candidate prevails"
 tunisia_elections.30.c: "An Islamist-aligned candidate wins"

 tunisia_elections.40.t: "Snap Elections Called"
 tunisia_elections.40.d: "The political crisis has reached a point where new elections are the only viable path forward. Parties across the spectrum are scrambling to form alliances and select candidates as Tunisia prepares to return to the polls. The electorate is weary but determined to have their voice heard. Campaign rallies fill the streets as Tunisians debate the future direction of their country."
 tunisia_elections.40.a: "A left-wing coalition wins"
 tunisia_elections.40.b: "A secular right-wing bloc takes power"
 tunisia_elections.40.c: "A centrist populist movement prevails"
 tunisia_elections.40.d: "An Islamist coalition secures victory"

 tunisia_crisis.1.t: "Chokri Belaid Assassinated"
 tunisia_crisis.1.d: "Chokri Belaid, the outspoken leader of the leftist Democratic Patriots' Movement and one of the most prominent critics of the Ennahda-led government, has been gunned down outside his home in Tunis on February 6, 2013. The assassination has sent shockwaves through Tunisian society. Belaid had repeatedly warned that he was receiving death threats from extremist groups and accused the government of failing to protect secular politicians. Tens of thousands have poured into the streets in fury, and the UGTT has called a general strike — the first since the revolution."
 tunisia_crisis.1.a: "The nation mourns and rages"

 tunisia_crisis.2.t: "Mohamed Brahmi Assassinated"
 tunisia_crisis.2.d: "On July 25, 2013, the anniversary of the Tunisian Republic, opposition politician Mohamed Brahmi has been shot dead outside his home in front of his wife and children. Brahmi, a member of the Constituent Assembly and leader of the People's Movement, is the second opposition figure to be assassinated this year. The same weapon used to kill Chokri Belaid was used in this attack. The political crisis is now existential. Opposition parties are withdrawing from the Constituent Assembly, and massive demonstrations are calling for the dissolution of the government."
 tunisia_crisis.2.a: "A second assassination — the government's legitimacy collapses"

 tunisia_crisis.3.t: "Government Collapse"
 tunisia_crisis.3.d: "The Prime Minister has tendered his resignation as the government can no longer command the confidence of the assembly or the street. The coalition has fractured under the weight of political assassinations, economic stagnation, and public fury. Tunisia faces a dangerous vacuum of authority. A new government must be formed quickly to prevent the democratic transition from collapsing entirely, but the political parties are deeply divided over who should lead and on what terms."
 tunisia_crisis.3.a: "The PM resigns — a new government must be formed"
 tunisia_crisis.3.b: "Hold on with a reshuffled cabinet"

 tunisia_crisis.4.t: "The National Dialogue Quartet"
 tunisia_crisis.4.d: "With Tunisia on the brink of collapse, four civil society organizations have stepped forward to mediate between the warring political factions. The Tunisian General Labour Union, the Tunisian Confederation of Industry, the Tunisian Human Rights League, and the Tunisian Order of Lawyers have formed what will become known as the National Dialogue Quartet. Their intervention offers a last chance to save Tunisia's democratic transition through compromise rather than confrontation. Their efforts will later be recognized with the Nobel Peace Prize in 2015."
 tunisia_crisis.4.a: "Accept the Quartet's mediation"
 tunisia_crisis.4.b: "Reject outside interference"

 tunisia_crisis.5.t: "Parliamentary Deadlock"
 tunisia_crisis.5.d: "The parliament has ground to a complete halt. No legislation can pass, no government can be formed, and the political parties are locked in irreconcilable positions. The speaker's attempts to broker compromise have failed, and backroom negotiations have produced nothing but recriminations. The country cannot be governed effectively under these conditions. Something must give — whether through new elections, executive action, or an unprecedented power-sharing arrangement."
 tunisia_crisis.5.a: "Call new elections to break the deadlock"
 tunisia_crisis.5.b: "Govern by executive decree"
 tunisia_crisis.5.c: "Form a national unity government"

 tunisia_crisis.6.t: "The Constitution of 2014"
 tunisia_crisis.6.d: "After two years of intense debate, political crises, and two assassinations that nearly derailed the entire process, the Tunisian Constituent Assembly has voted to adopt a new constitution. Passed on January 26, 2014, with 200 votes in favor out of 216, it is hailed as the most progressive constitution in the Arab world. It guarantees freedom of conscience, gender equality, civilian control of the military, and an independent judiciary. This document represents the fulfillment of the revolution's promise and a beacon for democratic aspirations across the region."
 tunisia_crisis.6.a: "A historic achievement for Tunisia and the Arab world"
 tunisia_crisis.6.b: "The constitution fails to pass"

 tunisia_crisis.10.t: "Terror at the Bardo Museum"
 tunisia_crisis.10.d: "On March 18, 2015, two gunmen stormed the Bardo National Museum in central Tunis, opening fire on tourists as they disembarked from buses. Twenty-two people were killed, including visitors from Italy, Spain, Germany, Japan, and other nations, along with a Tunisian security officer. The Islamic State claimed responsibility for the attack. The massacre has struck at the heart of Tunisia's vital tourism industry and exposed the security vulnerabilities that persist despite the democratic transition. The nation is in shock."
 tunisia_crisis.10.a: "Implement emergency anti-terror measures"

 tunisia_crisis.11.t: "Massacre on Sousse Beach"
 tunisia_crisis.11.d: "On June 26, 2015, a lone gunman opened fire on tourists at the Riu Imperial Marhaba hotel beach resort in Port El Kantaoui, near Sousse. Thirty-eight people were killed, the majority of them British holidaymakers. The attacker, a 23-year-old Tunisian student, had trained in jihadist camps in Libya before carrying out the deadliest terrorist attack in Tunisian history. The massacre has devastated what remained of Tunisia's tourism sector and raised existential questions about the country's ability to protect itself from the jihadist threat emanating from neighboring Libya."
 tunisia_crisis.11.a: "Declare a state of emergency"

 tunisia_crisis.12.t: "Anti-Terror Legislation"
 tunisia_crisis.12.d: "In the wake of the Bardo and Sousse attacks, the government has drafted sweeping anti-terrorism legislation that would expand surveillance powers, extend the duration of pre-charge detention, and broaden the definition of terrorist offenses. Human rights organizations have raised concerns that the law could be used to suppress legitimate dissent and roll back the civil liberties guaranteed by the 2014 constitution. The government argues that extraordinary threats require extraordinary measures."
 tunisia_crisis.12.a: "Pass the comprehensive anti-terror law"
 tunisia_crisis.12.b: "Protect civil liberties — limited measures only"

 tunisia_crisis.20.t: "Saied Invokes Article 80"
 tunisia_crisis.20.d: "On July 25, 2021, the anniversary of the Republic, President Kais Saied has invoked Article 80 of the constitution, claiming extraordinary circumstances that threaten the state. He has dismissed Prime Minister Hichem Mechichi, frozen the parliament for 30 days, and lifted the immunity of all members of parliament. Crowds have gathered outside parliament in celebration, banging pots and pans, while Ennahda supporters have assembled in opposition. Saied insists his actions are constitutional. His critics call it a coup. Tunisia's decade-long democratic experiment hangs in the balance."
 tunisia_crisis.20.a: "Invoke emergency powers and suspend the constitution"
 tunisia_crisis.20.b: "Seek a constitutional resolution instead"

 tunisia_crisis.21.t: "Parliament Frozen"
 tunisia_crisis.21.d: "President Saied's initial 30-day suspension of parliament has come and gone with no sign of the legislature being reconvened. The president has extended his emergency measures indefinitely, ruling by decree and consolidating all executive and legislative authority in his own hands. Members of parliament remain stripped of their immunity. Some have been arrested. The international community has expressed growing concern, but Saied retains significant public support from Tunisians exhausted by years of parliamentary dysfunction and corruption."
 tunisia_crisis.21.a: "Maintain the 30-day suspension"
 tunisia_crisis.21.b: "Extend the suspension indefinitely"

 tunisia_crisis.22.t: "Parliament Dissolved"
 tunisia_crisis.22.d: "President Saied has formally dissolved the parliament by decree on March 30, 2022, after 131 members of the frozen assembly held an online session to vote against his emergency measures. Saied declared their virtual gathering an attempted coup and announced that the legislature would be permanently disbanded. Tunisia now has no functioning parliament, no constitutional court, and a president governing entirely by decree. The democratic institutions built over the past decade have been systematically dismantled."
 tunisia_crisis.22.a: "The parliament is finished"

 tunisia_crisis.23.t: "Purge of the Judiciary"
 tunisia_crisis.23.d: "President Saied has issued a decree dismissing 57 judges, accusing them of corruption, protecting terrorists, moral turpitude, and obstructing investigations. The mass dismissal has drawn condemnation from the Tunisian Judges' Association and international legal bodies who view it as a blatant attack on judicial independence. Saied has also dissolved the Supreme Judicial Council and replaced it with a body whose members he personally appoints. The separation of powers, a cornerstone of the 2014 constitution, has effectively ceased to exist."
 tunisia_crisis.23.a: "Purge the judiciary"
 tunisia_crisis.23.b: "Pursue limited judicial reform instead"

 tunisia_crisis.24.t: "Opposition Leaders Arrested"
 tunisia_crisis.24.d: "The security forces have launched a sweeping crackdown on opposition figures. Rached Ghannouchi, the 81-year-old leader of Ennahda and former Speaker of Parliament, has been arrested along with dozens of other political figures, journalists, and activists. The charges range from conspiracy against state security to money laundering. Human rights organizations have condemned the arrests as politically motivated. Tunisia, once celebrated as the sole success story of the Arab Spring, now holds more political prisoners than at any time since the Ben Ali era."
 tunisia_crisis.24.a: "Proceed with mass arrests"
 tunisia_crisis.24.b: "Target only the most prominent figures"
 tunisia_crisis.24.c: "Back down from the crackdown"

 tunisia_crisis.30.t: "Constitutional Referendum — 2022"
 tunisia_crisis.30.d: "President Saied has put forward a new constitution to replace the 2014 charter, and Tunisians are heading to the polls in a referendum on July 25, 2022. The proposed document creates a hyper-presidential system with a largely ceremonial parliament, eliminates most checks on executive power, and was drafted by a committee appointed by Saied himself. The main opposition parties have called for a boycott, arguing that the process lacks legitimacy. Turnout will be the key indicator of whether Tunisians endorse Saied's vision or reject it through abstention."
 tunisia_crisis.30.a: "The new constitution passes"
 tunisia_crisis.30.b: "The referendum fails due to low turnout"
 tunisia_crisis.30.c: "Boycotted but passes with questionable legitimacy"

 tunisia_parties.1.t: "Nidaa Tounes Founded"
 tunisia_parties.1.d: "Beji Caid Essebsi, the 85-year-old veteran politician who served under both Bourguiba and briefly under Ben Ali, has founded a new political party: Nidaa Tounes, the Call of Tunisia. The party brings together an unlikely coalition of secularists, former RCD members, leftists, and trade unionists united by their opposition to Ennahda's Islamist governance. Essebsi positions the party as the inheritor of Bourguiba's modernizing legacy and the defender of Tunisia's secular identity. The party rapidly becomes the primary vehicle for anti-Islamist sentiment."
 tunisia_parties.1.a: "A new secular force emerges"

 tunisia_parties.2.t: "The Free Destourian Party"
 tunisia_parties.2.d: "Abir Moussi, a former member of Ben Ali's RCD party and a fiery advocate of the old regime's secular authoritarianism, has established the Free Destourian Party. Moussi makes no apologies for the Ben Ali era, arguing that Tunisia was more stable, secure, and prosperous under authoritarian rule than under the chaotic democracy that followed the revolution. Her confrontational style and unapologetic nostalgia for the ancien régime have attracted a significant following among Tunisians disillusioned with post-revolutionary politics."
 tunisia_parties.2.a: "The Destourian legacy returns"

 tunisia_parties.3.t: "Ansar al-Sharia Emerges"
 tunisia_parties.3.d: "In the chaotic aftermath of the revolution, a new and dangerous movement has emerged. Ansar al-Sharia Tunisia, led by Abu Iyadh al-Tunisi, a veteran jihadist who fought in Afghanistan, has begun organizing openly in Tunisia's cities. The group advocates for the imposition of strict Islamic law and rejects democracy as un-Islamic. Taking advantage of the newfound freedoms of the post-revolutionary period, AST has established charitable networks, organized public rallies attracting thousands, and begun intimidating secular activists and artists."
 tunisia_parties.3.a: "A dangerous new movement takes root"

 tunisia_parties.4.t: "Ansar al-Sharia Designated Terrorist Organization"
 tunisia_parties.4.d: "Following the attack on the American Embassy in September 2012 and mounting evidence of the group's involvement in political violence, the Tunisian government has formally designated Ansar al-Sharia Tunisia as a terrorist organization in August 2013. The group's leader, Abu Iyadh, has gone underground. Security forces have launched raids against suspected AST cells across the country. However, the group's networks have already facilitated the travel of thousands of Tunisian recruits to Syria and Libya, making Tunisia the largest per-capita exporter of foreign fighters to the Islamic State."
 tunisia_parties.4.a: "AST is banned and hunted"

 tunisia_parties.5.t: "The Saied Movement"
 tunisia_parties.5.d: "A peculiar political phenomenon is taking shape in Tunisia. Kais Saied, a constitutional law professor at the University of Tunis, has begun attracting a devoted following through his unconventional political vision. Speaking exclusively in formal classical Arabic rather than Tunisian dialect, Saied advocates for a radical restructuring of governance through local councils that would bypass political parties entirely. He has no party, no organization, and no funding, yet his austere incorruptibility and outsider status resonate powerfully with a generation that has lost faith in the political establishment."
 tunisia_parties.5.a: "A populist movement without a party"

 tunisia_parties.6.t: "Nidaa Tounes Fractures"
 tunisia_parties.6.d: "The party that swept to power in 2014 is tearing itself apart. Internal disputes over the role of Hafedh Caid Essebsi, the president's son, factional rivalries between former RCD members and leftist elements, and disagreements over the surprise coalition with Ennahda have caused a hemorrhage of defections. Dozens of parliamentarians have left to form splinter parties. The party that was supposed to be Tunisia's answer to Ennahda's organizational discipline has proven to be a fragile coalition of convenience rather than a coherent political force."
 tunisia_parties.6.a: "The party splinters"
 tunisia_parties.6.b: "Hold the coalition together"

 tunisia_parties.7.t: "Ennahda's 2016 Congress"
 tunisia_parties.7.d: "At its landmark 10th congress in May 2016, Ennahda has taken a dramatic step. Rached Ghannouchi has announced that the party will formally separate its political activities from religious preaching, abandoning the label of political Islam in favor of Muslim democracy, modeled on European Christian democratic parties. The move is designed to reassure secular Tunisians and Western partners, but hardliners within the party view it as an unacceptable capitulation. The decision will define whether Ennahda evolves into a mainstream conservative party or faces an internal revolt."
 tunisia_parties.7.a: "Embrace Muslim democracy"
 tunisia_parties.7.b: "Maintain the Islamist identity"

 tunisia_parties.20.t: "Neo-Carthaginian Revival"
 tunisia_parties.20.d: "A movement of intellectuals, artists, and cultural figures has begun advocating for a radical reimagining of Tunisian national identity rooted in the country's pre-Islamic Punic and Carthaginian heritage. Drawing on archaeological discoveries at Carthage, Kerkouane, and other sites, they argue that Tunisia's true civilizational identity predates the Arab conquests by millennia. The movement promotes the study of the Punic language, the revival of Carthaginian symbols, and a Mediterranean rather than Arab orientation for Tunisia's future."
 tunisia_parties.20.a: "The ancient heritage stirs"

 tunisia_parties.21.t: "Husainid Restoration Committee"
 tunisia_parties.21.d: "A group of notables, historians, and conservative elites have formed a committee dedicated to the restoration of the Husainid dynasty, which ruled Tunisia as beys from 1705 until the abolition of the monarchy in 1957. They argue that Tunisia's post-independence republican experiment has failed, producing only dictatorship and instability, and that a constitutional monarchy would provide the stability and continuity the nation desperately needs. The committee has reportedly identified a descendant of the last Bey, Muhammad VIII al-Amin."
 tunisia_parties.21.a: "The monarchists organize"

 tunisia_parties.22.t: "Caliphate of Ifriqiya Movement"
 tunisia_parties.22.d: "In the ideological vacuum left by the suppression of Ansar al-Sharia and the Islamic State's territorial losses in Libya, a new extremist current has emerged advocating for the establishment of a Caliphate of Ifriqiya encompassing Tunisia, eastern Algeria, and western Libya. Drawing on the historical name for the region under early Islamic rule, the movement combines jihadist theology with pan-regional ambitions. Its underground networks have begun recruiting from disaffected youth in the impoverished interior regions."
 tunisia_parties.22.a: "A dangerous ideology spreads"

 tunisia_foreign.1.t: "Request Major Non-NATO Ally Status"
 tunisia_foreign.1.d: "Tunisia's growing security cooperation with the United States and its strategic position in North Africa make it a strong candidate for designation as a Major Non-NATO Ally. This status would grant Tunisia access to advanced military equipment, priority delivery of defense materiel, and enhanced military training programs. The request signals Tunisia's alignment with the Western security architecture and its commitment to counter-terrorism cooperation in the Sahel and Mediterranean regions."
 tunisia_foreign.1.a: "Submit the request to Washington"

 tunisia_foreign.2.t: "Tunisia Requests MNNA Status"
 tunisia_foreign.2.d: "The Republic of Tunisia has formally requested designation as a Major Non-NATO Ally of the United States. Tunisia has been a consistent partner in counter-terrorism operations, has contributed to regional stability, and represents the most promising democratic transition in the Arab world. Granting MNNA status would strengthen bilateral military ties and signal American support for Tunisia's democratic experiment. However, some in Washington question whether the current political trajectory in Tunis warrants such an elevated partnership."
 tunisia_foreign.2.a: "Grant Tunisia MNNA status"
 tunisia_foreign.2.b: "Decline the request"

 tunisia_foreign.10.t: "Seeking Qatari Support"
 tunisia_foreign.10.d: "Qatar, with its vast financial resources and its support for Islamist movements across the Arab world, represents a potential patron for Tunisia. Doha has already provided significant financial assistance to post-revolutionary Tunisia and maintains close ties with Ennahda. A formal request for expanded Qatari backing could bring much-needed investment and budget support, but it would also draw Tunisia deeper into the Qatar-Saudi rivalry and raise concerns among secular Tunisians about foreign Islamist influence."
 tunisia_foreign.10.a: "Approach Doha"

 tunisia_foreign.11.t: "Tunisia Seeks Qatari Backing"
 tunisia_foreign.11.d: "Tunisia has approached Qatar with a request for expanded financial and political support. For Doha, backing Tunisia would extend its influence in North Africa and support a friendly Islamist-leaning government. However, providing such support risks antagonizing Saudi Arabia and the UAE, who view Qatar's backing of Islamist movements with deep suspicion. The decision will have implications far beyond the bilateral relationship."
 tunisia_foreign.11.a: "Provide financial and political backing"
 tunisia_foreign.11.b: "Decline the request"

 tunisia_foreign.12.t: "Seeking Turkish Partnership"
 tunisia_foreign.12.d: "Turkey under President Erdogan has positioned itself as a champion of democratic Islamist governance and a natural partner for post-revolutionary Tunisia. Ankara has offered defense cooperation, economic investment, and political support. A formal partnership with Turkey would provide Tunisia with a powerful regional ally, but it would also align Tunis with Ankara's increasingly assertive foreign policy and risk alienating European partners and Gulf states opposed to Turkish regional ambitions."
 tunisia_foreign.12.a: "Approach Ankara"

 tunisia_foreign.13.t: "Tunisia Seeks Turkish Partnership"
 tunisia_foreign.13.d: "Tunisia has formally proposed an expanded defense and economic partnership with Turkey. For Ankara, a close relationship with Tunisia would extend Turkish influence across the Mediterranean and provide a foothold in North Africa. The proposal includes defense cooperation agreements, Turkish investment in Tunisian infrastructure, and enhanced trade ties. Turkey must weigh these opportunities against the potential diplomatic costs with European allies and Gulf states."
 tunisia_foreign.13.a: "Accept the partnership"
 tunisia_foreign.13.b: "Decline the proposal"

 tunisia_foreign.14.t: "Seeking UAE Support"
 tunisia_foreign.14.d: "The United Arab Emirates has emerged as a key player in North African politics, backing secular and military-aligned governments against Islamist movements. For a Tunisia governed by secular forces, Abu Dhabi represents a natural partner who shares a commitment to containing political Islam. UAE support could bring significant financial assistance and investment, but it would also align Tunisia with the UAE's broader regional agenda and its rivalry with Qatar and Turkey."
 tunisia_foreign.14.a: "Approach Abu Dhabi"

 tunisia_foreign.15.t: "Tunisia Seeks Emirati Support"
 tunisia_foreign.15.d: "Tunisia has approached the United Arab Emirates with a request for financial assistance and political support. For Abu Dhabi, supporting a secular Tunisian government would advance its regional strategy of containing Islamist influence. The UAE has the financial resources to provide substantial economic aid and could facilitate investment from Gulf sovereign wealth funds. However, the UAE's support would likely come with expectations regarding Tunisia's domestic and foreign policy orientation."
 tunisia_foreign.15.a: "Provide support and investment"
 tunisia_foreign.15.b: "Decline the request"

 tunisia_foreign.16.t: "Strengthening Ties with France"
 tunisia_foreign.16.d: "France, Tunisia's former colonial power and largest European trading partner, remains the most influential Western actor in Tunisian affairs. The deep linguistic, cultural, and economic ties between the two countries provide a foundation for enhanced cooperation. Paris can offer development assistance, security cooperation, and diplomatic support in European institutions. However, the colonial legacy makes closer ties with France politically sensitive, and some Tunisians view French influence as neo-colonial interference."
 tunisia_foreign.16.a: "Approach Paris"

 tunisia_foreign.17.t: "Tunisia Seeks Closer French Ties"
 tunisia_foreign.17.d: "Tunisia has proposed a strengthening of bilateral relations with France, encompassing enhanced trade agreements, security cooperation, development assistance, and cultural exchanges. For Paris, a stable and democratic Tunisia is essential to managing migration flows across the Mediterranean and containing jihadist threats in the Maghreb. France must decide whether to deepen its commitment to Tunisia at a time when French influence in Africa is increasingly contested."
 tunisia_foreign.17.a: "Strengthen the Francophone partnership"
 tunisia_foreign.17.b: "Maintain the current level of engagement"

 tunisia_foreign.20.t: "Algerian Border Cooperation"
 tunisia_foreign.20.d: "The porous border between Tunisia and Algeria has become a critical security concern. Jihadist fighters, weapons, and contraband flow across the mountainous frontier with relative ease, and the Chaambi Mountains along the border have become a haven for militant groups. Tunisia proposes a comprehensive border security cooperation agreement with Algeria, including joint patrols, intelligence sharing, and coordinated military operations against cross-border threats."
 tunisia_foreign.20.a: "Propose joint border security"

 tunisia_foreign.21.t: "Tunisia Proposes Border Cooperation"
 tunisia_foreign.21.d: "Tunisia has formally proposed a joint border security arrangement with Algeria. The proposal includes shared intelligence on militant movements, coordinated patrol schedules, joint military exercises, and mutual logistical support. For Algeria, which faces its own security challenges in the Sahel, cooperation with Tunisia could strengthen the security of both nations. However, Algiers is traditionally cautious about military entanglements and jealously guards its sovereignty over border security operations."
 tunisia_foreign.21.a: "Accept the cooperation proposal"
 tunisia_foreign.21.b: "Decline the proposal"

 tunisia_foreign.30.t: "EU Migration Deal"
 tunisia_foreign.30.d: "Tunisia has become a major transit point for migrants and refugees attempting to cross the Mediterranean to Europe. Thousands of sub-Saharan Africans and Tunisians have departed from Tunisian shores, creating a humanitarian and diplomatic crisis. The European Union has signaled its willingness to negotiate a comprehensive migration management agreement that would provide Tunisia with financial assistance in exchange for cooperation in stemming the flow of irregular migration."
 tunisia_foreign.30.a: "Propose a migration management deal"

 tunisia_foreign.31.t: "Tunisia Proposes Migration Deal"
 tunisia_foreign.31.d: "Tunisia has formally proposed a comprehensive migration management agreement with the European Union. The deal would provide Tunisia with financial assistance for border security, development aid for migrant-sending regions, and legal migration pathways for Tunisian workers in exchange for Tunisian cooperation in intercepting irregular migration. The EU must weigh the deal's cost against the political imperative to reduce Mediterranean crossings, while also considering human rights concerns about Tunisia's treatment of migrants."
 tunisia_foreign.31.a: "Accept the migration deal"
 tunisia_foreign.31.b: "The terms are insufficient"

 tunisia_foreign.40.t: "Extending an Invitation"
 tunisia_foreign.40.d: "Tunisia has decided to extend a formal invitation to join its diplomatic framework. This invitation represents a significant step in expanding Tunisia's regional influence and building a coalition of like-minded states. The diplomatic channels have been activated and the invitation is being prepared for dispatch."
 tunisia_foreign.40.a: "Send the invitation"

 tunisia_foreign.41.t: "An Invitation from Tunisia"
 tunisia_foreign.41.d: "The Republic of Tunisia has extended a formal invitation to join its diplomatic framework. Accepting would strengthen bilateral ties and provide mutual benefits in trade, security, and regional diplomacy. However, joining would also entail obligations and could affect existing relationships with other regional powers."
 tunisia_foreign.41.a: "Accept the invitation"
 tunisia_foreign.41.b: "Politely decline"

 tunisia_foreign.50.t: "Territorial Claim"
 tunisia_foreign.50.d: "Tunisia has identified territory that it believes rightfully belongs within its borders based on historical, ethnic, or strategic considerations. The diplomatic apparatus has been instructed to prepare a formal demand for the transfer of this territory. Such a demand carries significant diplomatic risks and could escalate to a military confrontation if refused."
 tunisia_foreign.50.a: "Issue the territorial demand"

 tunisia_foreign.51.t: "Tunisian Territorial Demand"
 tunisia_foreign.51.d: "The Republic of Tunisia has issued a formal demand for the transfer of territory that it claims belongs within its rightful borders. Acceding to this demand would mean a loss of sovereign territory and national prestige. Refusing risks a diplomatic crisis and potential military confrontation. The balance of power between our nations will weigh heavily in this decision."
 tunisia_foreign.51.a: "Cede the territory"
 tunisia_foreign.51.b: "Refuse the demand"

 tunisia_alt.1.t: "A Husainid Descendant Discovered"
 tunisia_alt.1.d: "Researchers and royalist sympathizers have identified a living descendant of the Husainid dynasty, the family that ruled Tunisia as beys for over 250 years until the monarchy was abolished by Habib Bourguiba in 1957. The descendant, living quietly abroad, has been approached by members of the restoration committee. Their existence provides a focal point for monarchist sentiment and raises the tantalizing possibility of restoring the Beylical throne in a new constitutional framework."
 tunisia_alt.1.a: "A claimant to the throne emerges"

 tunisia_alt.2.t: "The Monarchists Demand Restoration"
 tunisia_alt.2.d: "The Husainid Restoration Committee has moved from quiet organizing to public agitation. Demonstrations in favor of restoring the monarchy have been held in Tunis, Kairouan, and other cities. The committee argues that a constitutional monarchy would provide the stability, continuity, and national unity that the republic has failed to deliver. Their critics dismiss the movement as nostalgic fantasy. The government must decide whether to engage with the monarchists or suppress their increasingly vocal campaign."
 tunisia_alt.2.a: "Engage with the restoration movement"
 tunisia_alt.2.b: "Suppress the monarchist agitation"

 tunisia_alt.3.t: "Referendum on the Monarchy"
 tunisia_alt.3.d: "The question that has not been asked since 1957 is now being put to the Tunisian people: shall Tunisia restore the Husainid monarchy as a constitutional institution? A national referendum has been organized, with campaigns for and against restoration dominating the airwaves. Royalists argue that a monarch above politics could heal the nation's divisions. Republicans warn that restoring the monarchy would be a betrayal of everything Bourguiba and the independence movement fought for."
 tunisia_alt.3.a: "The monarchy is restored — long live the Bey!"
 tunisia_alt.3.b: "The republic is preserved"

 tunisia_alt.4.t: "Royalist Coup Attempt"
 tunisia_alt.4.d: "Elements within the military sympathetic to the monarchist cause have launched a coup attempt, seizing key government buildings and broadcasting a proclamation declaring the restoration of the Husainid Beylicate. The plotters claim to be acting to save the nation from chaos and corruption. Loyalist forces are mobilizing to resist. The outcome of the next few hours will determine whether Tunisia becomes a kingdom once more or whether the republic survives this ultimate test."
 tunisia_alt.4.a: "The coup succeeds — the monarchy returns"
 tunisia_alt.4.b: "The coup is crushed"

 tunisia_alt.10.t: "Voices from Carthage"
 tunisia_alt.10.d: "What began as an academic movement among archaeologists and classicists has grown into a broader cultural and political phenomenon. The Neo-Carthaginian Revival argues that Tunisia's deepest identity lies not in its Arab or Islamic heritage but in the ancient civilization of Carthage that once rivaled Rome for dominion over the Mediterranean. Advocates point to Tunisia's unique Punic archaeological heritage, including the only intact Punic city at Kerkouane, as evidence of a distinct civilizational legacy waiting to be reclaimed."
 tunisia_alt.10.a: "The Punic heritage awakens"

 tunisia_alt.11.t: "The Carthaginian Identity Debate"
 tunisia_alt.11.d: "The Neo-Carthaginian movement has moved beyond academic circles into mainstream political discourse. Proponents are calling for the adoption of Carthaginian symbols in national iconography, the teaching of Punic history as central to the national curriculum, and a reorientation of Tunisia's foreign policy toward a Mediterranean rather than Arab identity. Critics condemn the movement as a dangerous rejection of Tunisia's Islamic and Arab heritage that could fracture national unity and alienate the country from its regional neighbors."
 tunisia_alt.11.a: "Embrace the Carthaginian identity"
 tunisia_alt.11.b: "Suppress this dangerous revisionism"

 tunisia_alt.12.t: "The Republic of Carthage"
 tunisia_alt.12.d: "In a ceremony held at the ruins of ancient Carthage overlooking the Bay of Tunis, the transformation is complete. Tunisia has been formally renamed the Republic of Carthage, adopting new national symbols drawn from Punic heritage — the sign of Tanit, the Carthaginian horse, and the purple of Tyrian dye. A new Mediterranean-oriented foreign policy has been declared, seeking partnerships with other Mediterranean nations and positioning the reborn Carthage as a bridge between Europe and Africa, just as its ancient predecessor once was."
 tunisia_alt.12.a: "Carthago Nova rises from the ashes"

 tunisia_alt.20.t: "The Islamist Schism"
 tunisia_alt.20.d: "The Islamist movement in Tunisia has reached a breaking point. Moderates who favor democratic participation, compromise with secular forces, and a gradualist approach to Islamizing society are locked in a bitter struggle with radicals who reject democracy as un-Islamic, demand immediate implementation of sharia law, and view any accommodation with secularism as apostasy. The outcome of this internal battle will determine whether political Islam in Tunisia evolves toward democratic pluralism or descends into extremism."
 tunisia_alt.20.a: "The moderates prevail"
 tunisia_alt.20.b: "The radicals seize control"

 tunisia_alt.21.t: "The Caliphate of Ifriqiya"
 tunisia_alt.21.d: "The radical Islamist movement has achieved what seemed impossible. Drawing on deep wells of popular discontent, exploiting the failures of democratic governance, and capitalizing on the collapse of state authority, the movement has proclaimed the establishment of the Caliphate of Ifriqiya, reviving the medieval Islamic province that once encompassed Tunisia and its surrounding regions. The proclamation has sent shockwaves across North Africa and the Mediterranean, raising the specter of a new jihadist state on Europe's doorstep."
 tunisia_alt.21.a: "The Caliphate is proclaimed"
