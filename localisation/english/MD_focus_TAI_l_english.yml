 #National Spirits
 legacy_of_1949: "Legacy of 1949"
 legacy_of_1949_desc: "The end of the Chinese Civil War in 1949 saw the Nationalist Guomindang (KMT) and their supporters flee to the island province of Taiwan. The legacy of this event, combined with a local, nativist Taiwanese movement has led to a strong rejection of reunification with the mainland by the majority of Taiwanese citizens."
 TAI_the_great_chip_empire: "The Great Chip Empire"
 the_great_chip_emipire_desc: "Having taken advantage of semiconductor and microchip production in it's infancy, and by being a more attractive investment than other nations. Taiwan has catapulted itself to the forefront of the industry. Though cheap, efficient production, and large exports to western nations, Taiwan has balanced its economy and national security on being the supply of microchips to the western world, and continues to be an industry leader through constant and regular innovation."