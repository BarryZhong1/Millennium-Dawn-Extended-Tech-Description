 ANTARCTICA_CCAS_TITLE: "CCAS"
 ANTARCTICA_CCAS_TEXT: "The Convention for the Conservation of Antarctic Seals (CCAS) is an agreement that regulates the hunting of seals in Antarctica. It was established in 1972 to protect seal populations and ensure sustainable use of their resources."
 ANTARCTICA_CCAMLR_TITLE: "CCAMLR"
 ANTARCTICA_CCAMLR_TEXT: "The Commission for the Conservation of Antarctic Marine Living Resources (CCAMLR) is an organization responsible for the conservation of marine life in the Southern Ocean. It was established in 1982 to manage and protect the unique ecosystem of Antarctica."
