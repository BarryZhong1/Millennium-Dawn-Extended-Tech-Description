 MD_antarctica_news.1.t: "[FROM.GetName] Applies to Join Antarctic Treaty"
 MD_antarctica_news.1.d: "[FROM.GetName] has applied to join the Antarctic Treaty, signaling a potential shift in their foreign policy and commitment to environmental conservation. The Antarctic Treaty is an international agreement that regulates the use of Antarctica for peaceful purposes and scientific research, while also protecting the continent's unique ecosystem. [FROM.GetName]'s application to join the treaty has been met warm reactions from the international community, with some praising the move as a positive step towards global cooperation, while others express skepticism about [FROM.GetName]'s intentions and commitment to the treaty's principles. The application process will take a month to complete."
 MD_antarctica_news.1.a: "Time Will Tell"
 MD_antarctica_news.1.b: "It's About Time"
 MD_antarctica_news.2.t: "[FROM.GetName] Joins Antarctic Treaty"
 MD_antarctica_news.2.d: "Today, at [GetDateText], [FROM.GetName] has officially joined the Antarctic Treaty, becoming a member of the international agreement that regulates the use of Antarctica for peaceful purposes and scientific research. By joining the treaty, [FROM.GetName] has committed to upholding the principles of environmental conservation and international cooperation in Antarctica. This move has been met with positive reactions from the global community, with many praising [FROM.GetName] for their commitment to protecting the unique ecosystem of Antarctica and promoting peaceful collaboration among nations."
 MD_antarctica_news.2.a: "Another Member"
 MD_antarctica_news.2.b: "Let's Get To Work!"