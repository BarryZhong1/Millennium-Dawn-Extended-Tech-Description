 leave_antarctica_treaty_warning_tt: "§RWARNING:§!\nLeaving the §CAntarctic Treaty§! while having a §YResearch Station§! in §CAntarctica§! will cause global response from the Treaty members, including potential sanctions and diplomatic backlash. It is recommended to dismantle any research stations in §CAntarctica§! before leaving the treaty to avoid negative consequences.\n\nYet, if you choose to leave the Treaty while having one, no article will stop you from starting prohibited activities in §CAntarctica§!, such as resource exploitation or military presence, which may lead to severe consequences for the global reputation of your nation."
