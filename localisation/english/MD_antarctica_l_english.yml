 is_antarctic_research_station_constructed: "A §YResearch Station§! has been constructed in §CAntarctica§!."
 join_antarctica_treaty_tt: "After a month:"
 leave_antarctica_treaty_tt: "After 2 years:"
 leave_antarctica_treaty_warning_tt: "§RWARNING:§!\nLeaving the §CAntarctic Treaty§! while having a §YResearch Station§! in §CAntarctica§! will cause global response from the Treaty members, including potential sanctions and diplomatic backlash. It is recommended to dismantle any research stations in §CAntarctica§! before leaving the treaty to avoid negative consequences.\n\nYet, if you choose to leave the Treaty while having one, no article will stop you from starting prohibited activities in §CAntarctica§!, such as resource exploitation or military presence, which may lead to severe consequences for the global reputation of your nation."

 # ========================
 # Events
 # ========================
 MD_antarctica_news.1.t: "[FROM.GetName] Applies to Join Antarctic Treaty"
 MD_antarctica_news.1.d: "[FROM.GetName] has applied to join the Antarctic Treaty, signaling a potential shift in their foreign policy and commitment to environmental conservation. The Antarctic Treaty is an international agreement that regulates the use of Antarctica for peaceful purposes and scientific research, while also protecting the continent's unique ecosystem. [FROM.GetName]'s application to join the treaty has been met warm reactions from the international community, with some praising the move as a positive step towards global cooperation, while others express skepticism about [FROM.GetName]'s intentions and commitment to the treaty's principles. The application process will take a month to complete."
 MD_antarctica_news.1.a: "Time Will Tell"
 MD_antarctica_news.1.b: "It's About Time"
 MD_antarctica_news.2.t: "[FROM.GetName] Joins Antarctic Treaty"
 MD_antarctica_news.2.d: "Today, at [GetDateText], [FROM.GetName] has officially joined the Antarctic Treaty, becoming a member of the international agreement that regulates the use of Antarctica for peaceful purposes and scientific research. By joining the treaty, [FROM.GetName] has committed to upholding the principles of environmental conservation and international cooperation in Antarctica. This move has been met with positive reactions from the global community, with many praising [FROM.GetName] for their commitment to protecting the unique ecosystem of Antarctica and promoting peaceful collaboration among nations."
 MD_antarctica_news.2.a: "Another Member"
 MD_antarctica_news.2.b: "Let's Get To Work!"
 MD_antarctica_news.3.t: "[FROM.GetName] Strives to Leave Antarctic Treaty"
 MD_antarctica_news.3.d: "[FROM.GetName] decided today to leave the Antarctic Treaty. The Commission for the Conservation of Antarctic Marine Living Resources (CCAMLR) is giving them 2 years to dismantle any research stations they have in Antarctica and to avoid any prohibited activities, such as resource exploitation or military presence. The decision to leave the treaty has been met with mixed reactions from the international community, with some expressing disappointment and concern about the potential consequences for the environment and global cooperation, while others support [FROM.GetName]'s right to make their own decisions regarding their involvement in international agreements. The process of leaving the treaty will take 2 years to complete."
 MD_antarctica_news.3.a: "What a Shame"
 MD_antarctica_news.3.b: "We Have Better Things To Do"
 MD_antarctica_news.4.t: "[FROM.GetName] Leaves Antarctic Treaty"
 MD_antarctica_news.4.d: "[MD_antarctica_news_4_desc]"
 MD_antarctica_news.4.a: "The Treaty Is Weakened"
 MD_antarctica_news.4.b: "Whatever"
 MD_antarctica_news_4_desc_1: "After 2 years of leaving the Antarctic Treaty, [FROM.GetName] has officially left the international agreement that regulates the use of Antarctica for peaceful purposes and scientific research. Despite the warnings, the [FROM.GetName] has left the treaty while having a Research Station in Antarctica, which has caused global response from the Treaty members, including potential sanctions and diplomatic backlash."
 MD_antarctica_news_4_desc_2: "After 2 years of leaving the Antarctic Treaty, [FROM.GetName] has officially left the international agreement that regulates the use of Antarctica for peaceful purposes and scientific research. [FROM.GetName] has successfully dismantled any research stations in Antarctica and avoided any prohibited activities, such as resource exploitation or military presence, which has helped to mitigate potential consequences for the environment and global cooperation."

