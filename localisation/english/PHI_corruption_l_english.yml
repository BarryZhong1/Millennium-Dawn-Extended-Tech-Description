 # Philippines Corruption System - English Localisation

 l_english:

 ### ─── DECISION CATEGORY ───
 PHI_corruption_decision_category:0 "Corruption"
 PHI_corruption_decision_category_desc:0 "Corruption has deeply infiltrated every level of Philippine society. Systemic bribery, cronyism, and the misuse of public funds are hampering economic growth and eroding public trust in government institutions. Without decisive intervention, the state risks becoming paralyzed by the very officials responsible for running it.\n\n§YCorruption Influence§! measures how embedded corruption is within Philippine institutions. As this figure rises, government efficiency falls, tax revenues are siphoned away, and the military's fighting spirit is undermined.\n\n§GCurrent Corruption Influence: [?PHI_corruption_influence]§!"

 ### ─── CORRUPTION IDEAS ───

 # Stage 1
 PHI_idea_corruption_stage_one:0 "Minor Corruption"
 PHI_idea_corruption_stage_one_desc:0 "Petty corruption and occasional bribery exist in some parts of the bureaucracy, but the state retains basic functionality. If not addressed, these habits will deepen."

 # Stage 2
 PHI_idea_corruption_stage_two:0 "Widespread Corruption"
 PHI_idea_corruption_stage_two_desc:0 "Corruption has spread across government departments, the police, and local administrations. Public contracts are routinely awarded through bribes, and tax collection is significantly compromised."

 # Stage 3
 PHI_idea_corruption_stage_three:0 "Rampant Corruption"
 PHI_idea_corruption_stage_three_desc:0 "Corruption has become the default mode of governance. Senior officials, military officers, and business elites operate in a shadow economy of kickbacks and patronage, severely damaging the nation's economic and military capacity."

 # Stage 4
 PHI_idea_corruption_stage_four:0 "Systemic Corruption"
 PHI_idea_corruption_stage_four_desc:0 "The Philippine state has been hollowed out by endemic corruption. Virtually every institution — from the courts to the armed forces — is compromised. Public services have collapsed, tax revenues have dried up, and the rule of law exists in name only."

 ### ─── DECISIONS ───

 # 1. Anti-Corruption Propaganda
 PHI_anti_corruption_propaganda:0 "Anti-Corruption Campaign"
 PHI_anti_corruption_propaganda_desc:0 "Launch a nationwide public campaign exposing corrupt officials and discouraging corrupt behaviour. Slow and modest in effect, but it costs nothing beyond political capital."

 # 2. Strengthen Police Integrity
 PHI_strengthen_police_integrity:0 "Internal Affairs Crackdown"
 PHI_strengthen_police_integrity_desc:0 "Empower the National Police's Internal Affairs Service to investigate and discipline corrupt officers. This will increase police costs but gradually clean up law enforcement from within."

 # 3. Deploy Military Integrity Units
 PHI_deploy_military_integrity_units:0 "Deploy Military Integrity Units"
 PHI_deploy_military_integrity_units_desc:0 "Use specially vetted military assets to root out corruption in government agencies and local governments. More effective than the police alone, but the public is uneasy about a military role in civilian affairs."

 # 4. Asset Declaration Law
 PHI_asset_declaration_law:0 "Mandatory Asset Declaration"
 PHI_asset_declaration_law_desc:0 "Enact legislation requiring all government officials to publicly declare their assets and liabilities. This long-term structural reform will take time to have effect, but will significantly reduce opportunities for corrupt enrichment."
 PHI_asset_declaration_law_active_tt:0 "Asset Declaration Law: Officials are now required to declare their wealth. Corruption opportunities are narrowing."

 # 5. Prosecute Corrupt Officials
 PHI_prosecute_corrupt_officials:0 "Prosecute Corrupt Officials"
 PHI_prosecute_corrupt_officials_desc:0 "File criminal charges against officials suspected of corruption. Success will dramatically reduce corruption and boost public confidence, but a failed prosecution will embolden corrupt networks and damage the government's credibility."
 PHI_prosecute_corrupt_officials_tt:0 "A case is being prepared. The outcome is uncertain — success depends on the strength of the evidence and the integrity of the judiciary."
 PHI_prosecution_success_tt:0 "§GProsecution Successful!§! The accused were convicted and sentenced. Corruption networks have suffered a serious blow, and public trust in the judiciary is restored."
 PHI_prosecution_failure_tt:0 "§RProsecution Failed!§! The accused were acquitted amid allegations of tampered evidence and a compromised judiciary. Corrupt networks are emboldened."

 # 6. Audit Government Contracts
 PHI_audit_government_contracts:0 "Audit Government Contracts"
 PHI_audit_government_contracts_desc:0 "Commission a thorough audit of government procurement contracts to identify and recover funds lost to corruption. A successful audit could recover significant public money; a failed one may tip off corrupt networks."
 PHI_audit_government_contracts_tt:0 "Auditors are reviewing contracts. The findings could expose major fraud — or come to nothing if records have been tampered with."
 PHI_audit_success_tt:0 "§GAudit Successful!§! Significant irregularities were found and funds recovered. Corruption influence has decreased."
 PHI_audit_failure_tt:0 "§RAudit Failed!§! Key documents appear to have been altered or destroyed. The exercise achieved nothing and the scandal has cost political capital."

 # 7. International Anti-Corruption Cooperation
 PHI_international_anticorruption_cooperation:0 "International Anti-Corruption Cooperation"
 PHI_international_anticorruption_cooperation_desc:0 "Sign an agreement with international anti-corruption bodies such as UNODC or Transparency International to implement best-practice reforms, undergo external audits, and receive technical assistance. The process is slow and expensive, but produces the most lasting reduction in corruption."
 PHI_intl_cooperation_active_tt:0 "International monitors are embedded in key ministries. Corruption is being systematically documented and reformed."

 ### ─── TRIGGER TOOLTIPS ───
 PHI_corruption_level_1_tt:0 "Corruption Influence is between 1 and 24"
 PHI_corruption_level_2_tt:0 "Corruption Influence is between 25 and 49"
 PHI_corruption_level_3_tt:0 "Corruption Influence is between 50 and 74"
 PHI_corruption_level_4_tt:0 "Corruption Influence is between 75 and 99"
 PHI_corruption_critical_tt:0 "Corruption Influence has reached 100 — the state is fully captured"
