 MD_TUTORIAL_BODY_OVERVIEW_INTRO: "Welcome to Millennium Dawn! Thank you for downloading and playing the mod. If you're new, we recommend exploring the various menus to familiarize yourself with the features. Menus typically can be opened via buttons at the top of the various screens Need help? Join our Discord community where we're happy to assist you with any questions or issues. You can report bugs in-game using \"Report An Issue\" in the pause menu or through our Discord channels.\n\nImportant Information:\n- Fuel is negative on game start due to power plants and population consumption. Look at the Energy UI in the Construction Menu for more details.\n- Historical focus =/= historical outcomes. We use the historical focus option to encouarge the AI to make the most historical possible choice in given choices and options. This is not a guarantee for a historical game."
 MD_TUTORIAL_BODY_ECONOMY_BUDGET: "You can get information about the state of the country's economy from the economic panel, which can be opened using the line graph button in the bottom right."
