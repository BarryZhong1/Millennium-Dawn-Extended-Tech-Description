 MD_TUTORIAL_TAB_POLITICS: "Politics"
 MD_TUTORIAL_TAB_POLITICS_TT: "Parties, coalitions, election threshold, and control tools."
 MD_TUTORIAL_TAB_INFLUENCE: "Influence"
 MD_TUTORIAL_TAB_INFLUENCE_TT: "Foreign influence, aid, coups, exploitation, and puppeting."
 MD_TUTORIAL_TAB_RESEARCH: "Research"
 MD_TUTORIAL_TAB_RESEARCH_TT: "Research-slot growth from GDP and GDP per capita."
 MD_TUTORIAL_TAB_MILITARY: "Military"
 MD_TUTORIAL_TAB_MILITARY_TT: "Template and production differences from vanilla."
 MD_TUTORIAL_TAB_ADVANCED: "Advanced"
 MD_TUTORIAL_TAB_ADVANCED_TT: "International Systems and the Energy screen."
 MD_TUTORIAL_OVERVIEW_TITLE: "Shared MD Systems"
 MD_TUTORIAL_OVERVIEW_LEFT: "§YWhat Millennium Dawn changes§!\n- MD adds shared systems beyond vanilla: economy, party management, foreign influence, research-slot growth, custom battalions, and international systems.\n- These mechanics are implemented in shared GUI and scripted GUI files, so most countries can use them.\n- Country trees, events, and regional organizations add more rules on top of this base."
 MD_TUTORIAL_OVERVIEW_RIGHT: "§YWhere to open them§!\n- Tutorial: this button on the map screen or §YShift+T§!.\n- Economy: click §YTreasury§! in the top bar.\n- Politics and Influence: use the expanded Politics view and another country's diplomacy screen.\n- Research: open §YResearch Slots§! from the Technology tab.\n- Advanced: use the §YInternational Systems§! button beside Logistics."
 MD_TUTORIAL_ECONOMY_TITLE: "Economy and Budget"
 MD_TUTORIAL_ECONOMY_LEFT: "§YTop-bar controls§!\n- MD adds §YDebt§!, §YTreasury§!, and §YInternational Investments§! to the top bar.\n- Left-click Debt takes loans; the base click adds $1b Treasury and $1.01b Debt.\n- Ctrl, Shift, and Alt debt clicks take 10, 100, and 1000 with GDP gates and the same 1% surcharge.\n- Right-click Debt repays from Treasury, and Alt+Shift enables automatic repayment."
 MD_TUTORIAL_ECONOMY_RIGHT: "§YBudget screen§!\n- Click Treasury to open the economy screen.\n- The budget tab lets you change §YPopulation Tax§! and §YCorporate Tax§!.\n- Tax changes require Political Power, with separate scripted costs for 1-step and 5-step changes.\n- §YCentral Bank Policy Rate§! is also set here and needs more than 25 Political Power to change.\n- Right-click International Investments to sell them into Treasury, and Shift-click to toggle reinvestment."
 MD_TUTORIAL_POLITICS_TITLE: "Politics and Parties"
 MD_TUTORIAL_POLITICS_LEFT: "§YExpanded politics view§!\n- MD adds ruling-party text, coalition icons, coalition strength, and a party-position list to the Politics screen.\n- Each party position gets §YBoost§! and §YAttack§! controls, plus §YBan§! and §YAllow§! buttons where permitted.\n- The scripted GUI checks coalition status, current government, and party thresholds before enabling actions."
 MD_TUTORIAL_POLITICS_RIGHT: "§YElections and control§!\n- §YBan All§! and §YAllow All§! buttons exist for broad party management.\n- MD also adds §YElection Threshold§! controls to the Politics view.\n- The threshold is adjusted in 1% steps.\n- Many actions are blocked if a party is in power, in coalition, or below the required threshold."
 MD_TUTORIAL_INFLUENCE_TITLE: "Foreign Influence"
 MD_TUTORIAL_INFLUENCE_LEFT: "§YWhat influence tracks§!\n- Every target country has §YDomestic Influence§! plus a ranked list of foreign influencers.\n- The diplomacy view includes manual influence, aid, military aid, manipulate politics, coup, economic exploitation, and puppet actions.\n- Auto-influence uses an array-based tracker and supports multiple targets up to a cap."
 MD_TUTORIAL_INFLUENCE_RIGHT: "§YCommon limits§!\n- Most actions only appear against other countries, not your own tag.\n- Military aid uses a recent-aid cooldown flag.\n- Economic exploitation requires you to be the top influencer above 50%.\n- Puppeting requires you to be the top influencer above 80%, with matching-government and peace checks.\n- Manipulate Politics and related actions calculate Political Power costs before firing."
 MD_TUTORIAL_RESEARCH_TITLE: "Research Slots"
 MD_TUTORIAL_RESEARCH_LEFT: "§YSeparate slot screen§!\n- The Technology tab gets an extra §YResearch Slots§! button.\n- MD ties additional research slots to two growth paths: §Ytotal GDP§! and §YGDP per capita§!.\n- One button expands laboratories from industry size, while the other upgrades lab equipment from development level."
 MD_TUTORIAL_RESEARCH_RIGHT: "§YHow expansion is gated§!\n- Each button checks the next GDP or GDP-per-capita threshold from global arrays.\n- Taking a slot fires a timed decision instead of granting everything for free at once.\n- The scripted effects add medium expenditure and recalculate education spending from research slots.\n- Recent-expansion flags stop immediate repeats."
 MD_TUTORIAL_MILITARY_TITLE: "Templates and Production"
 MD_TUTORIAL_MILITARY_LEFT: "§YDo not assume vanilla widths§!\n- MD land battalions use many custom types and categories such as motorized infantry, mechanized infantry, tanks, air assault, artillery, and more.\n- In §YMD_land_units.txt§!, combat width ranges from 0 to 5 depending on the battalion.\n- Check each battalion's width and category before copying vanilla template logic."
 MD_TUTORIAL_MILITARY_RIGHT: "§YProduction differences§!\n- The production line view includes an extra §YOil§! material readout.\n- The market calculator supports many MD equipment groups, including IFVs, APCs, MBTs, helicopters, and more.\n- Plan production and deployment around actual equipment roles and battalion categories, not vanilla assumptions."
 MD_TUTORIAL_ADVANCED_TITLE: "International and Energy Systems"
 MD_TUTORIAL_ADVANCED_LEFT: "§YInternational Systems screen§!\n- The button beside Logistics opens MD's §YInternational Systems§! screen.\n- That shared screen contains tabs for §YSpace Program§!, §YCounter-Terror§!, §YPMC§!, §YUnited Nations§!, and §YCyber Warfare§!.\n- The Cyber tab stays locked until the first §YEncryption§! and §YDecryption§! technologies are completed."
 MD_TUTORIAL_ADVANCED_RIGHT: "§YEnergy screen§!\n- The Construction tab adds an §YEnergy Screen§! button.\n- It tracks generation, consumption, fulfillment, and major energy buildings.\n- The interface manages power restrictions, extra consumption, enrichment facilities, battery parks, fuel purchases, and reactor-fuel production."
