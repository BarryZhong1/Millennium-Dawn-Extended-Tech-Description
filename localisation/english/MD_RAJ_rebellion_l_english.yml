l_english:
 RAJ_ladakh_crisis: "Ladakh Separatist Crisis"
 RAJ_ladakh_crisis_desc: "Muslim opinion in Ladakh has dropped dangerously low. If we do not address their grievances soon, the region may declare independence."
 RAJ_meghalaya_crisis: "Meghalaya Separatist Crisis"
 RAJ_meghalaya_crisis_desc: "Christian opinion in Meghalaya has dropped dangerously low. If we do not address their grievances soon, the region may declare independence."
 RAJ_manipur_crisis: "Manipur Separatist Crisis"
 RAJ_manipur_crisis_desc: "Christian opinion in Manipur has dropped dangerously low. If we do not address their grievances soon, the region may declare independence."
 RAJ_sikkim_crisis: "Sikkim Separatist Crisis"
 RAJ_sikkim_crisis_desc: "Buddhist opinion in Sikkim has dropped dangerously low. If we do not address their grievances soon, the region may declare independence."
 RAJ_kashmir_crisis: "Kashmir Separatist Crisis"
 RAJ_kashmir_crisis_desc: "Sikh opinion in Kashmir has dropped dangerously low. If we do not address their grievances soon, the region may declare independence."
 RAJ_raise_muslim_opinion_tt: "Muslim opinion must be above 14"
 RAJ_raise_christian_opinion_tt: "Christian opinion must be above 14"
 RAJ_raise_buddhist_opinion_tt: "Buddhist opinion must be above 14"
 RAJ_raise_sikh_opinion_tt: "Sikh opinion must be above 14"
 RAJ_rebellion.1.t: "Ladakh Declares Independence"
 RAJ_rebellion.1.d: "The Muslim population of Ladakh has lost all faith in the central government. Armed separatists have seized control of the region and declared independence. Our forces have been expelled from the area."
 RAJ_rebellion.1.a: "This is a disaster."
 RAJ_rebellion.1.b: "The situation has stabilized."
 RAJ_rebellion.2.t: "Meghalaya Declares Independence"
 RAJ_rebellion.2.d: "The Christian communities of Meghalaya have risen up against the central government. Tribal militias have seized control of the state and declared independence."
 RAJ_rebellion.2.a: "This is a disaster."
 RAJ_rebellion.2.b: "The situation has stabilized."
 RAJ_rebellion.3.t: "Manipur Declares Independence"
 RAJ_rebellion.3.d: "The Christian and tribal communities of Manipur have risen up against the central government. Armed groups have seized control of the state and declared independence."
 RAJ_rebellion.3.a: "This is a disaster."
 RAJ_rebellion.3.b: "The situation has stabilized."
 RAJ_rebellion.4.t: "Sikkim Declares Independence"
 RAJ_rebellion.4.d: "The Buddhist population of Sikkim has lost all faith in the central government. Separatist forces have seized control and declared independence, seeking to restore Sikkim's sovereignty."
 RAJ_rebellion.4.a: "This is a disaster."
 RAJ_rebellion.4.b: "The situation has stabilized."
 RAJ_rebellion.5.t: "Kashmir Declares Independence"
 RAJ_rebellion.5.d: "The Sikh population of Kashmir has lost all faith in the central government. Armed separatists have seized control of the region and declared independence."
 RAJ_rebellion.5.a: "This is a disaster."
 RAJ_rebellion.5.b: "The situation has stabilized."
