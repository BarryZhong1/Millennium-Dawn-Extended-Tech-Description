 # Corruption side-effect ideas
 PHI_corporate_scandal_industry: "Corporate Scandal"
 PHI_corporate_scandal_industry_desc: "The exposure of high-value corporate corruption has shaken investor confidence in our industrial sector."
 PHI_procurement_scandal_construction: "Procurement Scandal"
 PHI_procurement_scandal_construction_desc: "Major corruption uncovered in government contracts has slowed construction as contracts are reviewed."
 PHI_customs_fraud_tax: "Customs Fraud Exposed"
 PHI_customs_fraud_tax_desc: "A customs fraud ring has disrupted tax collection while the bureau is restructured."
 PHI_tax_scandal_investment: "Tax Bureau Scandal"
 PHI_tax_scandal_investment_desc: "Top-level corruption in the tax bureau has scared off foreign investors."
 PHI_military_scandal_org: "Military Corruption Scandal"
 PHI_military_scandal_org_desc: "Corruption in the general staff has disrupted command structures and unit cohesion."
 PHI_offshore_fortune_investment: "Recovered Offshore Funds"
 PHI_offshore_fortune_investment_desc: "Seized offshore assets have been reinvested, opening new foreign investment channels."

 # Locked Corruption Idea
 PHI_locked_corruption: "Anti-Corruption Oversight"
 PHI_locked_corruption_desc: "The government has established formal mechanisms to fight corruption. Corruption laws can only be changed through dedicated anti-corruption efforts."

 # Tier change events
 PHI_corruption_event.1.t: "Corruption Tier Reduced"
 PHI_corruption_event.1.d: "Our relentless efforts have paid off. Corrupt networks have been dismantled and a new level of accountability has been established."
 PHI_corruption_event.1.a: "Progress at last."
 PHI_corruption_event.2.t: "Corruption Worsens"
 PHI_corruption_event.2.d: "Despite our efforts, corrupt forces have consolidated their grip. Bribery and graft have spread further into the institutions of the state."
 PHI_corruption_event.2.a: "We must do better."

 # Investigate Corporations events
 PHI_corruption_event.10.t: "Investigation: Cover-Up Suspected"
 PHI_corruption_event.10.d: "Our investigators ran into a wall of lawyers, sealed documents, and sudden memory loss. Someone powerful is covering their tracks — but we cannot prove it."
 PHI_corruption_event.10.a: "Keep watching them."
 PHI_corruption_event.11.t: "Investigation: Corruption Ring Found"
 PHI_corruption_event.11.d: "A mid-level corruption ring operating within the private sector has been exposed. Several executives face charges and a portion of misappropriated funds has been recovered."
 PHI_corruption_event.11.a: "Prosecute them."
 PHI_corruption_event.12.t: "Investigation: Corporate Scandal Uncovered"
 PHI_corruption_event.12.d: "A massive corporate scandal has rocked the business sector. Executives colluded with state officials to siphon public funds. The fallout has shaken investor confidence."
 PHI_corruption_event.12.a: "Seize their assets."
 PHI_corruption_event.13.t: "Investigation: High-Value Corruption Exposed"
 PHI_corruption_event.13.d: "An extraordinary discovery — a web of high-value corporate corruption reaching the very top of the private sector has been fully exposed. Billions in assets are being seized."
 PHI_corruption_event.13.a: "This will not be forgotten."

 # Audit Government Contracts events
 PHI_corruption_event.20.t: "Audit: No Evidence Found"
 PHI_corruption_event.20.d: "The audit turned up nothing actionable. Every contract checked out on paper. Either the books are clean or someone cleaned them before we arrived."
 PHI_corruption_event.20.a: "We tried."
 PHI_corruption_event.21.t: "Audit: Mismanagement Exposed"
 PHI_corruption_event.21.d: "Auditors uncovered sloppy bookkeeping and inflated invoices across several departments. Mismanaged funds have been clawed back."
 PHI_corruption_event.21.a: "Hold them accountable."
 PHI_corruption_event.22.t: "Audit: Procurement Corruption Found"
 PHI_corruption_event.22.d: "A deep-rooted procurement racket has been blown open. Officials were systematically awarding contracts to shell companies in exchange for kickbacks."
 PHI_corruption_event.22.a: "Dismantle the network."
 PHI_corruption_event.23.t: "Audit: National Embezzlement Revealed"
 PHI_corruption_event.23.d: "A staggering embezzlement scheme stretching across multiple ministries has been uncovered. The scale of theft from public coffers is a national scandal."
 PHI_corruption_event.23.a: "This ends now."

 # Inspect Tax Bureau events
 PHI_corruption_event.30.t: "Tax Inspection: No Findings"
 PHI_corruption_event.30.d: "Inspectors found no hard evidence of wrongdoing. Agents were cooperative and records appeared in order. The investigation closes without result."
 PHI_corruption_event.30.a: "Back to work."
 PHI_corruption_event.31.t: "Tax Inspection: Bribery Discovered"
 PHI_corruption_event.31.d: "A number of low-level tax agents were caught accepting bribes to reduce assessments. They have been dismissed and back taxes recovered."
 PHI_corruption_event.31.a: "Clean house."
 PHI_corruption_event.32.t: "Tax Inspection: Customs Fraud Exposed"
 PHI_corruption_event.32.d: "A sophisticated customs fraud ring has been dismantled. Smugglers had bribed senior agents to wave through untaxed shipments for years."
 PHI_corruption_event.32.a: "Reform the bureau."
 PHI_corruption_event.33.t: "Tax Inspection: Top Officials Implicated"
 PHI_corruption_event.33.d: "Top officials within the Bureau of Internal Revenue have been implicated in a systemic corruption scheme. The scandal has alarmed foreign investors and rattled public confidence."
 PHI_corruption_event.33.a: "Prosecute every one of them."

 # Investigate the Military events
 PHI_corruption_event.40.t: "Military Inquiry: Evidence Covered Up"
 PHI_corruption_event.40.d: "The military closed ranks. Our investigators were met with stonewalling at every level. If corruption exists, it has been buried deep."
 PHI_corruption_event.40.a: "We will return."
 PHI_corruption_event.41.t: "Military Inquiry: Officers Caught"
 PHI_corruption_event.41.d: "Several low-ranking officers were caught diverting fuel allocations and equipment for personal gain. They have been court-martialled."
 PHI_corruption_event.41.a: "Justice is served."
 PHI_corruption_event.42.t: "Military Inquiry: General Staff Implicated"
 PHI_corruption_event.42.d: "Members of the general staff have been implicated in a corruption ring involving defense procurement contracts. The scandal has disrupted the chain of command."
 PHI_corruption_event.42.a: "Purge the ranks."
 PHI_corruption_event.43.t: "Military Inquiry: Senior Figure Exposed"
 PHI_corruption_event.43.d: "A senior military figure has been publicly exposed for embezzling defense funds over many years. The revelation has shocked the armed forces and the public alike."
 PHI_corruption_event.43.a: "No one is above the law."

 # Purge Local Officials events
 PHI_corruption_event.50.t: "Purge: No Significant Results"
 PHI_corruption_event.50.d: "Local officials kept their heads down and the purge found little to act on. Either the networks went quiet or were tipped off in advance."
 PHI_corruption_event.50.a: "We will try again."
 PHI_corruption_event.51.t: "Purge: Graft Network Found"
 PHI_corruption_event.51.d: "A small-scale graft network operating out of the local bureaucracy has been dismantled. A handful of officials have been removed from their posts."
 PHI_corruption_event.51.a: "Good riddance."
 PHI_corruption_event.52.t: "Purge: Local Syndicate Exposed"
 PHI_corruption_event.52.d: "A major local syndicate embedded within the regional government has been exposed. Their removal has disrupted local power structures and stirred unrest."
 PHI_corruption_event.52.a: "Stability will follow."
 PHI_corruption_event.53.t: "Purge: Political Dynasty Toppled"
 PHI_corruption_event.53.d: "An entrenched political dynasty that had controlled local government for decades has been toppled. Their assets have been seized, though loyalists remain restless."
 PHI_corruption_event.53.a: "A new era begins."

 # Trace Offshore Accounts events
 PHI_corruption_event.60.t: "Offshore Trace: No Trail Found"
 PHI_corruption_event.60.d: "Our financial investigators hit a dead end. Every lead dissolved into anonymous shell companies across multiple jurisdictions. The money has vanished."
 PHI_corruption_event.60.a: "We lost them."
 PHI_corruption_event.61.t: "Offshore Trace: Minor Accounts Found"
 PHI_corruption_event.61.d: "A number of minor offshore accounts linked to government officials have been identified and frozen. The amounts are modest but the precedent is significant."
 PHI_corruption_event.61.a: "Freeze everything."
 PHI_corruption_event.62.t: "Offshore Trace: Laundering Network Exposed"
 PHI_corruption_event.62.d: "A major money laundering network moving funds through offshore accounts has been dismantled. A significant sum has been repatriated to the Philippine treasury."
 PHI_corruption_event.62.a: "Bring it home."
 PHI_corruption_event.63.t: "Offshore Trace: Offshore Fortune Uncovered"
 PHI_corruption_event.63.d: "An extraordinary discovery — a vast offshore fortune belonging to senior officials has been uncovered and seized. The windfall is historic and sends a powerful message."
 PHI_corruption_event.63.a: "The people will know."

 # Delayed stability event
 PHI_corruption_event.99.t: "Public Trust Restored"
 PHI_corruption_event.99.d: "With the old political dynasty removed from power, local communities are slowly rebuilding trust in their institutions. A sense of cautious optimism is taking hold."
 PHI_corruption_event.99.a: "The people are behind us."

 # EDSA Dos Crisis — Decision category
 PHI_edsa_dos_category: "The EDSA Dos Crisis"
 PHI_edsa_dos_category_desc: "Corruption allegations have destabilised the administration. The impeachment trial has paralysed governance. The people are watching — and growing impatient.Take the §YOpen the Second Envelope§! decision before the timer expires."

 # EDSA Dos Crisis — Timed mission
 PHI_the_people_grow_disillusioned: "The People Grow Disillusioned..."
 PHI_the_people_grow_disillusioned_desc: "The senate's vote to suppress key impeachment evidence has outraged the public. Hundreds of thousands are converging on EDSA Shrine. The clock is running out."

 # EDSA Dos Crisis — Prevention decision
 PHI_open_the_second_envelope: "Open the Second Envelope"
 PHI_open_the_second_envelope_desc: "Despite the 11-10 senate vote to suppress it, we still have the power to allow the controversial evidence to be opened. It will damage us politically — but it may be the only way to preserve institutional trust and prevent the government from falling."

 # EDSA Dos Crisis — Trigger tooltips
 PHI_edsa_corruption_below_55_tt: "§YCorruption Strength§! must be below §Y55§! (Current: [?PHI.PHI_corruption_strength|Y0])"
 PHI_edsa_stability_above_60_tt: "§YStability§! must be above §Y60%§!"

 # EDSA Dos Crisis — Ideas
 PHI_edsa_dos_impeachment_atmosphere: "Impeachment Paralysis"
 PHI_edsa_dos_impeachment_atmosphere_desc: "The impeachment trial dominates every news broadcast. Political capital is bleeding away daily as the nation watches the administration fight for survival."

 PHI_edsa_dos_recovery_spirit: "Post-EDSA Stabilisation"
 PHI_edsa_dos_recovery_spirit_desc: "The new administration has assumed power under extraordinary circumstances. Reform promises are generating cautious public optimism, though deep political wounds remain."
 # EVENTS
 PHI.1.t: "The Juetengate Scandal Explodes"
 PHI.1.d: "A whistleblower has come forward accusing President Joseph Estrada and members of his inner circle of receiving millions in jueteng kickbacks. Public outrage is growing rapidly as media reports expose deeper layers of corruption within the administration. Opposition figures, church leaders, and civil society organizations have begun organizing demonstrations demanding accountability from the government. With tensions rising nationwide, the administration must now decide how it will respond to the growing unrest."
 PHI.1.a: "This may spiral into something greater..."
 
 PHI.2.t: "End of the Line"
 PHI.2.d: "It began with a walkout. When the senate voted 11-10 to suppress key impeachment evidence, the entire prosecution team walked out of the courtroom. Within hours, hundreds of thousands of Filipinos had begun flooding EDSA Shrine in a mass demonstration recalling the original People Power Revolution of 1986. Within days, the Armed Forces of the Philippines and the Philippine National Police withdrew their support from the administration. Cabinet secretaries resigned en masse. Chief Justice Hilario Davide Jr. administered the oath of office to Vice President Gloria Macapagal-Arroyo. Joseph Estrada departed Malacañang Palace without formally resigning. A new chapter begins."
 PHI.2.a: "The people have spoken."
 
 PHI.3.t: "Inaguration of Gloria Macapagal Arroyo"
 PHI.3.d: "Just as after Joseph Estrada left his office as the president of the Philippines, Gloria Arroyo, The VP of Joseph Estrada of the £PHI_conservatism Lakas-CMD party has been sworn in as the 14th president of the Philippines. While some may say that Arroyo's ascension to the presidency was illegitimate, the people rejoice as another corrupt leader has been toppled with the blocks of revolution and protesting. Though the Arroyo administration will take time to recover, change might finally be in the air as Arroyo promises to mend the wounds of the former president that was toppled."
 PHI.3.a: "Change might be in the air."

# WORLD NEWS
 PHI_news.1.t: "The Second EDSA Revolution"
 PHI_news.1.d: "Massive demonstrations in Manila have forced President Joseph Estrada to step down amid allegations of corruption and a collapsed impeachment trial. Vice President Gloria Macapagal Arroyo has assumed the presidency following days of unrest and mounting political pressure."
 PHI_news.1.a: "Another People Power Revolution."

